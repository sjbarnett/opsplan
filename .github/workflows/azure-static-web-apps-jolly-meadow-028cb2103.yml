    font-size: 13px;
    transition: background 0.12s;
  }
  .audit-entry:last-child { border-bottom: none; }
  .audit-entry:hover { background: var(--grey-lighter); }
  .audit-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--grey-mid);
  }
  .audit-time .date { display: block; font-weight: 600; color: var(--grey-dark); }
  .audit-action-tag {
    font-size: 11px;
