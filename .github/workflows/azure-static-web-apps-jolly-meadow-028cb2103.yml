// =================================================================
// MONTHLY REVIEW
// =================================================================
// Ensure data has all the new fields (migration safety)
if (!data.concerns) data.concerns = [];
if (!data.newInitiatives) data.newInitiatives = [];
if (!data.monthlyReviews) data.monthlyReviews = [];
if (!data.currentReview) data.currentReview = { decisions: {}, started: null };
if (!data.weeklyChecks) data.weeklyChecks = [];
if (!data.currentWeeklyCheck) data.currentWeeklyCheck = null;
// Step 4 cadence: light-touch most weeks, full review every 4th. Counter increments on
// "Agree all" and resets to 0 on a full review.
if (!data.pillarReviewCadence) {
  data.pillarReviewCadence = { lightTouchesSinceLastFull: 0, lastFullReviewAt: null };
}

// =================================================================
// WEEKLY OPS CHECK
// =================================================================
// Sector × Metric ops check-in structure
// Each sector defines its own metric list. These constants are the SEED only — the live
// sector list is in data.sectors (persisted to localStorage), so leadership can add/remove
// sectors and metrics as the business shape changes. Always read via getSectors().
const DEFAULT_METRICS_ENERGY_COMMS = [
  { id: 'stock',   label: 'Stock (D4/14)', prompt: 'Day 4 Additional Checks AND Day 14 Decisions — on target?' },
  { id: 'kpis',    label: 'KPIs',          prompt: 'Reg KPIs, throughput, accepts, decisions per DRE?' },
  { id: 'quality', label: 'Quality',       prompt: 'Quality of decisions, complaints, customer experience?' },
  { id: 'people',  label: 'People Issues', prompt: 'FTE, shrinkage, resourcing, performance concerns?' }
];
const PARKING_METRICS = [
  { id: 'kpis',   label: 'KPIs',          prompt: 'Throughput, decisions per DRE, SLAs on target?' },
  { id: 'people', label: 'People Issues', prompt: 'FTE, shrinkage, resourcing, performance concerns?' }
];
const TELEPHONY_METRICS = [
  { id: 'kpis',     label: 'KPIs',                prompt: 'Service levels, abandonment, AHT, FCR — on target?' },
  { id: 'capacity', label: 'Capacity',            prompt: 'Phones and admin — capacity to plan?' },
  { id: 'plan',     label: 'Project on Plan',    prompt: 'Project milestones vs plan — review project plan summary' }
];
const DEFAULT_SECTORS = [
  { id: 'b2c',       name: 'Energy B2C',         icon: '⚡', metrics: DEFAULT_METRICS_ENERGY_COMMS },
  { id: 'b2b',       name: 'Energy B2B',         icon: '⚡', metrics: DEFAULT_METRICS_ENERGY_COMMS },
  { id: 'comms',     name: 'Comms',              icon: '📞', metrics: DEFAULT_METRICS_ENERGY_COMMS },
  { id: 'parking',   name: 'Parking',            icon: '🅿', metrics: PARKING_METRICS },
  { id: 'telephony', name: 'Telephony Project',  icon: '☎', metrics: TELEPHONY_METRICS }
];
// Live sector list lives on the data object so it persists and can be edited.
// Older saved data may not have it — hydrate from the seed in that case.
function getSectors() {
  if (!data.sectors || !Array.isArray(data.sectors) || data.sectors.length === 0) {
    data.sectors = JSON.parse(JSON.stringify(DEFAULT_SECTORS));
  }
  return data.sectors;
}

// Helper: composite key for storage
function cellKey(sectorId, metricId) { return sectorId + '.' + metricId; }
// Total cell count to know when Step 1 is complete (computed from live sector list)
function totalOpsCells() {
  return getSectors().reduce((sum, s) => sum + (s.metrics || []).length, 0);
}

// Get Monday of the current week (week commencing)
function weekCommencingDate(d) {
  const date = d ? new Date(d) : new Date();
  const day = date.getDay();
  const diff = date.getDate() - day + (day === 0 ? -6 : 1); // Monday
  const monday = new Date(date.setDate(diff));
  monday.setHours(0, 0, 0, 0);
  return monday.toISOString().slice(0, 10);
}

function formatWeekLabel(isoDate) {
  if (!isoDate) return '—';
  const d = new Date(isoDate);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function formatWeekLabelLong(isoDate) {
  if (!isoDate) return '—';
  const d = new Date(isoDate);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' });
}

function getOrInitCurrentCheck() {
  const thisWeek = weekCommencingDate();
  // If currentWeeklyCheck exists but it's for an older week, archive it as not-completed and start fresh
  if (data.currentWeeklyCheck && data.currentWeeklyCheck.weekCommencing !== thisWeek) {
    // Only archive if it has any items set
    const hasContent = Object.keys(data.currentWeeklyCheck.items || {}).length > 0;
    if (hasContent) {
      data.weeklyChecks.push({ ...data.currentWeeklyCheck, completed: false });
    }
    data.currentWeeklyCheck = null;
  }
  if (!data.currentWeeklyCheck) {
    data.currentWeeklyCheck = {
      id: uid('wk'),
      weekCommencing: thisWeek,
      items: {},  // { d4: { rag, note }, d14: {...}, ... }
      completed: false,
      completedAt: null,
      completedBy: null
    };
  }
  return data.currentWeeklyCheck;
}

function overallRagForCheck(check) {
  const items = Object.values(check.items || {});
  if (items.length === 0) return null;
  if (items.some(i => i.rag === 'red')) return 'red';
  if (items.some(i => i.rag === 'amber')) return 'amber';
  if (items.every(i => i.rag === 'green')) return 'green';
  return null;
}

function renderWeeklyCheck() {
  const check = getOrInitCurrentCheck();
  document.getElementById('weekly-week-label').textContent = 'Week commencing ' + formatWeekLabelLong(check.weekCommencing);
  const statusPill = document.getElementById('weekly-status-pill');
  const setCount = countSetCells(check);
  if (check.completed) {
    statusPill.textContent = '✓ Completed';
    statusPill.classList.add('complete');
  } else if (setCount === 0) {
    statusPill.textContent = 'Not started';
    statusPill.classList.remove('complete');
  } else if (setCount < totalOpsCells()) {
    statusPill.textContent = `${setCount} / ${totalOpsCells()} set`;
    statusPill.classList.remove('complete');
  } else {
    statusPill.textContent = 'Ready to complete';
    statusPill.classList.remove('complete');
  }

  // Render sector cards
  const itemsEl = document.getElementById('weekly-items');
  itemsEl.innerHTML = renderSectorCardsHtml(check);

  // Overall status text
  const overall = overallRagForCheck(check);
  const overallEl = document.getElementById('weekly-overall');
  if (setCount === 0) {
    overallEl.innerHTML = '<em>Set a status for each cell above.</em>';
  } else if (setCount < totalOpsCells()) {
    overallEl.innerHTML = `<strong>${setCount}</strong> of ${totalOpsCells()} cells set`;
  } else {
    const ragLabel = overall === 'red' ? '🔴 Off track' : overall === 'amber' ? '🟡 Watch' : '🟢 On track';
    overallEl.innerHTML = `Overall: <strong>${ragLabel}</strong> · ready to lock in`;
  }

  // Complete button enabled only when all cells have a status
  const btn = document.getElementById('weekly-complete-btn');
  if (check.completed) {
    btn.textContent = '✓ Completed — start fresh';
    btn.disabled = false;
  } else {
    btn.textContent = '✓ Complete this week\'s check';
    btn.disabled = setCount < totalOpsCells();
  }

  // History
  renderWeeklyHistory();
}

// Count how many cells in a check have a RAG set
function countSetCells(check) {
  if (!check || !check.items) return 0;
  return Object.values(check.items).filter(c => c && c.rag).length;
}

// Render the stack of sector cards, each holding 4 metric rows
function renderSectorCardsHtml(check) {
  return getSectors().map(sector => {
    const metrics = sector.metrics || [];
    // Determine sector-level RAG: worst of its metrics
    let sectorWorst = null;
    metrics.forEach(m => {
      const cell = check.items[cellKey(sector.id, m.id)];
      if (!cell || !cell.rag) return;
      if (cell.rag === 'red') sectorWorst = 'red';
      else if (cell.rag === 'amber' && sectorWorst !== 'red') sectorWorst = 'amber';
      else if (cell.rag === 'green' && !sectorWorst) sectorWorst = 'green';
    });
    return `
      <div class="sector-card ${sectorWorst ? 'rag-' + sectorWorst : ''}">
        <div class="sector-card-head">
          <span class="sector-card-icon">${sector.icon || '•'}</span>
          <span class="sector-card-title">${escapeHtml(sector.name)}</span>
          ${sectorWorst ? `<span class="sector-card-rag rag-${sectorWorst}">${sectorWorst.toUpperCase()}</span>` : ''}
        </div>
        <div class="sector-card-body">
          ${metrics.length === 0
            ? '<div class="metric-row-empty">No metrics defined yet — add some in the editor (cog top right).</div>'
            : metrics.map(metric => {
            const key = cellKey(sector.id, metric.id);
            const cell = check.items[key] || { rag: null, note: '' };
            const rag = cell.rag;
            return `
              <div class="metric-row ${rag ? 'rag-' + rag : ''}">
                <div class="metric-row-label">
                  <span class="metric-label-name">${escapeHtml(metric.label)}</span>
                  <span class="metric-label-prompt">${escapeHtml(metric.prompt || '')}</span>
                </div>
                <textarea class="metric-row-note" data-item-note="${key}" placeholder="Note (optional)" rows="1">${escapeHtml(cell.note || '')}</textarea>
                <div class="metric-row-rag">
                  <button class="weekly-rag-btn green ${rag === 'green' ? 'selected' : ''}" data-rag-set="${key}" data-rag-val="green" title="On track">G</button>
                  <button class="weekly-rag-btn amber ${rag === 'amber' ? 'selected' : ''}" data-rag-set="${key}" data-rag-val="amber" title="Watch">A</button>
                  <button class="weekly-rag-btn red ${rag === 'red' ? 'selected' : ''}" data-rag-set="${key}" data-rag-val="red" title="Off plan">R</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// =================================================================
// SECTOR EDITOR — lets leadership add/rename/remove sectors and metrics.
// Lives on the Weekly Check view, hidden behind a cog toggle. Edits go straight
// to data.sectors and are persisted; weekly check history is preserved (old
// scores for deleted sectors simply stop rendering, they don't get wiped).
// =================================================================
function renderSectorEditor() {
  // Render into both editor hosts (reference view + in-session). The session one is
  // hidden when no session, but rendering into both keeps them in sync if both ever open.
  const hosts = [
    document.getElementById('sector-editor-body'),
    document.getElementById('session-sector-editor-body')
  ].filter(Boolean);
  if (hosts.length === 0) return;
  const sectors = getSectors();
  const emptyMsg = '<div class="sector-editor-empty">No sectors defined. Add one below to start measuring the heartbeat.</div>';
  if (sectors.length === 0) {
    hosts.forEach(h => { h.innerHTML = emptyMsg; });
    return;
  }
  const html = sectors.map((s, idx) => {
    const isFirst = idx === 0;
    const isLast = idx === sectors.length - 1;
    return `
      <div class="sector-edit-block" data-sector-id="${s.id}">
        <div class="sector-edit-head">
          <div class="sector-edit-head-left">
            <span class="sector-edit-icon" data-action="edit-sector-icon" data-sector-id="${s.id}" title="Click to change icon">${escapeHtml(s.icon || '•')}</span>
            <input type="text" class="sector-edit-name" data-action="rename-sector" data-sector-id="${s.id}" value="${escapeHtml(s.name)}" placeholder="Sector name">
          </div>
          <div class="sector-edit-head-tools">
            <button class="sector-edit-tool-btn" data-action="move-sector-up" data-sector-id="${s.id}" ${isFirst ? 'disabled' : ''} title="Move up">↑</button>
            <button class="sector-edit-tool-btn" data-action="move-sector-down" data-sector-id="${s.id}" ${isLast ? 'disabled' : ''} title="Move down">↓</button>
            <button class="sector-edit-tool-btn sector-edit-delete" data-action="delete-sector" data-sector-id="${s.id}" title="Delete this sector">✕</button>
          </div>
        </div>
        <div class="sector-metrics-edit">
          ${(s.metrics || []).length === 0
            ? '<div class="sector-metric-empty">No metrics yet — add one below.</div>'
            : s.metrics.map((m, mIdx) => {
              const mFirst = mIdx === 0;
              const mLast = mIdx === s.metrics.length - 1;
              return `
                <div class="sector-metric-edit-row" data-metric-id="${m.id}">
                  <input type="text" class="sector-metric-label" data-action="rename-metric-label" data-sector-id="${s.id}" data-metric-id="${m.id}" value="${escapeHtml(m.label)}" placeholder="Metric label (e.g. KPIs)">
                  <input type="text" class="sector-metric-prompt" data-action="rename-metric-prompt" data-sector-id="${s.id}" data-metric-id="${m.id}" value="${escapeHtml(m.prompt || '')}" placeholder="What question does this answer?">
                  <div class="sector-metric-tools">
                    <button class="sector-edit-tool-btn" data-action="move-metric-up" data-sector-id="${s.id}" data-metric-id="${m.id}" ${mFirst ? 'disabled' : ''} title="Move up">↑</button>
                    <button class="sector-edit-tool-btn" data-action="move-metric-down" data-sector-id="${s.id}" data-metric-id="${m.id}" ${mLast ? 'disabled' : ''} title="Move down">↓</button>
                    <button class="sector-edit-tool-btn sector-edit-delete" data-action="delete-metric" data-sector-id="${s.id}" data-metric-id="${m.id}" title="Delete this metric">✕</button>
                  </div>
                </div>
              `;
            }).join('')}
          <button class="sector-add-metric-btn" data-action="add-metric" data-sector-id="${s.id}">+ Add a metric to ${escapeHtml(s.name)}</button>
        </div>
      </div>
    `;
  }).join('');
  hosts.forEach(h => { h.innerHTML = html; });
}

// Helper: stable slug from a name, used for fresh sector/metric IDs
function slugifyId(input, prefix) {
  const base = (input || '').toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '').slice(0, 24) || 'item';
  // Ensure uniqueness with a short suffix
  return base + '_' + Math.random().toString(36).slice(2, 6);
}

// Sector editor click handler
document.body.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const sectorId = target.dataset.sectorId;
  const metricId = target.dataset.metricId;
  const sectors = getSectors();

  if (action === 'move-sector-up' || action === 'move-sector-down') {
    const idx = sectors.findIndex(s => s.id === sectorId);
    if (idx < 0) return;
    const newIdx = action === 'move-sector-up' ? idx - 1 : idx + 1;
    if (newIdx < 0 || newIdx >= sectors.length) return;
    [sectors[idx], sectors[newIdx]] = [sectors[newIdx], sectors[idx]];
    save();
    refreshHeartbeatViews();
  }
  else if (action === 'delete-sector') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    if (!confirm(`Delete sector "${s.name}" and all its metrics?\n\nPast weekly checks keep their scores in the audit history — they just stop appearing in the current heartbeat. This can't be undone from the editor.`)) return;
    data.sectors = sectors.filter(x => x.id !== sectorId);
    logAudit({
      action: 'delete', area: 'sector', pillarId: null, pillarName: null,
      itemName: s.name,
      summary: `Removed heartbeat sector "${s.name}"`,
      detail: `Had ${(s.metrics || []).length} metric(s). Historical weekly check scores preserved but no longer rendered.`
    });
    save();
    refreshHeartbeatViews();
    toast(`Sector "${s.name}" removed`, 'success');
  }
  else if (action === 'add-metric') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const label = prompt(`New metric label for "${s.name}":`, '');
    if (!label || !label.trim()) return;
    const promptText = prompt('What question does this metric answer? (shown as a hint in the weekly check)', '') || '';
    if (!Array.isArray(s.metrics)) s.metrics = [];
    s.metrics.push({ id: slugifyId(label, 'm'), label: label.trim(), prompt: promptText.trim() });
    logAudit({
      action: 'add', area: 'sector', pillarId: null, pillarName: null,
      itemName: label.trim(),
      summary: `Added metric "${label.trim()}" to sector "${s.name}"`,
      detail: promptText.trim() || '(no prompt)'
    });
    save();
    refreshHeartbeatViews();
    toast('Metric added', 'success');
  }
  else if (action === 'delete-metric') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const m = (s.metrics || []).find(mm => mm.id === metricId);
    if (!m) return;
    if (!confirm(`Delete metric "${m.label}" from "${s.name}"?\n\nHistorical scores are preserved.`)) return;
    s.metrics = s.metrics.filter(mm => mm.id !== metricId);
    logAudit({
      action: 'delete', area: 'sector', pillarId: null, pillarName: null,
      itemName: m.label,
      summary: `Removed metric "${m.label}" from sector "${s.name}"`,
      detail: ''
    });
    save();
    refreshHeartbeatViews();
    toast('Metric removed', 'success');
  }
  else if (action === 'move-metric-up' || action === 'move-metric-down') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const idx = (s.metrics || []).findIndex(m => m.id === metricId);
    if (idx < 0) return;
    const newIdx = action === 'move-metric-up' ? idx - 1 : idx + 1;
    if (newIdx < 0 || newIdx >= s.metrics.length) return;
    [s.metrics[idx], s.metrics[newIdx]] = [s.metrics[newIdx], s.metrics[idx]];
    save();
    refreshHeartbeatViews();
  }
  else if (action === 'edit-sector-icon') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const newIcon = prompt(`Icon character for "${s.name}" (a single character or emoji):`, s.icon || '');
    if (newIcon === null) return;
    s.icon = newIcon.trim().slice(0, 3); // Allow up to a small grapheme cluster
    save();
    refreshHeartbeatViews();
  }
});

// Sector editor input handlers (rename inputs commit on blur)
document.body.addEventListener('change', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;
  const sectorId = target.dataset.sectorId;
  const metricId = target.dataset.metricId;
  const sectors = getSectors();

  if (action === 'rename-sector') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const newName = target.value.trim();
    if (!newName || s.name === newName) return;
    const old = s.name;
    s.name = newName;
    logAudit({
      action: 'edit', area: 'sector', pillarId: null, pillarName: null,
      itemName: newName,
      summary: `Renamed sector: "${old}" \u2192 "${newName}"`,
      oldValue: old, newValue: newName
    });
    save();
    refreshHeartbeatViews();
  }
  else if (action === 'rename-metric-label') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const m = (s.metrics || []).find(mm => mm.id === metricId);
    if (!m) return;
    const newLabel = target.value.trim();
    if (!newLabel || m.label === newLabel) return;
    const old = m.label;
    m.label = newLabel;
    logAudit({
      action: 'edit', area: 'sector', pillarId: null, pillarName: null,
      itemName: newLabel,
      summary: `Renamed metric in "${s.name}": "${old}" \u2192 "${newLabel}"`,
      oldValue: old, newValue: newLabel
    });
    save();
    refreshHeartbeatViews();
  }
  else if (action === 'rename-metric-prompt') {
    const s = sectors.find(x => x.id === sectorId);
    if (!s) return;
    const m = (s.metrics || []).find(mm => mm.id === metricId);
    if (!m) return;
    const newPrompt = target.value.trim();
    if (m.prompt === newPrompt) return;
    m.prompt = newPrompt;
    save();
    refreshHeartbeatViews();
  }
});

// Re-render whichever views are showing the heartbeat after a sector/metric edit.
// Called whenever the editor mutates data.sectors so the user sees the change immediately.
function refreshHeartbeatViews() {
  renderSectorEditor();
  if (typeof renderWeeklyCheck === 'function') renderWeeklyCheck();
  // If a weekly review session is in progress on Step 1, refresh the heartbeat in flow
  if (sessionState && sessionState.active && sessionState.step === 1 && typeof renderSessionStep1 === 'function') {
    renderSessionStep1();
  }
}

// Toggle the editor + Add sector + Done editing — wires BOTH editors (reference + in-session)
(function wireSectorEditor() {
  function newSectorPrompt() {
    const name = prompt('Name of the new sector (e.g. "Customer Service", "Tech Platform"):', '');
    if (!name || !name.trim()) return;
    const icon = prompt('A short icon — a single emoji or character (optional):', '') || '•';
    const sectors = getSectors();
    const newSector = {
      id: slugifyId(name, 's'),
      name: name.trim(),
      icon: icon.trim().slice(0, 3) || '•',
      metrics: []
    };
    sectors.push(newSector);
    logAudit({
      action: 'add', area: 'sector', pillarId: null, pillarName: null,
      itemName: newSector.name,
      summary: `Added heartbeat sector "${newSector.name}"`,
      detail: 'No metrics yet — add some in the editor'
    });
    save();
    refreshHeartbeatViews();
    toast(`Sector "${newSector.name}" added — add metrics next`, 'success');
  }

  // Reference-view editor (out of flow, under the cog on the Weekly Check tab)
  const editor = document.getElementById('sector-editor');
  const toggle = document.getElementById('weekly-edit-toggle');
  const closeBtn = document.getElementById('weekly-edit-close');
  const addBtn = document.getElementById('sector-add-btn');
  if (editor && toggle) {
    toggle.addEventListener('click', () => {
      const isOpen = editor.style.display !== 'none';
      if (isOpen) {
        editor.style.display = 'none';
        toggle.classList.remove('active');
      } else {
        editor.style.display = '';
        toggle.classList.add('active');
        renderSectorEditor();
      }
    });
    if (closeBtn) closeBtn.addEventListener('click', () => {
      editor.style.display = 'none';
      toggle.classList.remove('active');
    });
    if (addBtn) addBtn.addEventListener('click', newSectorPrompt);
  }

  // In-session editor (Step 1, opens inline so the user never leaves the meeting)
  const sessEditor = document.getElementById('session-sector-editor');
  const sessToggle = document.getElementById('session-edit-sectors-btn');
  const sessClose = document.getElementById('session-edit-sectors-close');
  const sessAdd = document.getElementById('session-sector-add-btn');
  if (sessEditor && sessToggle) {
    sessToggle.addEventListener('click', () => {
      const isOpen = sessEditor.style.display !== 'none';
      if (isOpen) {
        sessEditor.style.display = 'none';
        sessToggle.classList.remove('active');
      } else {
        sessEditor.style.display = '';
        sessToggle.classList.add('active');
        renderSectorEditor();
        // Scroll the editor into view so it's obvious it just opened
        setTimeout(() => sessEditor.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 60);
      }
    });
    if (sessClose) sessClose.addEventListener('click', () => {
      sessEditor.style.display = 'none';
      sessToggle.classList.remove('active');
    });
    if (sessAdd) sessAdd.addEventListener('click', newSectorPrompt);
  }
})();

function renderWeeklyHistory() {
  const el = document.getElementById('weekly-history-strip');
  const history = [...(data.weeklyChecks || [])];
  const sorted = history.sort((a, b) => a.weekCommencing.localeCompare(b.weekCommencing));
  if (sorted.length === 0) {
    el.innerHTML = '<div class="weekly-history-empty">No history yet — complete your first weekly check to start building the pattern.</div>';
    return;
  }
  el.innerHTML = sorted.map(c => {
    const overall = overallRagForCheck(c);
    // Dot per sector (worst of its 4 metrics) — cleaner than 16 tiny dots
    const dots = getSectors().map(sector => {
      let worst = 'pending';
      sector.metrics.forEach(m => {
        const cell = c.items[cellKey(sector.id, m.id)];
        if (!cell || !cell.rag) return;
        if (cell.rag === 'red') worst = 'red';
        else if (cell.rag === 'amber' && worst !== 'red') worst = 'amber';
        else if (cell.rag === 'green' && worst === 'pending') worst = 'green';
      });
      return `<span class="weekly-dot ${worst}" title="${escapeHtml(sector.name)}: ${worst}"></span>`;
    }).join('');
    return `
      <div class="weekly-history-card" data-week-id="${c.id}" title="Click to see notes">
        <div class="weekly-history-card-date">${formatWeekLabel(c.weekCommencing)}</div>
        <div class="weekly-history-dots">${dots}</div>
        ${overall ? `<div class="weekly-history-overall ${overall}">${overall}</div>` : ''}
      </div>
    `;
  }).join('');

  // Also refresh the trends view, since it depends on history
  renderWeeklyTrends();
}

// Trends: per-metric mini-bar charts across the last N weeks.
// Each bar = one weekly check; colour = the RAG that week. Hover for note.
// Lets leadership spot "Comms quality has been amber 4 weeks running" at a glance.
function renderWeeklyTrends() {
  const host = document.getElementById('weekly-trends-host');
  if (!host) return;
  const history = [...(data.weeklyChecks || [])]
    .sort((a, b) => a.weekCommencing.localeCompare(b.weekCommencing));
  // Include the current in-flight check too, if any, so we always show "this week"
  if (data.currentWeeklyCheck) history.push(data.currentWeeklyCheck);
  if (history.length < 2) {
    host.innerHTML = `
      <div class="weekly-trends-empty">
        <strong>Metric trends</strong> · Complete 2+ weekly checks to see direction-of-travel per metric.
      </div>
    `;
    return;
  }
  const recent = history.slice(-8); // Last 8 weeks max

  let html = `
    <div class="weekly-trends-block">
      <div class="weekly-trends-head">
        <h3>Trends · last ${recent.length} week${recent.length === 1 ? '' : 's'}</h3>
        <span class="weekly-trends-sub">Hover a bar to see that week's note. Reading left → right is past → most recent.</span>
      </div>
      <div class="weekly-trends-grid">
        ${getSectors().map(sector => `
          <div class="trend-sector">
            <div class="trend-sector-title">${sector.icon || ''} ${escapeHtml(sector.name)}</div>
            <div class="trend-sector-metrics">
              ${sector.metrics.map(metric => {
                const bars = recent.map(c => {
                  const cell = (c.items || {})[cellKey(sector.id, metric.id)] || { rag: null, note: '' };
                  const rag = cell.rag || 'pending';
                  const note = cell.note ? ' — ' + cell.note : '';
                  return `<span class="trend-bar trend-${rag}" title="${formatWeekLabel(c.weekCommencing)}: ${rag.toUpperCase()}${escapeHtml(note)}"></span>`;
                }).join('');
                // Detect concerning runs: 3+ consecutive amber/red at the tail
                const tail = recent.slice(-3).map(c => (c.items || {})[cellKey(sector.id, metric.id)]?.rag);
                const tailAllConcern = tail.length === 3 && tail.every(r => r === 'red' || r === 'amber');
                return `
                  <div class="trend-metric ${tailAllConcern ? 'trend-flagged' : ''}">
                    <span class="trend-metric-label">${escapeHtml(metric.label)}</span>
                    <span class="trend-bars">${bars}</span>
                    ${tailAllConcern ? '<span class="trend-flag" title="3 weeks running amber/red">⚠</span>' : ''}
                  </div>
                `;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  host.innerHTML = html;
}

// Event delegation: RAG buttons
document.body.addEventListener('click', (e) => {
  const ragBtn = e.target.closest('[data-rag-set]');
  if (ragBtn) {
    const itemId = ragBtn.dataset.ragSet;
    const val = ragBtn.dataset.ragVal;
    const check = getOrInitCurrentCheck();
    if (!check.items[itemId]) check.items[itemId] = { rag: null, note: '' };
    if (check.items[itemId].rag === val) check.items[itemId].rag = null;
    else check.items[itemId].rag = val;
    save();
    renderWeeklyCheck();
    if (typeof sessionState !== 'undefined' && sessionState.active && sessionState.step === 1) {
      renderSessionStep1();
    }
    return;
  }
  const histCard = e.target.closest('.weekly-history-card');
  if (histCard) {
    openWeeklyDetail(histCard.dataset.weekId);
    return;
  }
});

// Note inputs
document.body.addEventListener('input', (e) => {
  const noteEl = e.target.closest('[data-item-note]');
  if (!noteEl) return;
  const itemId = noteEl.dataset.itemNote;
  const check = getOrInitCurrentCheck();
  if (!check.items[itemId]) check.items[itemId] = { rag: null, note: '' };
  check.items[itemId].note = noteEl.value;
  save();
});

// Complete button (standalone weekly tab)
document.getElementById('weekly-complete-btn').addEventListener('click', () => {
  const check = data.currentWeeklyCheck;
  if (!check) return;
  if (check.completed) {
    data.weeklyChecks.push(check);
    data.currentWeeklyCheck = null;
    renderWeeklyCheck();
    save();
    toast('Fresh check started', 'success');
    return;
  }
  const setCount = countSetCells(check);
  if (setCount < totalOpsCells()) {
    toast('Set a status on every cell first', 'error');
    return;
  }
  check.completed = true;
  check.completedAt = new Date().toISOString();
  check.completedBy = currentUser || 'Unknown';
  const overall = overallRagForCheck(check);
  const ragLabel = overall === 'red' ? 'OFF TRACK' : overall === 'amber' ? 'WATCH' : 'ON TRACK';
  // Audit detail: list off-plan cells
  const flagged = collectFlaggedCells(check);
  const detail = flagged.length > 0
    ? 'Flagged: ' + flagged.map(f => `${f.sectorName} · ${f.metricLabel} (${f.rag.toUpperCase()})${f.note ? ' — ' + f.note : ''}`).join(' | ')
    : 'All cells green';
  logAudit({
    action: 'edit', area: 'weekly-check',
    pillarId: null, pillarName: null,
    itemName: 'Week of ' + formatWeekLabelLong(check.weekCommencing),
    summary: `Weekly Ops Check completed — ${ragLabel}`,
    detail
  });
  data.weeklyChecks.push(check);
  data.currentWeeklyCheck = null;
  renderWeeklyCheck();
  save();
  toast(`Week of ${formatWeekLabel(check.weekCommencing)} locked in (${ragLabel})`, 'success');
});

// Helper used in multiple places: get all amber/red cells with their context
function collectFlaggedCells(check) {
  if (!check || !check.items) return [];
  const flagged = [];
  getSectors().forEach(sector => {
    sector.metrics.forEach(metric => {
      const cell = check.items[cellKey(sector.id, metric.id)];
      if (!cell || !cell.rag) return;
      if (cell.rag === 'amber' || cell.rag === 'red') {
        flagged.push({
          sectorId: sector.id,
          sectorName: sector.name,
          sectorIcon: sector.icon,
          metricId: metric.id,
          metricLabel: metric.label,
          rag: cell.rag,
          note: cell.note || ''
        });
      }
    });
  });
  // Red first, then amber, then sector order
  flagged.sort((a, b) => {
    if (a.rag !== b.rag) return a.rag === 'red' ? -1 : 1;
    return 0;
  });
  return flagged;
}

// Detail panel
function openWeeklyDetail(weekId) {
  const c = (data.weeklyChecks || []).find(x => x.id === weekId);
  if (!c) return;
  document.getElementById('weekly-detail-title').textContent = 'Week of ' + formatWeekLabelLong(c.weekCommencing);
  const body = document.getElementById('weekly-detail-body');
  body.innerHTML = `
    <div style="font-size:12px;color:var(--grey-mid);margin-bottom:18px;">
      ${c.completed ? `Completed ${formatWeekLabelLong(c.completedAt && c.completedAt.slice(0,10))} by ${escapeHtml(c.completedBy || '—')}` : '<em>Not completed</em>'}
    </div>
    ${getSectors().map(sector => {
      let worst = null;
      sector.metrics.forEach(m => {
        const cell = c.items[cellKey(sector.id, m.id)];
        if (!cell || !cell.rag) return;
        if (cell.rag === 'red') worst = 'red';
        else if (cell.rag === 'amber' && worst !== 'red') worst = 'amber';
        else if (cell.rag === 'green' && !worst) worst = 'green';
      });
      return `
        <div class="weekly-detail-item ${worst ? 'rag-' + worst : ''}" style="margin-bottom: 14px;">
          <div class="weekly-detail-item-head">
            <span class="weekly-detail-item-title">${escapeHtml(sector.name)}</span>
            ${worst ? `<span class="weekly-detail-item-rag ${worst}">${worst.toUpperCase()}</span>` : ''}
          </div>
          ${sector.metrics.map(metric => {
            const cell = c.items[cellKey(sector.id, metric.id)] || { rag: null, note: '' };
            const rag = cell.rag;
            if (!rag) return '';
            const ragLabel = rag === 'red' ? 'OFF' : rag === 'amber' ? 'WATCH' : 'OK';
            return `
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-top:1px solid rgba(0,0,0,0.05);font-size:12px;">
                <div>
                  <strong>${escapeHtml(metric.label)}</strong>
                  ${cell.note ? `<div style="color:var(--grey-mid);font-style:italic;margin-top:2px;">${escapeHtml(cell.note)}</div>` : ''}
                </div>
                <span class="weekly-detail-item-rag ${rag}" style="font-size:9px;">${ragLabel}</span>
              </div>
            `;
          }).join('')}
        </div>
      `;
    }).join('')}
  `;
  document.getElementById('weekly-detail-panel').classList.add('show');
}

document.getElementById('weekly-detail-close').addEventListener('click', () => {
  document.getElementById('weekly-detail-panel').classList.remove('show');
});

// Hook into tab change
document.querySelector('[data-view="weekly"]').addEventListener('click', () => renderWeeklyCheck());

function currentMonthLabel() {
  return new Date().toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
}

function renderMonthlyReview() {
  document.getElementById('current-month-label').textContent = currentMonthLabel();

  // Step 1: Priorities (open actions only)
  const openActions = data.actions.filter(a => !a.complete);
  const decisions = data.currentReview.decisions || {};
  const listEl = document.getElementById('priorities-review-list');
  if (openActions.length === 0) {
    listEl.innerHTML = `<div class="audit-empty">No open actions to review.</div>`;
  } else {
    listEl.innerHTML = openActions.map(a => {
      const decision = decisions[a.id];
      const styleNum = pillarNumForId(a.pillar) || 1;
      const p = data.pillars.find(pi => pi.id === a.pillar);
      const rowClass = decision === 'keep' ? 'kept' : decision === 'tweak' ? 'tweaked' : decision === 'remove' ? 'removed' : '';
      const statusPill = decision
        ? `<span class="priority-status-pill ${decision === 'keep' ? 'kept' : decision === 'tweak' ? 'tweaked' : 'removed'}">${decision === 'keep' ? '✓ Kept' : decision === 'tweak' ? '✎ Tweaked' : '✕ Removed'}</span>`
        : '';
      return `
        <div class="priority-row ${rowClass}">
          <div class="priority-pillar-bar" style="background:var(--pillar-${styleNum});"></div>
          <div class="priority-info">
            <div class="priority-pillar-label">${p ? escapeHtml(p.num + ' · ' + p.name) : '—'}</div>
            <div class="priority-text">${escapeHtml(a.desc)}</div>
            <div class="priority-meta">${escapeHtml(a.owner)} · Due ${formatDueDate(a.due)} · ${a.rag.toUpperCase()}</div>
          </div>
          ${statusPill}
          <div class="priority-actions">
            <button class="priority-btn keep ${decision === 'keep' ? 'selected' : ''}" data-decision="keep" data-action-id="${a.id}" title="Keep as priority">✓</button>
            <button class="priority-btn tweak ${decision === 'tweak' ? 'selected' : ''}" data-decision="tweak" data-action-id="${a.id}" title="Tweak (change scope/owner/date)">✎</button>
            <button class="priority-btn remove ${decision === 'remove' ? 'selected' : ''}" data-decision="remove" data-action-id="${a.id}" title="Remove from priorities">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Step 1 status
  const reviewedCount = openActions.filter(a => decisions[a.id]).length;
  const step1Status = document.getElementById('step-1-status');
  if (openActions.length === 0) {
    step1Status.textContent = 'N/A';
    step1Status.classList.remove('done');
  } else if (reviewedCount === openActions.length) {
    step1Status.textContent = 'Complete';
    step1Status.classList.add('done');
  } else {
    step1Status.textContent = `${reviewedCount} / ${openActions.length}`;
    step1Status.classList.remove('done');
  }

  // Step 2: Concerns by type
  ['people', 'system', 'suppliers', 'other'].forEach(type => {
    const el = document.getElementById('concerns-' + type);
    if (!el) return;
    const items = (data.concerns || []).filter(c => c.type === type);
    if (items.length === 0) {
      el.innerHTML = '<div class="concern-empty">None raised</div>';
    } else {
      el.innerHTML = items.map(c => {
        const sevIcon = c.severity === 'urgent' ? '🔴' : c.severity === 'action' ? '🟠' : '🟡';
        return `
          <div class="concern-item">
            <div>
              <div class="concern-text">${sevIcon} ${escapeHtml(c.text)}</div>
              <div class="concern-meta">${escapeHtml(c.raisedBy || '—')} · ${formatDueDate(c.date)}</div>
            </div>
            <button class="icon-btn danger" data-action="delete-concern" data-id="${c.id}" title="Remove">✕</button>
          </div>
        `;
      }).join('');
    }
  });

  // Step 2 status
  const totalConcerns = (data.concerns || []).length;
  const step2Status = document.getElementById('step-2-status');
  if (totalConcerns > 0) {
    step2Status.textContent = `${totalConcerns} captured`;
    step2Status.classList.add('done');
  } else {
    step2Status.textContent = 'Pending';
    step2Status.classList.remove('done');
  }

  // Step 3: New initiatives proposed this period
  const niList = document.getElementById('new-initiatives-list');
  const newIs = data.newInitiatives || [];
  if (newIs.length === 0) {
    niList.innerHTML = '';
  } else {
    niList.innerHTML = newIs.map(ni => {
      const p = data.pillars.find(pi => pi.id === ni.pillar);
      return `
        <div class="initiative-item">
          <div>
            <div class="init-desc">${escapeHtml(ni.desc)}</div>
            <div class="init-meta">
              <span><strong>Strategic Pillar:</strong> ${p ? escapeHtml(p.name) : '—'}</span>
              <span><strong>Owner:</strong> ${escapeHtml(ni.owner)}</span>
              <span><strong>Due:</strong> ${formatDueDate(ni.due)}</span>
            </div>
            ${ni.rationale ? `<div style="font-size:11px;color:var(--grey-mid);margin-top:6px;font-style:italic;">${escapeHtml(ni.rationale)}</div>` : ''}
          </div>
          <div style="display:flex;gap:6px;">
            <button class="icon-btn primary" data-action="promote-initiative" data-id="${ni.id}" title="Promote to action" style="background:var(--tag-green);color:white;">→</button>
            <button class="icon-btn danger" data-action="delete-initiative-proposal" data-id="${ni.id}" title="Reject">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  // Step 3 status
  const step3Status = document.getElementById('step-3-status');
  if (newIs.length > 0) {
    step3Status.textContent = `${newIs.length} proposed`;
    step3Status.classList.add('done');
  } else {
    step3Status.textContent = 'No new this month';
    step3Status.classList.remove('done');
  }

  // Past reviews
  renderPastReviews();
}

function renderPastReviews() {
  const el = document.getElementById('past-reviews-list');
  const reviews = data.monthlyReviews || [];
  if (reviews.length === 0) {
    el.innerHTML = '<div class="audit-empty">No completed reviews yet.</div>';
    return;
  }
  el.innerHTML = `
    <div class="past-review-row head">
      <div>Month</div><div>Summary</div><div>Kept</div><div>Tweaked</div><div>Removed</div>
    </div>
    ${reviews.slice().reverse().map(r => `
      <div class="past-review-row">
        <div class="pr-month">${escapeHtml(r.month)}</div>
        <div style="font-size:12px;color:var(--grey-mid);">${escapeHtml(r.summary || 'Completed')}</div>
        <div class="pr-count k">${r.kept || 0}</div>
        <div class="pr-count t">${r.tweaked || 0}</div>
        <div class="pr-count r">${r.removed || 0}</div>
      </div>
    `).join('')}
  `;
}

function populateConcernOwnerSelect() {
  const sel = document.getElementById('new-c-owner');
  sel.innerHTML = OWNERS.map(o => `<option value="${o}">${o}</option>`).join('');
}

function populateNewInitiativeSelects() {
  document.getElementById('ni-owner').innerHTML = OWNERS.map(o => `<option value="${o}">${o}</option>`).join('');
  document.getElementById('ni-pillar').innerHTML = '<option value="">— Select pillar —</option>' +
    data.pillars.map(p => `<option value="${p.id}">${p.num} · ${escapeHtml(p.name)}</option>`).join('');
}

// Priority decision buttons (event delegation)
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('.priority-btn');
  if (!btn) return;
  const decision = btn.dataset.decision;
  const actionId = btn.dataset.actionId;
  if (!decision || !actionId) return;

  if (decision === 'keep') {
    if (!data.currentReview.decisions) data.currentReview.decisions = {};
    data.currentReview.decisions[actionId] = 'keep';
    const a = data.actions.find(x => x.id === actionId);
    logAudit({
      action: 'edit', area: 'action',
      pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
      actionOwner: a.owner, itemName: a.desc,
      summary: `Monthly review: kept "${a.desc}"`,
      detail: 'Confirmed still aligned with SLT strategy'
    });
    renderMonthlyReview();
    save();
  } else if (decision === 'tweak') {
    const a = data.actions.find(x => x.id === actionId);
    if (!a) return;
    document.getElementById('tweak-action-id').value = actionId;
    document.getElementById('tweak-reason').value = '';
    document.getElementById('tweak-desc').value = a.desc;
    document.getElementById('tweak-due').value = a.due || '';
    document.getElementById('tweak-owner').innerHTML = OWNERS.map(o => `<option value="${o}" ${o === a.owner ? 'selected' : ''}>${o}</option>`).join('');
    openModal('modal-tweak');
  } else if (decision === 'remove') {
    document.getElementById('remove-action-id').value = actionId;
    document.getElementById('remove-reason').value = '';
    openModal('modal-remove-priority');
  }
});

// Save tweak
document.getElementById('save-tweak').addEventListener('click', () => {
  const id = document.getElementById('tweak-action-id').value;
  const a = data.actions.find(x => x.id === id);
  if (!a) return;
  const reason = document.getElementById('tweak-reason').value.trim();
  const newDesc = document.getElementById('tweak-desc').value.trim();
  const newOwner = document.getElementById('tweak-owner').value;
  const newDue = document.getElementById('tweak-due').value;

  if (!reason) { toast('Reason required for audit', 'error'); return; }

  const changes = [];
  if (a.desc !== newDesc) changes.push(`description`);
  if (a.owner !== newOwner) changes.push(`owner (${a.owner} → ${newOwner})`);
  if (a.due !== newDue) changes.push(`due (${a.due || '—'} → ${newDue || '—'})`);

  a.desc = newDesc;
  a.owner = newOwner;
  a.due = newDue;

  if (!data.currentReview.decisions) data.currentReview.decisions = {};
  data.currentReview.decisions[id] = 'tweak';

  logAudit({
    action: 'edit', area: 'action',
    pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
    actionOwner: a.owner, itemName: a.desc,
    summary: `Monthly review: tweaked "${a.desc}"`,
    detail: `Changes: ${changes.join(', ') || 'none'} · Reason: ${reason}`
  });

  closeModal('modal-tweak');
  renderAll();
  renderMonthlyReview();
  toast('Action tweaked', 'success');
});

// Save remove
document.getElementById('save-remove-priority').addEventListener('click', () => {
  const id = document.getElementById('remove-action-id').value;
  const a = data.actions.find(x => x.id === id);
  if (!a) return;
  const reason = document.getElementById('remove-reason').value.trim();
  if (!reason) { toast('Reason required', 'error'); return; }

  logAudit({
    action: 'delete', area: 'action',
    pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
    actionOwner: a.owner, itemName: a.desc,
    summary: `Monthly review: removed "${a.desc}"`,
    detail: `Reason: ${reason}`
  });

  if (!data.currentReview.decisions) data.currentReview.decisions = {};
  data.currentReview.decisions[id] = 'remove';
  // Actually remove the action
  data.actions = data.actions.filter(x => x.id !== id);

  closeModal('modal-remove-priority');
  renderAll();
  renderMonthlyReview();
  toast('Action removed', 'success');
});

// Add concern
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-concern-type]');
  if (!btn) return;
  populateConcernOwnerSelect();
  document.getElementById('concern-type').value = btn.dataset.concernType;
  document.getElementById('modal-concern-title').textContent = `Add ${btn.dataset.concernType.charAt(0).toUpperCase()+btn.dataset.concernType.slice(1)} Concern`;
  document.getElementById('new-c-text').value = '';
  document.getElementById('new-c-severity').value = 'watch';
  if (currentUser) {
    // try to auto-set owner if currentUser matches an initial
    const match = OWNERS.find(o => o.toLowerCase() === currentUser.toLowerCase());
    if (match) document.getElementById('new-c-owner').value = match;
  }
  openModal('modal-concern');
});

document.getElementById('save-concern').addEventListener('click', () => {
  const text = document.getElementById('new-c-text').value.trim();
  if (!text) { toast('Concern text required', 'error'); return; }
  const concern = {
    id: uid('c'),
    type: document.getElementById('concern-type').value,
    text,
    severity: document.getElementById('new-c-severity').value,
    raisedBy: document.getElementById('new-c-owner').value,
    date: new Date().toISOString().slice(0, 10)
  };
  if (!data.concerns) data.concerns = [];
  data.concerns.push(concern);
  logAudit({
    action: 'add', area: 'concern', pillarId: null, pillarName: null,
    actionOwner: concern.raisedBy, itemName: text,
    summary: `Raised ${concern.type} concern (${concern.severity})`,
    detail: text
  });
  closeModal('modal-concern');
  renderMonthlyReview();
  save();
  toast('Concern raised', 'success');
});

// Delete concern
document.body.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action="delete-concern"]');
  if (!target) return;
  const c = (data.concerns || []).find(x => x.id === target.dataset.id);
  if (!c) return;
  if (!confirm('Remove this concern? It will stay in the audit log.')) return;
  logAudit({
    action: 'delete', area: 'concern', pillarId: null, pillarName: null,
    actionOwner: c.raisedBy, itemName: c.text,
    summary: `Closed concern: "${c.text}"`,
    detail: `Type: ${c.type} · Severity: ${c.severity}`
  });
  data.concerns = data.concerns.filter(x => x.id !== c.id);
  renderMonthlyReview();
  save();
});

// New initiative button
document.getElementById('add-new-initiative-btn').addEventListener('click', () => {
  populateNewInitiativeSelects();
  document.getElementById('ni-desc').value = '';
  document.getElementById('ni-rationale').value = '';
  document.getElementById('ni-due').value = '';
  openModal('modal-new-initiative');
});

// Save new initiative
document.getElementById('save-new-initiative').addEventListener('click', () => {
  const desc = document.getElementById('ni-desc').value.trim();
  const pillar = document.getElementById('ni-pillar').value;
  const rationale = document.getElementById('ni-rationale').value.trim();
  const owner = document.getElementById('ni-owner').value;
  const due = document.getElementById('ni-due').value;
  if (!desc) { toast('Description required', 'error'); return; }
  if (!pillar) { toast('Must select a pillar — this is the alignment gate', 'error'); return; }
  if (!rationale) { toast('Strategic rationale required', 'error'); return; }

  const ni = { id: uid('ni'), desc, pillar, rationale, owner, due, proposedAt: new Date().toISOString() };
  if (!data.newInitiatives) data.newInitiatives = [];
  data.newInitiatives.push(ni);
  logAudit({
    action: 'add', area: 'new-initiative',
    pillarId: pillar, pillarName: pillarNameForId(pillar),
    actionOwner: owner, itemName: desc,
    summary: `Proposed new initiative: "${desc}"`,
    detail: `Strategic Pillar: ${pillarNameForId(pillar)} · Rationale: ${rationale}`
  });
  closeModal('modal-new-initiative');
  renderMonthlyReview();
  save();
  toast('Initiative added to backlog', 'success');
});

// Promote / delete initiative proposals
document.body.addEventListener('click', (e) => {
  const promote = e.target.closest('[data-action="promote-initiative"]');
  const del = e.target.closest('[data-action="delete-initiative-proposal"]');
  if (promote) {
    const ni = (data.newInitiatives || []).find(x => x.id === promote.dataset.id);
    if (!ni) return;
    // Promote to action
    const newAction = {
      id: uid('a'),
      pillar: ni.pillar,
      desc: ni.desc,
      owner: ni.owner,
      due: ni.due,
      start: '',
      rag: 'amber',
      complete: false,
      notes: 'Promoted from monthly review · ' + (ni.rationale || '')
    };
    data.actions.push(newAction);
    data.newInitiatives = data.newInitiatives.filter(x => x.id !== ni.id);
    logAudit({
      action: 'add', area: 'action',
      pillarId: ni.pillar, pillarName: pillarNameForId(ni.pillar),
      actionOwner: ni.owner, itemName: ni.desc,
      summary: `Promoted initiative to live action: "${ni.desc}"`,
      detail: `From monthly review proposal`
    });
    renderAll();
    renderMonthlyReview();
    toast('Promoted to live action', 'success');
  } else if (del) {
    const ni = (data.newInitiatives || []).find(x => x.id === del.dataset.id);
    if (!ni) return;
    if (!confirm('Reject this initiative proposal?')) return;
    logAudit({
      action: 'delete', area: 'new-initiative',
      pillarId: ni.pillar, pillarName: pillarNameForId(ni.pillar),
      actionOwner: ni.owner, itemName: ni.desc,
      summary: `Rejected initiative proposal: "${ni.desc}"`,
      detail: ''
    });
    data.newInitiatives = data.newInitiatives.filter(x => x.id !== ni.id);
    renderMonthlyReview();
    save();
  }
});

// Complete monthly review
document.getElementById('complete-review-btn').addEventListener('click', () => {
  const decisions = data.currentReview.decisions || {};
  const counts = { kept: 0, tweaked: 0, removed: 0 };
  Object.values(decisions).forEach(d => {
    if (d === 'keep') counts.kept++;
    else if (d === 'tweak') counts.tweaked++;
    else if (d === 'remove') counts.removed++;
  });
  const concernCount = (data.concerns || []).length;
  const newInitCount = (data.newInitiatives || []).length;

  if (counts.kept + counts.tweaked + counts.removed === 0 && concernCount === 0 && newInitCount === 0) {
    if (!confirm('No decisions captured this month. Finalise anyway?')) return;
  }

  const month = currentMonthLabel();
  const summary = `${counts.kept} kept · ${counts.tweaked} tweaked · ${counts.removed} removed · ${concernCount} concerns · ${newInitCount} new initiatives`;
  if (!data.monthlyReviews) data.monthlyReviews = [];
  data.monthlyReviews.push({
    id: uid('mr'),
    month,
    completedAt: new Date().toISOString(),
    completedBy: currentUser || 'Unknown',
    summary,
    kept: counts.kept,
    tweaked: counts.tweaked,
    removed: counts.removed,
    concerns: concernCount,
    newInitiatives: newInitCount
  });
  logAudit({
    action: 'edit', area: 'monthly-review',
    pillarId: null, pillarName: null,
    itemName: month,
    summary: `Completed ${month} review`,
    detail: summary
  });
  // Reset current review decisions but keep concerns and initiatives (they persist between reviews)
  data.currentReview = { decisions: {}, started: null };
  renderMonthlyReview();
  save();
  toast(`${month} review finalised`, 'success');
});

// Hook into tab change
document.querySelector('[data-view="monthly"]').addEventListener('click', () => renderMonthlyReview());

// =================================================================
// FILTER BAR
// =================================================================
function populateFilterDropdowns() {
  // Pillar
  const pillarSel = document.getElementById('filter-pillar');
  const curPillar = filterState.pillar;
  pillarSel.innerHTML = '<option value="all">All Strategic Pillars</option>' +
    data.pillars.map(p => `<option value="${p.id}">${escapeHtml(p.num + ' · ' + p.name)}</option>`).join('');
  pillarSel.value = curPillar;
  pillarSel.classList.toggle('has-filter', curPillar !== 'all');

  // Initiative — only meaningful when a pillar is focused; show/hide accordingly
  const initGroup = document.getElementById('filter-initiative-group');
  const initSel = document.getElementById('filter-initiative');
  if (initGroup && initSel) {
    const focusedPillar = curPillar !== 'all' ? data.pillars.find(p => p.id === curPillar) : null;
    const initiatives = focusedPillar && Array.isArray(focusedPillar.objectives) ? focusedPillar.objectives : [];
    if (focusedPillar && initiatives.length > 0 && (typeof viewMode === 'undefined' || viewMode !== 'objective')) {
      initGroup.style.display = '';
      // Build options: All initiatives + each initiative letter+text
      initSel.innerHTML = '<option value="all">All initiatives</option>' +
        initiatives.map((o, i) => `<option value="${o.id}">${String.fromCharCode(65 + i)} · ${escapeHtml(truncate(o.text, 40))}</option>`).join('');
      // Reset if currently-selected initiative isn't in this pillar
      if (filterState.initiative !== 'all' && !initiatives.find(o => o.id === filterState.initiative)) {
        filterState.initiative = 'all';
      }
      initSel.value = filterState.initiative;
      initSel.classList.toggle('has-filter', filterState.initiative !== 'all');
    } else {
      initGroup.style.display = 'none';
      filterState.initiative = 'all';
    }
  }

  // Owner — show all owners who appear in current actions, plus the canonical list
  const ownerSel = document.getElementById('filter-owner');
  const curOwner = filterState.owner;
  const ownersInUse = new Set(data.actions.map(a => a.owner).filter(Boolean));
  const allOwners = [...new Set([...OWNERS, ...ownersInUse])].sort();
  ownerSel.innerHTML = '<option value="all">All Owners</option>' +
    allOwners.map(o => `<option value="${o}">${escapeHtml(o)}</option>`).join('');
  ownerSel.value = curOwner;
  ownerSel.classList.toggle('has-filter', curOwner !== 'all');

  // Status
  const statusSel = document.getElementById('filter-status');
  statusSel.value = filterState.status;
  statusSel.classList.toggle('has-filter', filterState.status !== 'all');

  // Clear button + result count
  const clearBtn = document.getElementById('filter-clear');
  const active = isAnyFilterActive();
  clearBtn.classList.toggle('active', active);
  const filtered = applyFilters(data.actions);
  const resultEl = document.getElementById('filter-result');
  if (active) {
    resultEl.innerHTML = `Showing <strong>${filtered.length}</strong> of <strong>${data.actions.length}</strong> actions`;
  } else {
    resultEl.innerHTML = '';
  }
}

function applyFilterChange() {
  populateFilterDropdowns();
  renderPillars();
}

document.getElementById('filter-pillar').addEventListener('change', e => {
  filterState.pillar = e.target.value;
  // Switching pillar wipes any initiative filter since initiatives are pillar-scoped
  filterState.initiative = 'all';
  applyFilterChange();
});
document.getElementById('filter-initiative').addEventListener('change', e => {
  filterState.initiative = e.target.value;
  applyFilterChange();
});
document.getElementById('filter-owner').addEventListener('change', e => {
  filterState.owner = e.target.value;
  applyFilterChange();
});
document.getElementById('filter-status').addEventListener('change', e => {
  filterState.status = e.target.value;
  applyFilterChange();
});
document.getElementById('filter-clear').addEventListener('click', () => {
  // Keep pillar — clearing should reset the cross-cutting filters (initiative/owner/status)
  // but not undo the pillar drill-down. Use the breadcrumb 'Home' to leave pillar focus.
  filterState = { pillar: filterState.pillar, initiative: 'all', owner: 'all', status: 'all' };
  applyFilterChange();
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  // Ignore if user is typing in an input/textarea/contenteditable
  const tag = (e.target.tagName || '').toUpperCase();
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable) return;
  // Cmd/Ctrl combos — leave alone
  if (e.metaKey || e.ctrlKey || e.altKey) return;

  if (e.key === 'n' || e.key === 'N') {
    // Quick add — pick up current focus context
    e.preventDefault();
    const pillarId = (viewMode === 'focus' || viewMode === 'objective') ? focusedPillarId : null;
    const objectiveId = (viewMode === 'objective') ? focusedObjectiveId : null;
    openActionModal(pillarId, null, objectiveId);
  } else if (e.key === 'Escape') {
    // Close any open panel / modal
    document.querySelectorAll('.modal-backdrop.show').forEach(m => m.classList.remove('show'));
    const panel = document.getElementById('action-list-panel');
    if (panel && panel.classList.contains('show')) {
      panel.classList.remove('show');
      activeFilter = null;
    }
  } else if (e.key === '?') {
    e.preventDefault();
    toast('Shortcuts: N = new action · Esc = close · 1-6 = tabs', 'success');
  } else if (e.key >= '1' && e.key <= '6') {
    // Tabs
    const tabs = document.querySelectorAll('.tab');
    const idx = parseInt(e.key) - 1;
    if (tabs[idx]) tabs[idx].click();
  }
});

// =================================================================
// REFERENCE DROPDOWN
// =================================================================
const refToggle = document.getElementById('reference-toggle');
const refMenu = document.getElementById('reference-menu');
refToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  const isOpen = refMenu.classList.contains('open');
  refMenu.classList.toggle('open', !isOpen);
  refToggle.setAttribute('aria-expanded', String(!isOpen));
});
document.addEventListener('click', (e) => {
  if (refMenu.classList.contains('open') && !refMenu.contains(e.target) && e.target !== refToggle) {
    refMenu.classList.remove('open');
    refToggle.setAttribute('aria-expanded', 'false');
  }
});
// Reference menu items
document.querySelectorAll('.ref-item').forEach(item => {
  item.addEventListener('click', () => {
    refMenu.classList.remove('open');
    refToggle.setAttribute('aria-expanded', 'false');
    // Special-case: the download-report item has no view, it triggers an export
    if (item.id === 'ref-download-report') {
      downloadSummaryReport();
      return;
    }
    const view = item.dataset.view;
    if (!view) return;
    // Activate the relevant view
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + view).classList.add('active');
    // Mark the Reference toggle as "active" state visually
    refToggle.classList.add('active');
    // Render the view content
    if (view === 'audit') renderAudit();
    if (view === 'weekly') renderWeeklyCheck();
    if (view === 'monthly') renderMonthlyReview();
    if (view === 'completed') renderCompleted();
    if (view === 'summary') renderSummary();
  });
});

// =================================================================
// EXPORT — SUMMARY REPORT (self-contained HTML)
// =================================================================
function buildSummaryReportHtml(opts) {
  // opts.weekId : optional — which weekly check to base the report on. Default: most recent completed.
  // opts.priorityDecisions : optional — keep/tweak/drop decisions if generated from a session
  opts = opts || {};
  const allChecks = (data.weeklyChecks || []).slice().sort((a, b) => b.weekCommencing.localeCompare(a.weekCommencing));
  const check = opts.weekId
    ? allChecks.find(c => c.id === opts.weekId)
    : (allChecks.find(c => c.completed) || allChecks[0] || data.currentWeeklyCheck);
  const weekLabel = check ? formatWeekLabelLong(check.weekCommencing) : 'No completed check yet';

  // Heartbeat data
  let heartbeatHtml = '';
  let overallVerdict = 'No check completed';
  let overallColor = '#7F8C8D';
  let flaggedItems = [];
  if (check) {
    overallVerdict = (() => {
      const v = overallRagForCheck(check);
      if (v === 'red') return 'OFF TRACK';
      if (v === 'amber') return 'WATCH';
      if (v === 'green') return 'ON TRACK';
      return 'INCOMPLETE';
    })();
    overallColor = overallVerdict === 'OFF TRACK' ? '#C0392B' : overallVerdict === 'WATCH' ? '#F39C12' : overallVerdict === 'ON TRACK' ? '#27AE60' : '#7F8C8D';

    flaggedItems = collectFlaggedCells(check);

    heartbeatHtml = getSectors().map(sector => {
      let sectorWorst = null;
      sector.metrics.forEach(m => {
        const cell = check.items[cellKey(sector.id, m.id)];
        if (!cell || !cell.rag) return;
        if (cell.rag === 'red') sectorWorst = 'red';
        else if (cell.rag === 'amber' && sectorWorst !== 'red') sectorWorst = 'amber';
        else if (cell.rag === 'green' && !sectorWorst) sectorWorst = 'green';
      });
      const sectorColor = sectorWorst === 'red' ? '#C0392B' : sectorWorst === 'amber' ? '#F39C12' : sectorWorst === 'green' ? '#27AE60' : '#ECF0F1';
      return `
        <div class="hb-sector" style="border-left:6px solid ${sectorColor};">
          <div class="hb-sector-head">
            <span class="hb-sector-name">${escapeHtml(sector.name)}</span>
            ${sectorWorst ? `<span class="hb-tag" style="background:${sectorColor};">${sectorWorst.toUpperCase()}</span>` : ''}
          </div>
          <table class="hb-table">
            <thead><tr><th>Metric</th><th>Status</th><th>Note</th></tr></thead>
            <tbody>
              ${sector.metrics.map(metric => {
                const cell = check.items[cellKey(sector.id, metric.id)] || { rag: null, note: '' };
                const rag = cell.rag;
                const c = rag === 'red' ? '#C0392B' : rag === 'amber' ? '#F39C12' : rag === 'green' ? '#27AE60' : '#7F8C8D';
                const label = rag ? rag.toUpperCase() : '—';
                return `
                  <tr>
                    <td><strong>${escapeHtml(metric.label)}</strong></td>
                    <td><span class="hb-pill" style="background:${c};">${label}</span></td>
                    <td>${cell.note ? escapeHtml(cell.note) : '<span class="muted">—</span>'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('');
  }

  // Flagged this week section
  let flaggedHtml = '';
  if (flaggedItems.length > 0) {
    flaggedHtml = `
      <section>
        <h2>🚩 Flagged this week</h2>
        <p class="section-intro">Items raised in the heartbeat that need leadership attention.</p>
        <table class="flagged-table">
          <thead><tr><th>Sector</th><th>Metric</th><th>Status</th><th>Note</th></tr></thead>
          <tbody>
            ${flaggedItems.map(f => {
              const c = f.rag === 'red' ? '#C0392B' : '#F39C12';
              return `
                <tr>
                  <td><strong>${escapeHtml(f.sectorName)}</strong></td>
                  <td>${escapeHtml(f.metricLabel)}</td>
                  <td><span class="hb-pill" style="background:${c};">${f.rag.toUpperCase()}</span></td>
                  <td>${f.note ? escapeHtml(f.note) : '<span class="muted">—</span>'}</td>
                </tr>
              `;
            }).join('')}
          </tbody>
        </table>
      </section>
    `;
  }

  // Hot actions (open + red/amber/overdue)
  const hot = data.actions.filter(a => {
    if (a.complete) return false;
    if (a.rag === 'red' || a.rag === 'amber') return true;
    if (a.due && daysUntil(a.due) < 0) return true;
    return false;
  });
  const hotByPillar = {};
  hot.forEach(a => {
    if (!hotByPillar[a.pillar]) hotByPillar[a.pillar] = [];
    hotByPillar[a.pillar].push(a);
  });
  function actionSortKey(a) {
    if (a.due && daysUntil(a.due) < 0) return 0;
    if (a.rag === 'red') return 1;
    if (a.rag === 'amber') return 2;
    return 3;
  }
  let hotHtml;
  if (hot.length === 0) {
    hotHtml = `<p class="empty-note">No open actions are red, amber or overdue. Everything's tracking healthy.</p>`;
  } else {
    hotHtml = data.pillars.map(p => {
      const items = (hotByPillar[p.id] || []).slice().sort((a, b) => {
        const k = actionSortKey(a) - actionSortKey(b);
        if (k !== 0) return k;
        if (!a.due && !b.due) return 0;
        if (!a.due) return 1;
        if (!b.due) return -1;
        return a.due.localeCompare(b.due);
      });
      if (items.length === 0) return '';
      const styleNum = pillarStyleNum(p.id);
      const pillarColors = ['#E67E22', '#C2185B', '#00897B', '#7B1FA2'];
      const pillarColor = pillarColors[styleNum - 1] || '#1E7A47';
      return `
        <div class="report-pillar" style="border-top:4px solid ${pillarColor};">
          <h3 style="color:${pillarColor};">${escapeHtml(p.num)} · ${escapeHtml(p.name)} <span class="count-pill">${items.length} hot</span></h3>
          <table class="actions-table">
            <thead><tr><th>Status</th><th>Action</th><th>Owner</th><th>Due</th><th>Initiative</th></tr></thead>
            <tbody>
              ${items.map(a => {
                const overdue = a.due && daysUntil(a.due) < 0;
                const ragC = a.rag === 'red' ? '#C0392B' : a.rag === 'amber' ? '#F39C12' : '#27AE60';
                const objInfo = findObjective(a.objectiveId);
                const dueText = a.due ? formatDueDate(a.due) + (overdue ? ` <span class="overdue-tag">⚠ ${Math.abs(daysUntil(a.due))}d overdue</span>` : '') : '<span class="muted">No date</span>';
                return `
                  <tr>
                    <td><span class="hb-pill" style="background:${ragC};">${a.rag.toUpperCase()}</span></td>
                    <td>${escapeHtml(a.desc)}${a.notes ? `<div class="action-note-inline">${escapeHtml(a.notes)}</div>` : ''}</td>
                    <td><span class="owner-tag">${escapeHtml(a.owner || '?')}</span></td>
                    <td>${dueText}</td>
                    <td>${objInfo ? escapeHtml(objInfo.objective.text) : '<span class="muted">—</span>'}</td>
                  </tr>
                `;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('');
  }

  // Strategic picture — RAG mix per pillar
  const pillarStripHtml = data.pillars.map(p => {
    const styleNum = pillarStyleNum(p.id);
    const stats = pillarStatsFor(p.id);
    const pillarColors = ['#E67E22', '#C2185B', '#00897B', '#7B1FA2'];
    const pillarColor = pillarColors[styleNum - 1] || '#1E7A47';
    const total = stats.red + stats.amber + stats.green;
    const objectives = (p.objectives || []).map(o => escapeHtml(o.text)).join(' · ');
    let mixBar = '<div class="mix-empty">No open actions</div>';
    if (total > 0) {
      const r = (stats.red / total * 100), a = (stats.amber / total * 100), g = (stats.green / total * 100);
      mixBar = `<div class="mix-bar">
        ${stats.red > 0 ? `<div class="mix-seg" style="background:#C0392B;width:${r}%;"></div>` : ''}
        ${stats.amber > 0 ? `<div class="mix-seg" style="background:#F39C12;width:${a}%;"></div>` : ''}
        ${stats.green > 0 ? `<div class="mix-seg" style="background:#27AE60;width:${g}%;"></div>` : ''}
      </div>`;
    }
    return `
      <div class="pillar-card" style="border-top:6px solid ${pillarColor};">
        <div class="pc-num" style="color:${pillarColor};">${escapeHtml(p.num)}</div>
        <h4>${escapeHtml(p.name)}</h4>
        <div class="pc-objectives">${objectives || '<span class="muted">No initiatives yet</span>'}</div>
        ${mixBar}
        <div class="pc-counts">
          ${stats.red > 0 ? `<span class="ct red">${stats.red} R</span>` : ''}
          ${stats.amber > 0 ? `<span class="ct amber">${stats.amber} A</span>` : ''}
          ${stats.green > 0 ? `<span class="ct green">${stats.green} G</span>` : ''}
          ${stats.overdue > 0 ? `<span class="ct overdue">⚠ ${stats.overdue} overdue</span>` : ''}
        </div>
      </div>
    `;
  }).join('');

  // AOB items (if passed in from session)
  let aobHtml = '';
  if (opts.aob && opts.aob.length > 0) {
    aobHtml = `
      <section>
        <h2>AOB — Any Other Business</h2>
        <p class="section-intro">Items raised in the meeting that aren't tracked elsewhere yet.</p>
        <ol class="aob-report-list">
          ${opts.aob.map(item => `<li>${escapeHtml(item)}</li>`).join('')}
        </ol>
      </section>
    `;
  }

  // Coverage decisions (if passed in from session)
  let prioHtml = '';
  if (opts.priorityDecisions && Object.keys(opts.priorityDecisions).length > 0) {
    const rows = Object.entries(opts.priorityDecisions).map(([objId, decision]) => {
      const info = findObjective(objId);
      if (!info) return '';
      const decisionLabel = decision === 'keep' ? 'KEEP' : decision === 'tweak' ? 'TWEAK' : decision === 'added' ? 'NEW' : 'DROP';
      const decisionColor = decision === 'keep' ? '#27AE60' : decision === 'tweak' ? '#F39C12' : decision === 'added' ? '#0F4A2A' : '#C0392B';
      return `
        <tr>
          <td><strong>${escapeHtml(info.pillar.num)} · ${escapeHtml(info.pillar.name)}</strong></td>
          <td>${escapeHtml(info.objective.text)}</td>
          <td><span class="hb-pill" style="background:${decisionColor};">${decisionLabel}</span></td>
        </tr>
      `;
    }).filter(Boolean).join('');
    if (rows) {
      prioHtml = `
        <section>
          <h2>Strategic Pillar Coverage Decisions</h2>
          <p class="section-intro">Add / Keep / Tweak / Drop calls on initiatives during this session.</p>
          <table class="prio-table">
            <thead><tr><th>Strategic Pillar</th><th>Initiative</th><th>Decision</th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </section>
      `;
    }
  }

  // Generated metadata
  const now = new Date();
  const generatedAt = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) + ' · ' + now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  const generatedBy = (currentUser && currentUser.trim()) ? currentUser : '—';

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Operational Leadership Team's Plan — ${escapeHtml(weekLabel)}</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #F5F7F6;
    color: #2C3E50;
    line-height: 1.5;
    padding: 32px;
  }
  .doc {
    max-width: 1100px;
    margin: 0 auto;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  header.cover {
    background: linear-gradient(135deg, #0F4A2A 0%, #1E7A47 100%);
    color: white;
    padding: 40px 48px;
    position: relative;
    overflow: hidden;
  }
  header.cover::before {
    content: '';
    position: absolute;
    top: -50%; right: -8%;
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
    border-radius: 50%;
  }
  header.cover .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    opacity: 0.85;
    margin-bottom: 10px;
    font-weight: 600;
  }
  header.cover h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 8px;
  }
  header.cover .week {
    font-size: 16px;
    opacity: 0.92;
    margin-bottom: 24px;
  }
  .verdict-pill {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: white;
    color: #0F4A2A;
    padding: 10px 22px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  .verdict-pill .dot {
    width: 12px; height: 12px;
    border-radius: 50%;
    background: ${overallColor};
  }

  main { padding: 32px 48px; }

  section { margin-bottom: 36px; }
  section h2 {
    font-size: 18px;
    font-weight: 700;
    color: #0F4A2A;
    margin-bottom: 4px;
    padding-bottom: 8px;
    border-bottom: 2px solid #D4E8DC;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-intro {
    font-size: 12px;
    color: #7F8C8D;
    margin-bottom: 14px;
    margin-top: 8px;
  }

  /* Heartbeat section */
  .hb-sector {
    background: #F4F6F7;
