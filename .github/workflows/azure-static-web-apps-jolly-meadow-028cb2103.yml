  .metric-row-note:focus { outline: none; border-color: var(--tag-green); }
  .metric-row-note::placeholder { color: var(--grey-mid); font-style: italic; }
  .metric-row-rag {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  @media (max-width: 700px) {
    .metric-row { grid-template-columns: 1fr; gap: 8px; }
    .metric-row-rag { justify-content: flex-start; }
  }

  /* Flagged this week — top of Step 2 */
  .flagged-section {
    background: rgba(243, 156, 18, 0.07);
    border: 1.5px solid rgba(243, 156, 18, 0.3);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }
  .flagged-section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .flagged-section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--grey-dark);
  }
  .flagged-section-count {
    font-size: 11px;
    color: var(--grey-mid);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .flagged-list { display: flex; flex-direction: column; gap: 8px; }
  .flagged-item {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 12px;
    padding: 10px 12px;
    background: white;
    border-radius: 10px;
    border-left: 4px solid var(--grey-light);
    align-items: center;
  }
  .flagged-item.rag-amber { border-left-color: var(--amber); }
  .flagged-item.rag-red { border-left-color: var(--red); }
  .flagged-item-rag-pill {
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 5px;
    letter-spacing: 0.05em;
  }
  .flagged-item-rag-pill.rag-amber { background: var(--amber); }
  .flagged-item-rag-pill.rag-red { background: var(--red); }
  .flagged-item-content { min-width: 0; }
  .flagged-item-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey-dark);
    margin-bottom: 3px;
  }
  .flagged-item-note {
    font-size: 12px;
    color: var(--grey-mid);
    line-height: 1.4;
    font-style: italic;
  }
  .flagged-item-note.empty { opacity: 0.6; }
  .flagged-create-action-btn {
    background: var(--tag-green-dark);
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 7px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .flagged-create-action-btn:hover { background: var(--tag-green); }

  .hot-actions-section-head {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey-mid);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
    margin-top: 8px;
  }
  .weekly-item-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--tag-green-dark);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .weekly-item-content { min-width: 0; }
  .weekly-item-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--grey-dark);
    margin-bottom: 3px;
  }
  .weekly-item-prompt {
    font-size: 12px;
    color: var(--grey-mid);
    line-height: 1.5;
    margin-bottom: 10px;
  }
  .weekly-item-note {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
    color: var(--grey-dark);
    background: white;
    transition: border-color 0.15s;
    resize: vertical;
    min-height: 36px;
  }
  .weekly-item-note:focus { outline: none; border-color: var(--tag-green); }
  .weekly-item-note::placeholder { color: var(--grey-mid); font-style: italic; }
  .weekly-item-rag {
    display: flex;
    gap: 6px;
    flex-direction: column;
  }
  .weekly-rag-btn {
    width: 42px;
    height: 32px;
    border-radius: 8px;
    border: 2px solid var(--grey-light);
    background: white;
    cursor: pointer;
    font-size: 11px;
    font-weight: 700;
    font-family: var(--font-body);
    color: var(--grey-mid);
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0.04em;
  }
  .weekly-rag-btn:hover { border-color: var(--grey-mid); }
  .weekly-rag-btn.green.selected { background: var(--green); border-color: var(--green); color: white; }
  .weekly-rag-btn.amber.selected { background: var(--amber); border-color: var(--amber); color: white; }
  .weekly-rag-btn.red.selected { background: var(--red); border-color: var(--red); color: white; }
  .weekly-rag-btn.green:hover:not(.selected) { color: var(--green); border-color: var(--green); }
  .weekly-rag-btn.amber:hover:not(.selected) { color: var(--amber); border-color: var(--amber); }
  .weekly-rag-btn.red:hover:not(.selected) { color: var(--red); border-color: var(--red); }

  .weekly-check-actions {
    margin-top: 22px;
    padding-top: 20px;
    border-top: 1px solid var(--grey-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .weekly-overall {
    font-size: 13px;
    color: var(--grey-mid);
  }
  .weekly-overall strong { color: var(--grey-dark); font-weight: 700; }
  .weekly-complete-btn {
    background: var(--tag-green-dark);
    color: white;
    border: none;
    padding: 12px 22px;
    border-radius: 10px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .weekly-complete-btn:hover { background: var(--tag-green); }
  .weekly-complete-btn:disabled { background: var(--grey-light); color: var(--grey-mid); cursor: not-allowed; }

  /* History strip */
  .weekly-history-section {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    padding: 22px 28px;
  }
  .weekly-history-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .weekly-history-head h3 {
    font-size: 18px;
    font-weight: 700;
    color: var(--tag-green-dark);
  }
  .weekly-history-legend {
    display: flex;
    gap: 14px;
    font-size: 11px;
    color: var(--grey-mid);
    flex-wrap: wrap;
  }
  .dot-legend {
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .weekly-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .weekly-dot.green { background: var(--green); }
  .weekly-dot.amber { background: var(--amber); }
  .weekly-dot.red { background: var(--red); }
  .weekly-dot.pending { background: var(--grey-light); border: 1.5px solid var(--grey-mid); }

  .weekly-history-strip {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .weekly-history-empty {
    font-size: 13px;
    color: var(--grey-mid);
    font-style: italic;
    text-align: center;
    width: 100%;
    padding: 20px;
  }

  /* ===== METRIC TRENDS (sparklines) ===== */
  .weekly-trends-host { margin-top: 18px; }
  .weekly-trends-empty {
    padding: 14px 18px;
    background: var(--grey-lighter);
    border-radius: 10px;
    font-size: 13px;
    color: var(--grey-mid);
    text-align: center;
  }
  .weekly-trends-empty strong { color: var(--grey-dark); }
  .weekly-trends-block {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: var(--shadow-sm);
  }
  .weekly-trends-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--grey-lighter);
  }
  .weekly-trends-head h3 {
    font-size: 14px;
    font-weight: 700;
    color: var(--tag-green-dark);
    margin: 0;
  }
  .weekly-trends-sub {
    font-size: 11px;
    color: var(--grey-mid);
  }
  .weekly-trends-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 28px;
  }
  @media (max-width: 1100px) {
    .weekly-trends-grid { grid-template-columns: 1fr; }
  }
  .trend-sector {}
  .trend-sector-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--grey-mid);
    margin-bottom: 8px;
  }
  .trend-sector-metrics {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .trend-metric {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    align-items: center;
  }
  .trend-metric-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--grey-dark);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .trend-bars {
    display: inline-flex;
    gap: 3px;
    align-items: flex-end;
    height: 18px;
  }
  .trend-bar {
    display: inline-block;
    width: 10px;
    height: 100%;
    border-radius: 2px;
    background: var(--grey-light);
    cursor: help;
    transition: transform 0.12s;
  }
  .trend-bar:hover { transform: scaleY(1.15); }
  .trend-bar.trend-green   { background: var(--green); }
  .trend-bar.trend-amber   { background: var(--amber); }
  .trend-bar.trend-red     { background: var(--red); }
  .trend-bar.trend-pending { background: var(--grey-light); opacity: 0.5; }
  .trend-flag {
    font-size: 14px;
    color: var(--red);
    cursor: help;
    animation: trend-flag-pulse 2.4s ease-in-out infinite;
  }
  @keyframes trend-flag-pulse {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
  .trend-metric.trend-flagged .trend-metric-label { color: var(--red); }
  /* ===== END TRENDS ===== */
  .weekly-history-card {
    background: var(--grey-lighter);
    border: 1.5px solid var(--grey-light);
    border-radius: 10px;
    padding: 10px 12px;
    min-width: 92px;
    cursor: pointer;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .weekly-history-card:hover {
    border-color: var(--tag-green);
    background: white;
    box-shadow: var(--shadow-sm);
  }
  .weekly-history-card.current {
    border-color: var(--tag-green);
    background: rgba(30, 122, 71, 0.05);
  }
  .weekly-history-card-date {
    font-size: 10px;
    font-weight: 700;
    color: var(--grey-mid);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 8px;
    text-align: center;
  }
  .weekly-history-dots {
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .weekly-history-overall {
    margin-top: 8px;
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .weekly-history-overall.green { color: var(--green); }
  .weekly-history-overall.amber { color: var(--amber); }
  .weekly-history-overall.red { color: var(--red); }

  /* Detail panel */
  .weekly-detail-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 100%;
    max-width: 480px;
    height: 100vh;
    background: white;
    box-shadow: -8px 0 32px rgba(0,0,0,0.15);
    z-index: 100;
    transition: right 0.25s ease-out;
    display: flex;
    flex-direction: column;
  }
  .weekly-detail-panel.show { right: 0; }
  .weekly-detail-head {
    padding: 20px 24px;
    border-bottom: 1px solid var(--grey-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, var(--tag-green-dark), var(--tag-green));
    color: white;
  }
  .weekly-detail-head h3 { font-size: 18px; font-weight: 700; }
  .weekly-detail-head .close-btn {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
  }
  .weekly-detail-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }
  .weekly-detail-item {
    padding: 14px;
    background: var(--grey-lighter);
    border-radius: 10px;
    margin-bottom: 10px;
    border-left: 4px solid var(--grey-light);
  }
  .weekly-detail-item.rag-green { border-left-color: var(--green); }
  .weekly-detail-item.rag-amber { border-left-color: var(--amber); }
  .weekly-detail-item.rag-red { border-left-color: var(--red); }
  .weekly-detail-item-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .weekly-detail-item-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey-dark);
  }
  .weekly-detail-item-rag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 5px;
    color: white;
    letter-spacing: 0.04em;
  }
  .weekly-detail-item-rag.green { background: var(--green); }
  .weekly-detail-item-rag.amber { background: var(--amber); }
  .weekly-detail-item-rag.red { background: var(--red); }
  .weekly-detail-item-note {
    font-size: 12px;
    color: var(--grey-mid);
    line-height: 1.5;
    font-style: italic;
  }
  .weekly-detail-item-note.empty { color: var(--grey-mid); opacity: 0.5; }

  /* ===== MONTHLY REVIEW ===== */
  .review-hero {
    background: linear-gradient(135deg, var(--tag-green-dark), var(--tag-green));
    color: white;
    padding: 28px 32px;
    border-radius: 10px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
    box-shadow: var(--shadow-md);
  }
  .review-hero h2 {
    font-family: var(--font-display);
    font-size: 24px;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .review-hero p {
    font-size: 13px;
    opacity: 0.9;
  }
  .review-hero .review-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    opacity: 0.85;
    background: rgba(255,255,255,0.15);
    padding: 6px 12px;
    border-radius: 8px;
    text-align: center;
  }
  .review-hero .review-meta strong { display: block; font-size: 14px; }

  .review-section {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    padding: 28px 32px;
    margin-bottom: 20px;
  }
  .review-section-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
    gap: 16px;
    flex-wrap: wrap;
  }
  .review-section-head h3 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 700;
    color: var(--tag-green-dark);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .review-section-head h3 .step-num {
    background: var(--tag-green-dark);
    color: white;
    width: 32px; height: 32px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
  }
  .review-section-head .step-status {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 5px 12px;
    border-radius: 6px;
    background: var(--grey-light);
    color: var(--grey-mid);
  }
  .review-section-head .step-status.done {
    background: var(--green);
    color: white;
  }
  .review-section-intro {
    color: var(--grey-mid);
    font-size: 13px;
    margin-bottom: 20px;
    max-width: 700px;
  }

  /* Priority review rows */
  .priority-row {
    display: grid;
    grid-template-columns: 4px 1fr auto auto;
    gap: 16px;
    padding: 14px 12px;
    align-items: center;
    border-radius: 10px;
    background: var(--grey-lighter);
    margin-bottom: 6px;
    transition: all 0.15s;
  }
  .priority-row:hover { background: white; box-shadow: var(--shadow-sm); }
  .priority-row.kept { background: rgba(39, 174, 96, 0.06); }
  .priority-row.tweaked { background: rgba(243, 156, 18, 0.06); }
  .priority-row.removed { background: rgba(192, 57, 43, 0.06); opacity: 0.7; }
  .priority-row.removed .priority-text { text-decoration: line-through; }

  .priority-pillar-bar {
    width: 4px;
    height: 36px;
    border-radius: 2px;
  }
  .priority-info { min-width: 0; }
  .priority-pillar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--grey-mid);
    margin-bottom: 3px;
  }
  .priority-text {
    font-size: 14px;
    font-weight: 600;
    color: var(--grey-dark);
  }
  .priority-meta {
    font-size: 11px;
    color: var(--grey-mid);
    margin-top: 3px;
    font-family: var(--font-mono);
  }
  .priority-actions {
    display: flex;
    gap: 6px;
  }
  .priority-btn {
    background: white;
    border: 1.5px solid var(--grey-light);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-family: var(--font-body);
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--grey-mid);
  }
  .priority-btn:hover { border-color: var(--grey-mid); }
  .priority-btn.keep:hover, .priority-btn.keep.selected {
    background: var(--green); color: white; border-color: var(--green);
  }
  .priority-btn.tweak:hover, .priority-btn.tweak.selected {
    background: var(--amber); color: white; border-color: var(--amber);
  }
  .priority-btn.remove:hover, .priority-btn.remove.selected {
    background: var(--red); color: white; border-color: var(--red);
  }

  .priority-status-pill {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 4px 10px;
    border-radius: 5px;
    color: white;
  }
  .priority-status-pill.kept { background: var(--green); }
  .priority-status-pill.tweaked { background: var(--amber); }
  .priority-status-pill.removed { background: var(--red); }

  /* Concerns grid */
  .concerns-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 14px;
    margin-top: 12px;
  }
  .concern-card {
    background: var(--grey-lighter);
    border-radius: 12px;
    padding: 18px;
    border-top: 4px solid;
  }
  .concern-card.people { border-color: var(--pillar-1); }
  .concern-card.system { border-color: var(--pillar-3); }
  .concern-card.suppliers { border-color: var(--pillar-4); }
  .concern-card.other { border-color: var(--tag-green); }
  .concern-card h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey-dark);
    margin-bottom: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .concern-card .concern-hint {
    font-size: 11px;
    color: var(--grey-mid);
    margin-bottom: 10px;
    font-style: italic;
  }
  .concern-item {
    background: white;
    padding: 10px 12px;
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 13px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .concern-item .concern-text { flex: 1; }
  .concern-item .concern-meta {
    font-size: 10px;
    color: var(--grey-mid);
    margin-top: 4px;
    font-family: var(--font-mono);
  }
  .concern-add-btn {
    width: 100%;
    background: transparent;
    border: 1.5px dashed var(--grey-light);
    border-radius: 8px;
    padding: 8px;
    cursor: pointer;
    font-size: 12px;
    color: var(--grey-mid);
    font-weight: 600;
    font-family: var(--font-body);
    margin-top: 4px;
    transition: all 0.15s;
  }
  .concern-add-btn:hover {
    border-color: var(--tag-green);
    background: var(--tag-green-light);
    color: var(--tag-green-dark);
  }
  .concern-empty {
    font-size: 12px;
    color: var(--grey-mid);
    font-style: italic;
    text-align: center;
    padding: 12px;
  }

  /* New initiative gate */
  .initiative-gate {
    background: linear-gradient(135deg, rgba(15, 74, 42, 0.04), rgba(46, 139, 87, 0.04));
    border: 1.5px solid var(--tag-green-light);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
  }
  .initiative-gate h4 {
    font-size: 13px;
    font-weight: 700;
    color: var(--tag-green-dark);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .initiative-gate p {
    font-size: 12px;
    color: var(--grey-mid);
    line-height: 1.6;
  }
  .initiative-item {
    background: white;
    padding: 14px 16px;
    border-radius: 10px;
    margin-bottom: 8px;
    border-left: 4px solid var(--tag-green);
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    align-items: start;
  }
  .initiative-item .init-desc {
    font-size: 14px;
    font-weight: 600;
    color: var(--grey-dark);
    margin-bottom: 4px;
  }
  .initiative-item .init-meta {
    font-size: 11px;
    color: var(--grey-mid);
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }
  .initiative-item .init-meta strong { color: var(--grey-dark); }

  .review-complete-banner {
    background: linear-gradient(135deg, var(--green), var(--tag-green));
    color: white;
    padding: 20px 28px;
    border-radius: 10px;
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }
  .review-complete-banner h4 {
    font-family: var(--font-display);
    font-size: 18px;
    margin-bottom: 2px;
  }
  .review-complete-banner p { font-size: 13px; opacity: 0.95; }
  .review-complete-banner .review-btn {
    background: white;
    color: var(--tag-green-dark);
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-family: var(--font-body);
    font-size: 13px;
  }
  .review-complete-banner .review-btn:hover { background: var(--tag-green-light); }

  /* Past reviews list */
  .past-reviews {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .past-review-row {
    display: grid;
    grid-template-columns: 130px 1fr 100px 100px 100px;
    gap: 16px;
    padding: 14px 20px;
    align-items: center;
    border-bottom: 1px solid var(--grey-light);
    font-size: 13px;
  }
  .past-review-row:last-child { border-bottom: none; }
  .past-review-row.head {
    background: var(--grey-lighter);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
    color: var(--grey-mid);
  }
  .past-review-row .pr-month {
    font-weight: 700;
    color: var(--grey-dark);
  }
  .past-review-row .pr-count {
    font-family: var(--font-mono);
    font-weight: 700;
    text-align: center;
  }
  .past-review-row .pr-count.k { color: var(--green); }
  .past-review-row .pr-count.t { color: var(--amber); }
  .past-review-row .pr-count.r { color: var(--red); }

  @media (max-width: 1100px) {
    .pillar-grid { grid-template-columns: repeat(2, 1fr); }
    body { padding: 14px; }
    .summary-row { grid-template-columns: repeat(2, 1fr); }
    header { padding: 20px 22px; }
    header h1 { font-size: 24px; }
    header .actions { width: 100%; justify-content: flex-start; }
    .quick-bar { grid-template-columns: 1fr; gap: 14px; }
    .filter-bar { gap: 10px; }
    .filter-bar-group select { min-width: 110px; }
    .tabs { top: 6px; padding: 4px; gap: 4px; }
    .tab { padding: 10px 14px; font-size: 13px; }
    .pillar-grid { grid-template-columns: 1fr; gap: 14px; }
    .action-meta { margin-left: 0; }
  }
  @media (max-width: 700px) {
    .summary-row { grid-template-columns: 1fr 1fr; gap: 8px; }
    .summary-card { padding: 14px; }
    .summary-card .value { font-size: 28px; }
    .filter-bar { padding: 10px 12px; }
    .filter-result { width: 100%; text-align: left; padding-bottom: 0; }
  }

  /* ===== PRINT STYLES (main page) =====
     Strip chrome — nav, filters, banners, edit affordances — and let the actual
     content flow into a printable list. Use system colours so RAG ink-saves print. */
  @media print {
    body { background: white !important; padding: 0 !important; font-size: 11pt; }
    header, nav, .start-banner, .filter-bar,
    .action-list-panel, .undo-toast, .toast, .modal-backdrop, .tab-reference-menu,
    .session-frame, .reference-toggle, .add-row, [data-action="add-action"],
    .objective-tile-tools, .priority-row-actions, .pillar-focus-stats,
    .session-exit-btn, .breadcrumb, .start-banner-actions, .session-progress,
    .icon-btn, .edit-only, .slt-pillar-delete-btn, .objective-tool-btn,
    .slt-tool-btn, .complete-toggle, .action-meta button { display: none !important; }
    .arrow-grid { grid-template-columns: 1fr 1fr; gap: 8mm; }
    .arrow-pillar { break-inside: avoid; box-shadow: none !important; }
    .pillar { break-inside: avoid; box-shadow: none !important; }
    .pillar-header { color: white; }
    .action-row { break-inside: avoid; box-shadow: none !important; border: 1px solid #ddd; }
    .objective-tile { break-inside: avoid; box-shadow: none !important; }
    .home-intro h2 { font-size: 18pt; margin-bottom: 4mm; }
    /* Force background colours to print (Safari/Chrome) */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    /* Page break after each main section */
    .pillar { page-break-after: auto; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-brand">
      <div class="header-titles">
        <h1>Operational Leadership Team's Plan</h1>
        <div class="subtitle">
          <span>Trust Alliance Group · 2026</span>
          <span class="baseline-indicator" id="baseline-indicator"><span class="dot"></span><span id="baseline-text">Loading...</span></span>
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="btn-edit">＋ Add Action</button>
      <button class="btn" id="btn-save-baseline" title="Lock in current state — Reset will revert here">💾 Save Baseline</button>
      <button class="btn" id="btn-reset" title="Revert to last saved baseline">⟲ Reset</button>
      <button class="btn btn-icon" id="btn-help" title="Keyboard shortcuts &amp; tips" aria-label="Help">?</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="actions">Home</button>
    <button class="tab tab-slt" data-view="strategic" title="Manage SLT-set Strategic Pillars and Initiatives">SLT Strategic</button>
    <div class="tab-reference-wrap">
      <button class="tab" id="reference-toggle" aria-haspopup="true" aria-expanded="false">Views ▾</button>
      <div class="tab-reference-menu" id="reference-menu" role="menu">
        <button class="ref-item" data-view="weekly" role="menuitem">
          <span class="ref-icon">❤</span>
          <span class="ref-text"><strong>Weekly Check</strong><span>Heartbeat history</span></span>
        </button>
        <button class="ref-item" data-view="summary" role="menuitem">
          <span class="ref-icon">∑</span>
          <span class="ref-text"><strong>Summary</strong><span>Actions broken down by owner, pillar, initiative</span></span>
        </button>
        <button class="ref-item" data-view="roadmap" role="menuitem">
          <span class="ref-icon">📅</span>
          <span class="ref-text"><strong>Roadmap</strong><span>Timeline of actions</span></span>
        </button>
        <button class="ref-item" data-view="monthly" role="menuitem">
          <span class="ref-icon">🗓</span>
          <span class="ref-text"><strong>Monthly Review</strong><span>Strategy alignment check</span></span>
        </button>
        <button class="ref-item" data-view="agenda" role="menuitem">
          <span class="ref-icon">📋</span>
          <span class="ref-text"><strong>Session Agenda</strong><span>Meeting template</span></span>
        </button>
        <button class="ref-item" data-view="completed" role="menuitem">
          <span class="ref-icon">✓</span>
          <span class="ref-text"><strong>Completed Actions</strong><span>What we've delivered</span></span>
        </button>
        <button class="ref-item" data-view="audit" role="menuitem">
          <span class="ref-icon">📜</span>
          <span class="ref-text"><strong>Audit Log</strong><span>What changed, when, by whom</span></span>
        </button>
        <div class="ref-item-divider"></div>
        <button class="ref-item" id="ref-download-report" role="menuitem">
          <span class="ref-icon">⬇</span>
          <span class="ref-text"><strong>Download Summary Report</strong><span>HTML for printing or sharing</span></span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ===== ACTIONS BY PILLAR ===== -->
  <div class="view active" id="view-actions">
    <!-- HOME MODE: Start banner + Strategy arrows -->
    <div id="home-mode">
      <div class="start-banner" id="start-banner">
        <div class="start-banner-content">
          <div class="start-banner-label" id="start-banner-label">Weekly Leadership Session</div>
          <h2 id="start-banner-title">Ready when you are</h2>
          <p id="start-banner-sub">Four steps · Sector ops check-in · Hot actions · AOB · Strategic Pillar coverage. Your 1-hour weekly leadership session.</p>
        </div>
        <div class="start-banner-actions">
          <button class="start-banner-btn" id="start-session-btn">▶ Start Weekly Review</button>
          <button class="start-banner-secondary" id="abandon-session-btn" style="display:none;">Discard &amp; start fresh</button>
        </div>
      </div>

      <div class="home-intro" id="home-intro">
        <h2 id="home-intro-title">Priorities 2026</h2>
        <p id="home-intro-sub">Our strategic pillars. Pick one to walk through the actions underneath. Use the weekly review above when it's time to work through the whole picture as a leadership team.</p>
      </div>
      <div class="arrow-grid" id="arrow-grid"></div>
    </div>

    <!-- FOCUSED MODE: Single pillar deep-dive -->
    <div id="focus-mode" style="display:none;">
      <div class="breadcrumb" id="breadcrumb-host"></div>
      <div id="pillar-focus-header-host"></div>
      <div id="pillar-focus-priorities-host"></div>

      <div class="filter-bar">
        <div class="filter-bar-label">Filter</div>
        <div class="filter-bar-group" id="filter-initiative-group" style="display:none;">
          <label>Initiative</label>
          <select id="filter-initiative"><option value="all">All initiatives</option></select>
        </div>
        <div class="filter-bar-group">
          <label>Owner</label>
          <select id="filter-owner"><option value="all">All Owners</option></select>
        </div>
        <div class="filter-bar-group">
          <label>Status</label>
          <select id="filter-status">
            <option value="all">All Statuses</option>
            <option value="green">🟢 On Track</option>
            <option value="amber">🟡 At Risk</option>
            <option value="red">🔴 Off Track</option>
            <option value="complete">✓ Completed</option>
            <option value="open">Open (not complete)</option>
            <option value="overdue">Overdue</option>
          </select>
        </div>
        <button class="filter-clear" id="filter-clear">Clear filters</button>
        <div class="filter-result" id="filter-result"></div>
      </div>

      <div class="action-list-panel" id="action-list-panel">
        <div class="action-list-header">
          <h3 id="al-title">Actions</h3>
          <button class="close-btn" id="al-close">✕</button>
        </div>
        <div id="al-body"></div>
      </div>

      <div class="pillar-grid" id="pillar-grid"></div>
    </div>

    <!-- Hidden filter-pillar select (kept for compatibility but not displayed) -->
    <select id="filter-pillar" style="display:none;"><option value="all">All Strategic Pillars</option></select>
  </div>

  <!-- ===== SESSION (Guided Weekly Review Flow) ===== -->
  <div class="view" id="view-session">
    <div class="session-frame">
      <!-- Header: progress + exit -->
      <div class="session-header">
        <div class="session-progress">
          <div class="session-step-pip" data-pip="1">
            <span class="pip-num">1</span>
            <span class="pip-label">Heartbeat</span>
          </div>
          <div class="session-step-line"></div>
          <div class="session-step-pip" data-pip="2">
            <span class="pip-num">2</span>
            <span class="pip-label">Hot Actions</span>
          </div>
          <div class="session-step-line"></div>
          <div class="session-step-pip" data-pip="3">
            <span class="pip-num">3</span>
            <span class="pip-label">AOB</span>
          </div>
          <div class="session-step-line"></div>
          <div class="session-step-pip" data-pip="4">
            <span class="pip-num">4</span>
            <span class="pip-label">Coverage</span>
          </div>
        </div>
        <button class="session-exit-btn" id="session-exit-btn" title="Save and exit">✕ Exit session</button>
      </div>

      <!-- Step bodies (only one visible at a time) -->

      <!-- STEP 1: Sector Ops Check-In -->
      <div class="session-step" id="session-step-1">
        <div class="session-step-head">
          <div class="session-step-tag">Step 1 of 4 · Sector Ops Check-In</div>
          <h2>Where is each sector this week?</h2>
          <p>For each metric below, set a status against the actual ops. Anything Amber or Red is automatically surfaced in Step 2 for action. The sector and metric list is set by SLT — change it any time if the shape of the business has moved on.</p>
        </div>
        <div id="session-heartbeat-items"></div>

        <!-- In-flow sector editor: slides open here so leadership can tweak structure
             without leaving the meeting. Status pills already set survive the edit. -->
        <div class="sector-editor session-sector-editor" id="session-sector-editor" style="display:none;">
          <div class="sector-editor-head">
            <div>
              <h3>Edit heartbeat sectors &amp; metrics — in flow</h3>
              <p>Your current week's RAG marks are kept. Renaming, reordering, adding or removing here updates the sector list everywhere immediately.</p>
            </div>
            <button class="weekly-edit-close" id="session-edit-sectors-close">Done editing</button>
          </div>
          <div id="session-sector-editor-body"></div>
          <button class="sector-add-btn" id="session-sector-add-btn">+ Add a sector</button>
        </div>

        <div class="session-step-edit-row">
          <button class="session-step-edit-btn" id="session-edit-sectors-btn" title="Add, rename or remove sectors and metrics in flow — your weekly check progress is kept">⚙ Edit sectors &amp; metrics</button>
        </div>
        <div class="session-footer">
          <div class="session-step-status" id="session-step-1-status"></div>
          <button class="session-next-btn" id="session-next-1" disabled>Next: Hot Actions →</button>
        </div>
      </div>

      <!-- STEP 2: Hot Actions -->
      <div class="session-step" id="session-step-2" style="display:none;">
        <div class="session-step-head">
          <div class="session-step-tag">Step 2 of 4 · Walk the list</div>
          <h2>Flagged this week &amp; Hot Actions</h2>
          <p>Methodically work through every red, amber and overdue action below — grouped by Strategic Pillar so the conversation stays structured. For each one: where are we, what's the next move, do we need to change RAG or close it? Green actions are hidden to keep this focused.</p>
        </div>
        <div id="session-flagged-items"></div>
        <div id="session-hot-actions"></div>
        <div class="session-footer">
          <div class="session-step-status" id="session-step-2-status"></div>
          <button class="session-back-btn" id="session-back-2">← Back</button>
          <button class="session-next-btn" id="session-next-2">Next: AOB →</button>
        </div>
      </div>

      <!-- STEP 3: AOB -->
      <div class="session-step" id="session-step-3" style="display:none;">
        <div class="session-step-head">
          <div class="session-step-tag">Step 3 of 4 · Anything else?</div>
          <h2>AOB — Any Other Business</h2>
          <p>Capture anything that came up this week that isn't already tracked. Risks, ideas, things heard from the team, supplier issues, regulator chatter. Each item is logged to the audit trail and can be converted into a tracked action.</p>
        </div>
        <div id="session-aob"></div>
        <div class="session-footer">
          <div class="session-step-status" id="session-step-3-status"></div>
          <button class="session-back-btn" id="session-back-3">← Back</button>
          <button class="session-next-btn" id="session-next-3">Next: Strategic Pillar Coverage →</button>
        </div>
      </div>

      <!-- STEP 4: Strategic Pillar Coverage Check -->
      <div class="session-step" id="session-step-4" style="display:none;">
        <div class="session-step-head">
          <div class="session-step-tag">Step 4 of 4 · Coverage check</div>
          <h2>Strategic Pillar Coverage</h2>
          <p>Quick scan: is each Strategic Pillar covered by live operational work? Look for empty initiatives or Strategic Pillars with no actions — that's a gap to fill. Add or drop initiatives here if needed. Real strategy review sits with the wider SLT, not weekly ops.</p>
        </div>
        <div id="session-priorities"></div>
        <div class="session-footer">
          <div class="session-step-status">Once you're happy, lock in the session.</div>
          <button class="session-back-btn" id="session-back-4">← Back</button>
          <button class="session-complete-btn" id="session-complete-btn">✓ Complete Review</button>
        </div>
      </div>

      <!-- DONE summary -->
      <div class="session-step" id="session-step-done" style="display:none;">
        <div class="session-done-hero">
          <div class="session-done-icon">✓</div>
          <h2>Review complete</h2>
          <p id="session-done-sub">Logged to the audit trail and added to your heartbeat history.</p>
        </div>
        <div class="session-done-summary" id="session-done-summary"></div>
        <div class="session-footer center">
          <button class="session-next-btn" id="download-summary-btn" style="background:var(--green);">⬇ Download Summary Report</button>
          <button class="session-back-btn" id="session-back-home-btn">Back to Home</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== ROADMAP ===== -->
  <div class="view" id="view-roadmap">
    <div class="roadmap-header">
      <div class="roadmap-header-left">
        <h2>Roadmap</h2>
        <span class="roadmap-header-count" id="roadmap-action-count">— actions</span>
      </div>
    </div>
    <div id="roadmap-high" class="swimlane"></div>
  </div>

  <!-- ===== WEEKLY OPS CHECK ===== -->
  <div class="view" id="view-weekly">
    <div class="weekly-hero">
      <div>
        <h2>Weekly Ops Check</h2>
        <p>A 30-second heartbeat. Are we on track on the things we cannot afford to miss this week?</p>
      </div>
      <div class="weekly-hero-meta">
        <span class="weekly-week-label" id="weekly-week-label">Week commencing —</span>
        <span class="weekly-status-pill" id="weekly-status-pill">Pending</span>
        <button class="weekly-edit-toggle" id="weekly-edit-toggle" title="Add, rename or remove sectors and metrics">⚙ Edit sectors</button>
      </div>
    </div>

    <!-- Editor panel — hidden by default, toggled by the cog button above.
         Lets leadership change what the heartbeat actually measures as the business evolves. -->
    <div class="sector-editor" id="sector-editor" style="display:none;">
      <div class="sector-editor-head">
        <div>
          <h3>Edit heartbeat sectors &amp; metrics</h3>
          <p>The shape of the business changes — so should what we measure. Add new sectors, rename existing ones, or refine the metrics under each. Past weekly checks keep their history; deleted sectors stop appearing in the current heartbeat but their historical scores are preserved.</p>
        </div>
        <button class="weekly-edit-close" id="weekly-edit-close">Done editing</button>
      </div>
      <div id="sector-editor-body"></div>
      <button class="sector-add-btn" id="sector-add-btn">+ Add a sector</button>
    </div>

    <div class="weekly-check-card">
      <div class="weekly-check-instructions">
        For each item below, set a status based on the actual ops dashboard. Add a quick note if anything's off-plan. Hit <strong>Complete this week's check</strong> when done — it logs to the audit trail and starts next week.
      </div>
      <div id="weekly-items"></div>
      <div class="weekly-check-actions">
        <div class="weekly-overall" id="weekly-overall"></div>
        <button class="btn-primary weekly-complete-btn" id="weekly-complete-btn">✓ Complete this week's check</button>
      </div>
    </div>

    <div class="weekly-history-section">
      <div class="weekly-history-head">
        <h3>Heartbeat History</h3>
        <div class="weekly-history-legend">
          <span class="dot-legend"><span class="weekly-dot green"></span>Green</span>
          <span class="dot-legend"><span class="weekly-dot amber"></span>Amber</span>
          <span class="dot-legend"><span class="weekly-dot red"></span>Red</span>
          <span class="dot-legend"><span class="weekly-dot pending"></span>Not checked</span>
        </div>
      </div>
      <div class="weekly-history-strip" id="weekly-history-strip">
        <div class="weekly-history-empty">No history yet — complete your first weekly check to start building the pattern.</div>
      </div>

      <!-- METRIC TRENDS (sparklines per metric across recent weeks) -->
      <div class="weekly-trends-host" id="weekly-trends-host"></div>
    </div>

    <!-- Slide-out detail panel for a past week -->
    <div class="weekly-detail-panel" id="weekly-detail-panel">
      <div class="weekly-detail-head">
        <h3 id="weekly-detail-title">Week of —</h3>
        <button class="close-btn" id="weekly-detail-close" aria-label="Close">✕</button>
      </div>
      <div class="weekly-detail-body" id="weekly-detail-body"></div>
    </div>
  </div>

  <!-- ===== MONTHLY REVIEW ===== -->
  <div class="view" id="view-monthly">
    <div class="review-hero">
      <div>
        <h2>Monthly Strategic Review</h2>
        <p>Confirm that your actions still align with the wider SLT strategy, surface emerging concerns, and gate any new initiatives before they multiply.</p>
      </div>
      <div class="review-meta">
        <strong id="current-month-label">May 2026</strong>
        Review in progress
      </div>
    </div>

    <!-- STEP 1: Priorities alignment -->
    <div class="review-section">
      <div class="review-section-head">
        <h3><span class="step-num">1</span>Priorities Alignment Check</h3>
        <span class="step-status" id="step-1-status">Pending</span>
      </div>
      <p class="review-section-intro">For each open action, confirm it remains aligned with the SLT Strategic Pillars. Keep, tweak, or remove. Decisions log to the audit trail.</p>
      <div id="priorities-review-list"></div>
    </div>

    <!-- STEP 2: New concerns -->
    <div class="review-section">
      <div class="review-section-head">
        <h3><span class="step-num">2</span>Emerging Concerns</h3>
        <span class="step-status" id="step-2-status">Pending</span>
      </div>
      <p class="review-section-intro">What's on the horizon that could derail us? Capture early signals here so we can act before they become problems.</p>
      <div class="concerns-grid">
        <div class="concern-card people">
          <h4>People</h4>
          <div class="concern-hint">FTE numbers, performance, shrinkage, attrition, capability gaps</div>
          <div id="concerns-people"></div>
          <button class="concern-add-btn" data-concern-type="people">+ Add concern</button>
        </div>
        <div class="concern-card system">
          <h4>Systems</h4>
          <div class="concern-hint">Tooling, integrations, data quality, AI rollout, outages</div>
          <div id="concerns-system"></div>
          <button class="concern-add-btn" data-concern-type="system">+ Add concern</button>
        </div>
        <div class="concern-card suppliers">
          <h4>Suppliers</h4>
          <div class="concern-hint">SLA breaches, commercial risks, renewals, dependencies</div>
          <div id="concerns-suppliers"></div>
          <button class="concern-add-btn" data-concern-type="suppliers">+ Add concern</button>
        </div>
        <div class="concern-card other">
          <h4>Other</h4>
          <div class="concern-hint">Market, regulatory, reputational, anything else</div>
          <div id="concerns-other"></div>
          <button class="concern-add-btn" data-concern-type="other">+ Add concern</button>
        </div>
      </div>
    </div>

    <!-- STEP 3: New initiatives (gated) -->
    <div class="review-section">
      <div class="review-section-head">
        <h3><span class="step-num">3</span>New Initiatives</h3>
        <span class="step-status" id="step-3-status">Pending</span>
      </div>
      <p class="review-section-intro">Anything new must map to an existing Strategic Pillar. If it doesn't fit a pillar, it doesn't belong on the leadership agenda yet.</p>
      <div class="initiative-gate">
        <h4>SLT Alignment Gate</h4>
        <p>Before adding a new initiative, confirm: (1) it maps to one of our Strategic Pillars, (2) it doesn't duplicate an existing action, (3) we have an owner from EVR/CM/HM/JG/DB/HB ready to take it.</p>
      </div>
      <div id="new-initiatives-list"></div>
      <button class="concern-add-btn" id="add-new-initiative-btn" style="max-width:280px;">+ Propose New Initiative</button>
    </div>

    <!-- Complete review -->
    <div class="review-complete-banner">
      <div>
        <h4>Finalise this month's review</h4>
        <p>Lock in your decisions and create an audit-log entry for the record.</p>
      </div>
      <button class="review-btn" id="complete-review-btn">Complete Monthly Review</button>
    </div>

    <!-- Past reviews -->
    <div class="review-section" style="margin-top:20px;">
      <div class="review-section-head"><h3>Past Reviews</h3></div>
      <div class="past-reviews" id="past-reviews-list"></div>
    </div>
  </div>

  <!-- ===== AGENDA ===== -->
  <div class="view" id="view-agenda">
    <div class="agenda">
      <h3>Weekly Leadership Session — 60 minutes</h3>
