    cursor: pointer;
    transition: all 0.15s;
  }
  .weekly-edit-toggle:hover {
    background: rgba(255,255,255,0.25);
    border-color: rgba(255,255,255,0.55);
  }
  .weekly-edit-toggle.active {
    background: white;
    color: var(--tag-green-dark);
    border-color: white;
  }

  /* ===== SECTOR EDITOR ===== */
  .sector-editor {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    padding: 22px 26px;
    margin-bottom: 20px;
    border: 2px solid var(--tag-green);
  }
  .sector-editor-head {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 14px;
    align-items: start;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--grey-lighter);
  }
  .sector-editor-head h3 {
    font-size: 16px;
    font-weight: 700;
    color: var(--tag-green-dark);
    margin-bottom: 4px;
  }
  .sector-editor-head p {
    font-size: 12px;
    color: var(--grey-mid);
    line-height: 1.5;
    margin: 0;
    max-width: 640px;
  }
  .weekly-edit-close {
    background: var(--tag-green-dark);
    border: none;
    color: white;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 6px;
