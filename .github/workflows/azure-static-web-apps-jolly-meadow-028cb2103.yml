  .audit-action-tag.edit { background: var(--pillar-3); }
  .audit-action-tag.delete { background: var(--red); }
  .audit-action-tag.complete { background: var(--tag-green); }
  .audit-action-tag.rag-change { background: var(--amber); }
  .audit-action-tag.baseline-saved { background: var(--tag-green-dark); }
  .audit-pillar-tag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 5px;
    background: var(--grey-light);
    color: var(--grey-dark);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .audit-pillar-tag.p1 { background: var(--pillar-1); color: white; }
  .audit-pillar-tag.p2 { background: var(--pillar-2); color: white; }
  .audit-pillar-tag.p3 { background: var(--pillar-3); color: white; }
  .audit-pillar-tag.p4 { background: var(--pillar-4); color: white; }
  .audit-detail .audit-summary-line {
    font-weight: 600;
    color: var(--grey-dark);
    margin-bottom: 2px;
  }
  .audit-detail .audit-meta-line {
    font-size: 11px;
    color: var(--grey-mid);
    font-family: var(--font-mono);
  }
  .audit-detail .audit-change {
    background: var(--grey-lighter);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 11px;
  }
  .audit-detail .audit-change.old { color: var(--red); text-decoration: line-through; opacity: 0.7; }
  .audit-detail .audit-change.new { color: var(--green); }
  .audit-user {
    font-size: 11px;
    color: var(--grey-mid);
    text-align: right;
    font-style: italic;
  }
  .audit-empty {
    padding: 60px;
    text-align: center;
    color: var(--grey-mid);
    font-style: italic;
  }

  .view { display: none; }
  .view.active { display: block; animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== QUICK BAR (this-week pulse + owner workload) ===== */
  .quick-bar {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    padding: 14px 18px;
    margin-bottom: 16px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 24px;
    align-items: center;
  }
  .quick-bar-section { display: flex; align-items: center; gap: 14px; min-width: 0; }
  .quick-bar-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--grey-mid);
    white-space: nowrap;
  }
  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    padding: 14px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .filter-bar-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--grey-mid);
    padding-right: 4px;
  }
  .filter-bar-group {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .filter-bar-group label {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--grey-mid);
  }
  .filter-bar-group select {
    padding: 7px 28px 7px 12px;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    color: var(--grey-dark);
    background: white;
    cursor: pointer;
    min-width: 140px;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237F8C8D' stroke-width='2'%3e%3cpath d='M6 9l6 6 6-6'/%3e%3c/svg%3e");
    background-repeat: no-repeat;
    background-position: right 8px center;
    background-size: 16px;
  }
  .filter-bar-group select:hover { border-color: var(--grey-mid); }
  .filter-bar-group select:focus { outline: none; border-color: var(--tag-green); }
  .filter-bar-group select.has-filter {
    border-color: var(--tag-green);
    background-color: var(--tag-green-light);
    color: var(--tag-green-dark);
    font-weight: 600;
  }
  .filter-clear {
    background: transparent;
    border: 1.5px solid var(--grey-light);
    border-radius: 8px;
    padding: 7px 14px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    color: var(--grey-mid);
