    transition: all 0.15s;
    align-self: flex-end;
    height: 33px;
  }
  .filter-clear:hover { background: var(--grey-light); color: var(--grey-dark); }
  .filter-clear.active {
    border-color: var(--tag-green);
    color: var(--tag-green-dark);
  }
  .filter-clear.active:hover { background: var(--tag-green-light); }
  .filter-result {
    margin-left: auto;
    font-size: 12px;
    color: var(--grey-mid);
    font-weight: 600;
    align-self: flex-end;
    padding-bottom: 8px;
  }
  .filter-result strong {
    color: var(--tag-green-dark);
    font-family: var(--font-mono);
    font-size: 14px;
  }

  /* When a pillar has no matching actions after filter */
  .pillar-no-match {
    padding: 24px 16px;
    text-align: center;
    font-size: 12px;
    color: var(--grey-mid);
    font-style: italic;
  }

  /* ===== WEEKLY OPS CHECK ===== */
  .weekly-hero {
    background: linear-gradient(135deg, var(--tag-green-dark), var(--tag-green));
    color: white;
    padding: 24px 28px;
    border-radius: 10px;
    margin-bottom: 20px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 20px;
    align-items: center;
    box-shadow: var(--shadow-md);
  }
  .weekly-hero h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .weekly-hero p { font-size: 13px; opacity: 0.92; }
  .weekly-hero-meta {
    display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
  }
  .weekly-week-label {
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    opacity: 0.85;
    font-weight: 500;
  }
  .weekly-status-pill {
    background: rgba(255,255,255,0.18);
    color: white;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 6px;
    letter-spacing: 0.04em;
  }
  .weekly-status-pill.complete { background: white; color: var(--tag-green-dark); }
  .weekly-edit-toggle {
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
