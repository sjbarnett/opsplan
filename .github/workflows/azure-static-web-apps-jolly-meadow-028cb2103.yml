// RENDER — AGENDA
// =================================================================
function renderAgenda() {
  const list = document.getElementById('agenda-list');
  list.innerHTML = data.agenda.map(a => `
    <div class="agenda-item">
      <div class="agenda-time"><span class="editable" data-field="ag-time" data-id="${a.id}">${escapeHtml(a.time)}</span></div>
      <div class="agenda-content">
        <h4><span class="editable" data-field="ag-title" data-id="${a.id}">${escapeHtml(a.title)}</span></h4>
        <p><span class="editable" data-field="ag-desc" data-id="${a.id}">${escapeHtml(a.desc)}</span></p>
      </div>
      <div class="agenda-owner"><span class="editable" data-field="ag-owner" data-id="${a.id}">${escapeHtml(a.owner)}</span></div>
      <button class="icon-btn danger edit-only" data-action="delete-agenda" data-id="${a.id}" title="Delete">✕</button>
    </div>
  `).join('');

  const pl = document.getElementById('principles-list');
  pl.innerHTML = data.principles.map((p, i) => `
    <li style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
      <span style="flex:1;"><span class="editable" data-field="principle" data-idx="${i}">${escapeHtml(p)}</span></span>
      <button class="icon-btn danger edit-only" data-action="delete-principle" data-idx="${i}" title="Delete">✕</button>
    </li>
  `).join('');
}

// =================================================================
// RENDER — SUMMARY VIEW (by owner / pillar / initiative)
// =================================================================
function renderSummary() {
  const body = document.getElementById('summary-body');
  if (!body) return;
  const open = data.actions.filter(a => !a.complete);
  const totalEl = document.getElementById('summary-hero-total');
  if (totalEl) totalEl.textContent = `${open.length} open · ${data.actions.length - open.length} done`;

  // Compute status breakdown across each grouping
  function statusBucket(actions) {
    const b = { total: actions.length, red: 0, amber: 0, green: 0, overdue: 0, priority: 0 };
    actions.forEach(a => {
      if (a.rag === 'red') b.red++;
      else if (a.rag === 'amber') b.amber++;
      else if (a.rag === 'green') b.green++;
      if (a.due && daysUntil(a.due) < 0) b.overdue++;
      if (a.priority) b.priority++;
    });
    return b;
  }

  // 1) By Owner
  const byOwnerMap = new Map();
  OWNERS.forEach(o => byOwnerMap.set(o, []));
  open.forEach(a => {
    const o = a.owner || '—';
    if (!byOwnerMap.has(o)) byOwnerMap.set(o, []);
    byOwnerMap.get(o).push(a);
  });
  const ownerRows = [...byOwnerMap.entries()]
    .map(([o, actions]) => ({ key: o, label: o, actions, stats: statusBucket(actions) }))
    .sort((x, y) => y.stats.total - x.stats.total || x.label.localeCompare(y.label));

  // 2) By Pillar
  const pillarRows = data.pillars.map(p => {
    const actions = open.filter(a => a.pillar === p.id);
    return { key: p.id, num: p.num, label: p.name, pillarN: pillarStyleNum(p.id), actions, stats: statusBucket(actions) };
  });
  const orphanByPillar = open.filter(a => !a.pillar || !data.pillars.find(pp => pp.id === a.pillar));
  if (orphanByPillar.length > 0) {
    pillarRows.push({ key: '_orphan', num: '⚠', label: 'No pillar set', pillarN: 0, actions: orphanByPillar, stats: statusBucket(orphanByPillar), orphan: true });
  }

  // 3) By Initiative
  const initRows = [];
  data.pillars.forEach(p => {
    (p.objectives || []).forEach((o, i) => {
      const letter = String.fromCharCode(65 + i);
      const actions = open.filter(a => a.objectiveId === o.id);
      initRows.push({
        key: o.id, label: o.text, pillarNum: p.num, pillarName: p.name,
        pillarN: pillarStyleNum(p.id), letter, actions, stats: statusBucket(actions)
      });
    });
  });
  const orphanByInit = open.filter(a => !a.objectiveId);
  if (orphanByInit.length > 0) {
    initRows.push({ key: '_orphan', label: 'No initiative linked', pillarNum: '⚠', pillarName: '—', pillarN: 0, letter: '⚠', actions: orphanByInit, stats: statusBucket(orphanByInit), orphan: true });
  }
  initRows.sort((x, y) => {
    if (x.orphan) return 1;
    if (y.orphan) return -1;
    return y.stats.total - x.stats.total;
  });

  // Render a status bar with width proportional to row total vs max total in the section
  // (so a row with 15 actions has a wider bar than a row with 3). This makes the visual
  // weight match the load.
  function statusBar(s, maxTotal) {
    if (s.total === 0) return '';
    const segs = [];
    if (s.red) segs.push(`<span class="sum-seg seg-red" style="flex:${s.red}">${s.red}</span>`);
    if (s.amber) segs.push(`<span class="sum-seg seg-amber" style="flex:${s.amber}">${s.amber}</span>`);
    if (s.green) segs.push(`<span class="sum-seg seg-green" style="flex:${s.green}">${s.green}</span>`);
    // Bar fill width = this row's total as a proportion of the max total in the section
    const widthPct = maxTotal > 0 ? Math.max(8, (s.total / maxTotal) * 100) : 0;
    return `<div class="sum-bar" style="width:${widthPct}%;">${segs.join('')}</div>`;
  }
  function flagChips(s) {
    const parts = [];
    if (s.priority) parts.push(`<span class="sum-chip priority" title="${s.priority} priority action${s.priority === 1 ? '' : 's'}">★ ${s.priority}</span>`);
    if (s.overdue) parts.push(`<span class="sum-chip overdue" title="${s.overdue} overdue">⚠ ${s.overdue}</span>`);
    return parts.length ? `<div class="sum-flag-group">${parts.join('')}</div>` : '';
  }

  // Owner avatar — coloured circle with initials. Colour derived deterministically from
  // owner string so it stays consistent per person.
  function ownerAvatarColour(name) {
    const palette = ['#0F4A2A', '#1E7A47', '#C2185B', '#E67E22', '#00897B', '#7B1FA2', '#1565C0', '#5D4037'];
    let h = 0;
    for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
    return palette[Math.abs(h) % palette.length];
  }

  const maxOwner = Math.max(1, ...ownerRows.map(r => r.stats.total));
  const maxPillar = Math.max(1, ...pillarRows.map(r => r.stats.total));
  const maxInit = Math.max(1, ...initRows.map(r => r.stats.total));

  let html = `
    <div class="summary-block">
      <div class="summary-block-head">
        <h3>By Owner</h3>
        <span class="summary-block-sub">Open actions on each person's plate. Bar width shows relative load.</span>
      </div>
      <div class="sum-rows">
        ${ownerRows.length === 0 ? '<div class="sum-row-empty">No open actions.</div>' :
          ownerRows.map(r => {
            if (r.stats.total === 0) {
              return `
                <div class="sum-row sum-row-zero">
                  <div class="sum-row-avatar" style="background:${ownerAvatarColour(r.label)};">${escapeHtml(r.label)}</div>
                  <div class="sum-row-main">
                    <div class="sum-row-label">${escapeHtml(r.label)}</div>
                    <div class="sum-row-empty-note">No open work</div>
                  </div>
                </div>
              `;
            }
            return `
              <div class="sum-row">
                <div class="sum-row-avatar" style="background:${ownerAvatarColour(r.label)};">${escapeHtml(r.label)}</div>
                <div class="sum-row-main">
                  <div class="sum-row-header">
                    <span class="sum-row-label">${escapeHtml(r.label)}</span>
                    <span class="sum-row-total">${r.stats.total}</span>
                  </div>
                  <div class="sum-row-bar-line">
                    ${statusBar(r.stats, maxOwner)}
                    ${flagChips(r.stats)}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
      </div>
    </div>

    <div class="summary-block">
      <div class="summary-block-head">
        <h3>By Strategic Pillar</h3>
        <span class="summary-block-sub">Where the open work is loaded.</span>
      </div>
      <div class="sum-rows">
        ${pillarRows.map(r => {
          if (r.stats.total === 0) {
            return `
              <div class="sum-row sum-row-zero pillar-accent-${r.pillarN}">
                <div class="sum-row-pillar-badge pillar-color-${r.pillarN}">${escapeHtml(r.num)}</div>
                <div class="sum-row-main">
                  <div class="sum-row-label">${escapeHtml(r.label)}</div>
                  <div class="sum-row-empty-note">No open actions on this pillar</div>
                </div>
              </div>
            `;
          }
          return `
            <div class="sum-row pillar-accent-${r.pillarN} ${r.orphan ? 'sum-row-orphan' : ''}">
              <div class="sum-row-pillar-badge pillar-color-${r.pillarN}">${escapeHtml(r.num)}</div>
              <div class="sum-row-main">
                <div class="sum-row-header">
                  <span class="sum-row-label">${escapeHtml(r.label)}</span>
                  <span class="sum-row-total">${r.stats.total}</span>
                </div>
                <div class="sum-row-bar-line">
                  ${statusBar(r.stats, maxPillar)}
                  ${flagChips(r.stats)}
                </div>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="summary-block">
      <div class="summary-block-head">
        <h3>By Initiative</h3>
        <span class="summary-block-sub">Sorted by load. Empty initiatives sit at the bottom — worth questioning whether they're still alive.</span>
      </div>
      <div class="sum-rows">
        ${initRows.length === 0 ? '<div class="sum-row-empty">No initiatives yet.</div>' :
          initRows.map(r => {
            if (r.stats.total === 0) {
              return `
                <div class="sum-row sum-row-zero sum-row-init pillar-accent-${r.pillarN}">
                  <div class="sum-row-init-letter pillar-color-${r.pillarN}">${escapeHtml(r.letter)}</div>
                  <div class="sum-row-main">
                    <div class="sum-row-header">
                      <span class="sum-row-init-pillar pillar-color-${r.pillarN}">${escapeHtml(r.pillarNum)}</span>
                      <span class="sum-row-label">${escapeHtml(r.label)}</span>
                    </div>
                    <div class="sum-row-empty-note">No open actions — drop or revive?</div>
                  </div>
                </div>
              `;
            }
            return `
              <div class="sum-row sum-row-init pillar-accent-${r.pillarN} ${r.orphan ? 'sum-row-orphan' : ''}">
                <div class="sum-row-init-letter pillar-color-${r.pillarN}">${escapeHtml(r.letter)}</div>
                <div class="sum-row-main">
                  <div class="sum-row-header">
                    <span class="sum-row-init-pillar pillar-color-${r.pillarN}">${escapeHtml(r.pillarNum)}</span>
                    <span class="sum-row-label">${escapeHtml(r.label)}</span>
                    <span class="sum-row-total">${r.stats.total}</span>
                  </div>
                  <div class="sum-row-bar-line">
                    ${statusBar(r.stats, maxInit)}
                    ${flagChips(r.stats)}
                  </div>
                </div>
              </div>
            `;
          }).join('')}
      </div>
    </div>
  `;
  body.innerHTML = html;
}

// =================================================================
// RENDER — AUDIT LOG
// =================================================================
let auditFilter = { pillar: 'all', owner: 'all', type: 'all' };

function renderAudit() {
  // Pillar filter
  const pillarSel = document.getElementById('audit-filter-pillar');
  const cur = pillarSel.value || 'all';
  const knownPillars = new Set([...data.pillars.map(p=>p.id), ...auditLog.filter(a=>a.pillarId).map(a=>a.pillarId)]);
  pillarSel.innerHTML = '<option value="all">All Strategic Pillars</option>' +
    [...knownPillars].map(pid => {
      const cur = data.pillars.find(p => p.id === pid);
      const name = cur ? cur.name : (auditLog.find(a => a.pillarId === pid)?.pillarName || 'Unknown');
      return `<option value="${pid}">${escapeHtml(name)}</option>`;
    }).join('') + '<option value="_none">No Pillar (cross-cutting)</option>';
  pillarSel.value = cur;

  // Owner filter
  const ownerSel = document.getElementById('audit-filter-owner');
  const curOwner = ownerSel.value || 'all';
  const knownOwners = new Set([...OWNERS, ...auditLog.filter(a=>a.actionOwner).map(a=>a.actionOwner)]);
  ownerSel.innerHTML = '<option value="all">All Owners</option>' +
    [...knownOwners].sort().map(o => `<option value="${o}">${escapeHtml(o)}</option>`).join('');
  ownerSel.value = curOwner;

  // Filter
  const filtered = auditLog.filter(e => {
    if (auditFilter.pillar !== 'all') {
      if (auditFilter.pillar === '_none' && e.pillarId) return false;
      if (auditFilter.pillar !== '_none' && e.pillarId !== auditFilter.pillar) return false;
    }
    if (auditFilter.owner !== 'all' && e.actionOwner !== auditFilter.owner) return false;
    if (auditFilter.type !== 'all' && e.action !== auditFilter.type) return false;
    return true;
  }).reverse();

  // Summary stats from full log
  const stats = { add: 0, edit: 0, delete: 0, complete: 0, 'rag-change': 0 };
  auditLog.forEach(e => { if (stats[e.action] !== undefined) stats[e.action]++; });
  document.getElementById('audit-summary').innerHTML = `
    <div class="audit-stat add"><div class="stat-num">${stats.add}</div><div class="stat-label">Additions</div></div>
    <div class="audit-stat edit"><div class="stat-num">${stats.edit}</div><div class="stat-label">Edits</div></div>
    <div class="audit-stat delete"><div class="stat-num">${stats.delete}</div><div class="stat-label">Deletions</div></div>
    <div class="audit-stat complete"><div class="stat-num">${stats.complete}</div><div class="stat-label">Completions</div></div>
    <div class="audit-stat rag-change"><div class="stat-num">${stats['rag-change']}</div><div class="stat-label">RAG Changes</div></div>
  `;

  // List
  const listEl = document.getElementById('audit-list');
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="audit-empty">No log entries match these filters.</div>`;
    return;
  }
  listEl.innerHTML = filtered.map(e => {
    const styleNum = e.pillarId ? pillarNumForId(e.pillarId) : null;
    const pillarTag = e.pillarId
      ? `<div class="audit-pillar-tag ${styleNum ? 'p'+styleNum : ''}">${escapeHtml(e.pillarName || 'Unknown')}</div>`
      : `<div class="audit-pillar-tag">— Cross-cutting</div>`;
    let changeBlock = '';
    if (e.oldValue && e.newValue) {
      changeBlock = `<div class="audit-meta-line"><span class="audit-change old">${escapeHtml(e.oldValue)}</span> → <span class="audit-change new">${escapeHtml(e.newValue)}</span></div>`;
    } else if (e.detail) {
      changeBlock = `<div class="audit-meta-line">${escapeHtml(e.detail)}</div>`;
    }
    const ownerTag = e.actionOwner ? `<span style="background:var(--tag-green-dark);color:white;padding:2px 6px;border-radius:4px;font-size:10px;font-family:var(--font-mono);font-weight:700;margin-left:6px;">${escapeHtml(e.actionOwner)}</span>` : '';
    return `
      <div class="audit-entry">
        <div class="audit-time">
          <span class="date">${formatRelativeTime(e.ts)}</span>
          ${formatFullTime(e.ts)}
        </div>
        <div class="audit-action-tag ${e.action}">${e.action.replace('-', ' ')}</div>
        ${pillarTag}
        <div class="audit-detail">
          <div class="audit-summary-line">${escapeHtml(e.summary)}${ownerTag}</div>
          ${changeBlock}
        </div>
        <div class="audit-user">${escapeHtml(e.user || 'Unknown')}</div>
      </div>
    `;
  }).join('');
}

// =================================================================
// MASTER RENDER
// =================================================================
function renderAll() {
  renumberPillars();
  renderHomeArrows();
  if (typeof updateStartBanner === 'function') updateStartBanner();
  if (viewMode === 'focus' && focusedPillarId) renderFocusHeader(focusedPillarId);
  renderPillars();
  renderRoadmapHigh();
  renderRoadmapDetail();
  renderAgenda();
  if (typeof renderSummary === 'function') renderSummary();
  if (activeFilter) renderActionListPanel(activeFilter);
  if (document.getElementById('filter-pillar')) populateFilterDropdowns();
  // If a session is in flight, refresh the active step so action mutations
  // bubble through immediately.
  if (typeof sessionState !== 'undefined' && sessionState.active) {
    if (sessionState.step === 2) renderSessionStep2();
    else if (sessionState.step === 4) renderSessionStep4();
  }
  save();
}

// =================================================================
// EVENT WIRING
// =================================================================

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  // Skip the reference toggle — it has its own handler that opens the menu
  if (tab.id === 'reference-toggle') return;
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    tab.classList.add('active');
    const targetView = document.getElementById('view-' + tab.dataset.view);
    if (targetView) targetView.classList.add('active');
    if (tab.dataset.view === 'audit') renderAudit();
    if (tab.dataset.view === 'strategic') renderStrategic();
    // When switching to the Actions (Home) tab, return to home view
    if (tab.dataset.view === 'actions') setViewMode('home');
  });
});

// Click delegation: arrows, objective groups, breadcrumbs
document.body.addEventListener('click', (e) => {
  // Arrow pillar tile click → drill into pillar
  const arrow = e.target.closest('[data-focus-pillar]');
  if (arrow) {
    setViewMode('focus', arrow.dataset.focusPillar);
    return;
  }
  // Objective group head / tile click → drill into objective
  const objHead = e.target.closest('[data-drill-objective]');
  if (objHead) {
    // Don't drill if the click landed on contenteditable text, an interactive tool button, or the
    // letter badge (the letter badge has its own drill data and bubbles to here too — fine —
    // but we want clicks INSIDE the objective tile's text/tools to NOT drill).
    if (e.target.isContentEditable) return;
    if (e.target.closest('.objective-tile-tools')) return;
    if (e.target.closest('[data-priority-up],[data-priority-down],[data-priority-delete]')) return;
    const objId = objHead.dataset.drillObjective;
    const objInfo = findObjective(objId);
    if (objInfo) {
      setViewMode('objective', objInfo.pillar.id, objId);
    }
    return;
  }
  // Breadcrumb: home
  if (e.target.closest('[data-bc-home]')) {
    setViewMode('home');
    return;
  }
  // Breadcrumb: back to pillar from objective
  const bcPillar = e.target.closest('[data-bc-pillar]');
  if (bcPillar) {
    setViewMode('focus', bcPillar.dataset.bcPillar);
    return;
  }
  // Jump to SLT Strategic Setup view (e.g. from the lock note in pillar focus)
  if (e.target.closest('[data-go-slt]')) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    const tab = document.querySelector('.tab[data-view="strategic"]');
    const view = document.getElementById('view-strategic');
    if (tab) tab.classList.add('active');
    if (view) view.classList.add('active');
    renderStrategic();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
});

// Keyboard accessibility on arrows + objective heads
document.body.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter' && e.key !== ' ') return;
  const arrow = e.target.closest && e.target.closest('[data-focus-pillar]');
  if (arrow) {
    e.preventDefault();
    setViewMode('focus', arrow.dataset.focusPillar);
    return;
  }
  const objHead = e.target.closest && e.target.closest('[data-drill-objective]');
  if (objHead) {
    e.preventDefault();
    const objId = objHead.dataset.drillObjective;
    const objInfo = findObjective(objId);
    if (objInfo) setViewMode('objective', objInfo.pillar.id, objId);
  }
});

document.getElementById('al-close').addEventListener('click', () => {
  activeFilter = null;
  document.getElementById('action-list-panel').classList.remove('show');
});

// Add Action button — just opens the modal (icons are always visible now)
document.body.classList.add('edit-mode');
document.getElementById('btn-edit').addEventListener('click', () => {
  // Pull context from current focus: if drilled into a pillar/initiative, prefill it.
  // Saves a click and reinforces "this action serves THIS pillar".
  const pillarId = (viewMode === 'focus' || viewMode === 'objective') ? focusedPillarId : null;
  const objectiveId = (viewMode === 'objective') ? focusedObjectiveId : null;
  openActionModal(pillarId, null, objectiveId);
});

// Save Baseline / Reset
document.getElementById('btn-save-baseline').addEventListener('click', () => {
  if (!isDirty()) { toast('No changes to save', 'success'); return; }
  saveBaseline();
  logAudit({ action: 'baseline-saved', area: 'system', pillarId: null, pillarName: null, itemName: 'Baseline', summary: 'Saved baseline snapshot', detail: 'All current state locked in as new restore point' });
  toast('Baseline saved — Reset will return here', 'success');
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (!isDirty()) { toast('Already at baseline', 'success'); return; }
  if (!confirm('Discard unsaved changes and revert to last saved baseline?')) return;
  data = JSON.parse(JSON.stringify(baseline));
  logAudit({ action: 'edit', area: 'system', pillarId: null, pillarName: null, itemName: 'Reset', summary: 'Reverted to last saved baseline', detail: '' });
  renderAll();
  toast('Reverted to baseline', 'success');
});
document.getElementById('btn-help').addEventListener('click', () => openModal('modal-help'));

// Modals
function openModal(id) { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.modal-backdrop').forEach(m => {
  m.addEventListener('click', (e) => {
    if (e.target === m || e.target.hasAttribute('data-close')) m.classList.remove('show');
  });
});

// Populate action modal selects
function populateActionModalSelects() {
  document.getElementById('new-a-owner').innerHTML = OWNERS.map(o => `<option value="${o}">${o}</option>`).join('');
  document.getElementById('new-a-pillar').innerHTML = data.pillars.map(p => `<option value="${p.id}">${p.num} - ${escapeHtml(p.name)}</option>`).join('');
  populateObjectiveDropdown(); // initial fill
}

function populateObjectiveDropdown() {
  const pillarId = document.getElementById('new-a-pillar').value;
  const pillar = data.pillars.find(p => p.id === pillarId);
  const sel = document.getElementById('new-a-objective');
  if (!sel) return;
  const opts = ['<option value="">— None (assign later) —</option>'];
  if (pillar && Array.isArray(pillar.objectives)) {
    pillar.objectives.forEach((o, i) => {
      const letter = String.fromCharCode(65 + i);
      opts.push(`<option value="${o.id}">${letter} · ${escapeHtml(o.text)}</option>`);
    });
  }
  sel.innerHTML = opts.join('');
}

// Refresh objective options + context pill when pillar/initiative change in the action modal
document.body.addEventListener('change', (e) => {
  if (e.target && e.target.id === 'new-a-pillar') {
    const currentObj = document.getElementById('new-a-objective').value;
    populateObjectiveDropdown();
    // Try to preserve the selection if it's still valid; otherwise clear
    if (currentObj) document.getElementById('new-a-objective').value = currentObj;
    renderModalContextPill();
  }
  if (e.target && e.target.id === 'new-a-objective') {
    renderModalContextPill();
  }
});

// Period toggle: when a user ticks "This runs over a period" we reveal the Start Date
// input and relabel "Due Date" to "End Date". Unchecking hides Start and clears its value,
// so we don't accidentally persist a stale start date for a single-date action.
function setPeriodToggleState(on) {
  const check = document.getElementById('new-a-has-start');
  const wrap = document.getElementById('new-a-start-wrap');
  const dueLabel = document.getElementById('new-a-due-label');
  const startInput = document.getElementById('new-a-start');
  if (!check || !wrap || !dueLabel) return;
  check.checked = !!on;
  wrap.style.display = on ? '' : 'none';
  dueLabel.textContent = on ? 'End Date' : 'Due Date';
  if (!on && startInput) startInput.value = '';
}
document.body.addEventListener('change', (e) => {
  if (e.target && e.target.id === 'new-a-has-start') {
    setPeriodToggleState(e.target.checked);
  }
});

function openActionModal(pillarId, existingId, objectiveId) {
  populateActionModalSelects();
  if (existingId) {
    const a = data.actions.find(x => x.id === existingId);
    if (!a) return;
    document.getElementById('modal-action-title').textContent = 'Edit Action';
    document.getElementById('action-edit-id').value = a.id;
    document.getElementById('action-edit-pillar').value = a.pillar;
    document.getElementById('new-a-desc').value = a.desc;
    document.getElementById('new-a-owner').value = a.owner;
    document.getElementById('new-a-pillar').value = a.pillar;
    populateObjectiveDropdown();
    document.getElementById('new-a-objective').value = a.objectiveId || '';
    document.getElementById('new-a-due').value = a.due || '';
    document.getElementById('new-a-start').value = a.start || '';
    document.getElementById('new-a-rag').value = a.rag;
    document.getElementById('new-a-complete-flag').value = a.complete ? '1' : '0';
    document.getElementById('new-a-priority').checked = !!a.priority;
    document.getElementById('new-a-notes').value = a.notes || '';
    // If this action has a start date, surface the period toggle on
    setPeriodToggleState(!!a.start);
  } else {
    document.getElementById('modal-action-title').textContent = 'Add Action';
    document.getElementById('action-edit-id').value = '';
    document.getElementById('action-edit-pillar').value = pillarId || '';
    document.getElementById('new-a-desc').value = '';
    document.getElementById('new-a-owner').value = OWNERS[0];
    document.getElementById('new-a-pillar').value = pillarId || (data.pillars[0] && data.pillars[0].id) || '';
    populateObjectiveDropdown();
    // Prefill initiative if passed (e.g. opened from inside an initiative drill-down)
    document.getElementById('new-a-objective').value = objectiveId || '';
    document.getElementById('new-a-due').value = '';
    document.getElementById('new-a-start').value = '';
    document.getElementById('new-a-rag').value = 'amber';
    document.getElementById('new-a-complete-flag').value = '0';
    document.getElementById('new-a-priority').checked = false;
    document.getElementById('new-a-notes').value = '';
    setPeriodToggleState(false);
    // Focus order: if pillar is already set (we have context), jump to description.
    // If no pillar context, focus the pillar select so the user starts there.
    setTimeout(() => {
      const target = pillarId ? document.getElementById('new-a-desc') : document.getElementById('new-a-pillar');
      if (target) target.focus();
    }, 100);
  }
  renderModalContextPill();
  openModal('modal-add-action');
}

// Show a small coloured pill at the top of the modal indicating which pillar / initiative
// this action will sit under. Updates live as the user changes the dropdowns.
function renderModalContextPill() {
  const host = document.getElementById('modal-context-pill');
  if (!host) return;
  const pillarId = document.getElementById('new-a-pillar').value;
  const objId = document.getElementById('new-a-objective').value;
  const pillar = data.pillars.find(p => p.id === pillarId);
  if (!pillar) { host.innerHTML = ''; host.className = 'modal-context-pill'; return; }
  const pillarN = pillarStyleNum(pillar.id);
  let objLabel = '';
  if (objId) {
    const obj = (pillar.objectives || []).find(o => o.id === objId);
    if (obj) {
      const idx = (pillar.objectives || []).findIndex(o => o.id === objId);
      const letter = idx >= 0 ? String.fromCharCode(65 + idx) : '';
      objLabel = `<span class="modal-context-arrow">›</span><span class="modal-context-init"><span class="modal-context-init-letter">${letter}</span>${escapeHtml(obj.text)}</span>`;
    }
  } else {
    objLabel = `<span class="modal-context-arrow">›</span><span class="modal-context-init-empty">⚠ No initiative linked</span>`;
  }
  host.className = `modal-context-pill pillar-color-${pillarN}`;
  host.innerHTML = `
    <span class="modal-context-pillar-badge">${escapeHtml(pillar.num)}</span>
    <span class="modal-context-pillar-name">${escapeHtml(pillar.name)}</span>
    ${objLabel}
  `;
}

// Save action
document.getElementById('save-action').addEventListener('click', () => {
  const id = document.getElementById('action-edit-id').value;
  const desc = document.getElementById('new-a-desc').value.trim();
  if (!desc) { toast('Description required', 'error'); return; }
  const pillar = document.getElementById('new-a-pillar').value;
  const objectiveId = document.getElementById('new-a-objective').value || null;
  const owner = document.getElementById('new-a-owner').value;
  const due = document.getElementById('new-a-due').value;
  const start = document.getElementById('new-a-start').value;
  const rag = document.getElementById('new-a-rag').value;
  const complete = document.getElementById('new-a-complete-flag').value === '1';
  const priority = !!document.getElementById('new-a-priority').checked;
  const notes = document.getElementById('new-a-notes').value.trim();

  // Discipline check: every action should map to a Strategic Pillar AND an Initiative.
  // If either is missing, ask the user to confirm — the action will be flagged in Step 2
  // until linked. (Pillar is normally always set because the dropdown defaults to the first
  // pillar, so this primarily catches a missing initiative.)
  const linkedObj = findObjective(objectiveId);
  const missingPillar = !pillar || !data.pillars.find(p => p.id === pillar);
  const missingInitiative = !linkedObj;
  if (missingPillar || missingInitiative) {
    const what = missingPillar && missingInitiative ? 'Strategic Pillar and Initiative'
               : missingPillar ? 'Strategic Pillar'
               : 'Initiative';
    const ok = confirm(
      `This action has no ${what} linked.\n\n` +
      `Every action should serve a Strategic Pillar and an Initiative — otherwise it\u2019s worth asking why we\u2019re doing it at all.\n\n` +
      `Save without linking? It will be flagged in the weekly review until linked.`
    );
    if (!ok) {
      // Drop focus to the relevant dropdown so the user can fix it without re-opening
      const target = document.getElementById(missingPillar ? 'new-a-pillar' : 'new-a-objective');
      if (target) target.focus();
      return;
    }
  }

  if (id) {
    const a = data.actions.find(x => x.id === id);
    if (!a) return;
    const changes = [];
    if (a.desc !== desc) changes.push(['description', a.desc, desc]);
    if (a.owner !== owner) changes.push(['owner', a.owner, owner]);
    if (a.due !== due) changes.push(['due date', a.due, due]);
    if (a.start !== start) changes.push(['start date', a.start, start]);
    if (a.rag !== rag) changes.push(['RAG', a.rag, rag]);
    if (a.complete !== complete) changes.push(['complete', a.complete?'Yes':'No', complete?'Yes':'No']);
    if (a.notes !== notes) changes.push(['notes', '', '']);
    if (!!a.priority !== priority) changes.push(['priority', a.priority ? 'Yes' : 'No', priority ? 'Yes' : 'No']);
    if ((a.objectiveId || null) !== (objectiveId || null)) {
      const oldObj = findObjective(a.objectiveId);
      const newObj = findObjective(objectiveId);
      changes.push(['objective', oldObj ? oldObj.objective.text : '(none)', newObj ? newObj.objective.text : '(none)']);
    }

    const wasComplete = a.complete;
    a.desc = desc; a.owner = owner; a.due = due; a.start = start; a.rag = rag; a.complete = complete; a.notes = notes;
    a.priority = priority;
    a.pillar = pillar;
    a.objectiveId = objectiveId;

    changes.forEach(([field, oldV, newV]) => {
      const action = (field === 'complete' && complete && !wasComplete) ? 'complete'
        : (field === 'RAG') ? 'rag-change' : 'edit';
      logAudit({
        action, area: 'action',
        pillarId: pillar, pillarName: pillarNameForId(pillar),
        actionOwner: owner, itemName: desc,
        summary: action === 'complete' ? `🎯 Completed: "${desc}"` :
                 action === 'rag-change' ? `RAG changed on "${desc}": ${oldV.toUpperCase()} → ${newV.toUpperCase()}` :
                 `Updated ${field} on "${desc}"`,
        detail: field === 'notes' ? 'Notes updated' : '',
        oldValue: field === 'notes' ? '' : String(oldV || ''),
        newValue: field === 'notes' ? '' : String(newV || '')
      });
    });
    toast('Action updated', 'success');
  } else {
    const newA = {
      id: uid('a'), pillar, objectiveId, desc, owner, due, start, rag, complete, notes, priority
    };
    data.actions.push(newA);
    const objInfo = findObjective(objectiveId);
    const unlinkedNote = objInfo ? '' : ' · ⚠ No initiative linked — flagged in weekly review';
    logAudit({
      action: 'add', area: 'action',
      pillarId: pillar, pillarName: pillarNameForId(pillar),
      actionOwner: owner, itemName: desc,
      summary: `Added action "${desc}"${objInfo ? '' : ' (unlinked)'}`,
      detail: `Owner: ${owner} · Due: ${due || 'none'} · RAG: ${rag}${objInfo ? ' · Initiative: ' + objInfo.objective.text : unlinkedNote}`
    });
    toast(objInfo ? 'Action added' : 'Action added — unlinked, will flag in review', 'success');
  }
  closeModal('modal-add-action');
  renderAll();
});

// Centralized action handler
document.body.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) return;
  const action = target.dataset.action;

  if (action === 'add-action') openActionModal(target.dataset.pillar, null);
  else if (action === 'edit-action') openActionModal(null, target.dataset.id);
  else if (action === 'link-objective') {
    openActionModal(null, target.dataset.id);
    setTimeout(() => {
      const sel = document.getElementById('new-a-objective');
      if (sel) sel.focus();
    }, 150);
  }
  else if (action === 'delete-action') {
    const a = data.actions.find(x => x.id === target.dataset.id);
    if (!a) return;
    if (!confirm(`Delete action: "${a.desc}"?`)) return;
    const snapshot = JSON.parse(JSON.stringify(a)); // deep copy for restoration
    const auditEntry = {
      action: 'delete', area: 'action',
      pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
      actionOwner: a.owner, itemName: a.desc,
      summary: `Deleted action "${a.desc}"`,
      detail: `Owner: ${a.owner} · Was: ${a.rag.toUpperCase()}${a.complete ? ' (complete)' : ''}`
    };
    logAudit(auditEntry);
    data.actions = data.actions.filter(x => x.id !== a.id);
    renderAll();
    toast('Action deleted');
    offerUndo(`Deleted "${a.desc.slice(0, 50)}${a.desc.length > 50 ? '…' : ''}"`, () => {
      data.actions.push(snapshot);
      logAudit({
        action: 'add', area: 'action',
        pillarId: snapshot.pillar, pillarName: pillarNameForId(snapshot.pillar),
        actionOwner: snapshot.owner, itemName: snapshot.desc,
        summary: `Restored action "${snapshot.desc}" via undo`,
        detail: 'Undo of recent deletion'
      });
      save();
      renderAll();
    });
  }
  else if (action === 'cycle-rag') {
    const a = data.actions.find(x => x.id === target.dataset.id);
    if (!a || a.complete) return;
    const cycle = { red: 'amber', amber: 'green', green: 'red' };
    const oldRag = a.rag;
    a.rag = cycle[a.rag] || 'amber';
    logAudit({
      action: 'rag-change', area: 'action',
      pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
      actionOwner: a.owner, itemName: a.desc,
      summary: `RAG changed on "${a.desc}": ${oldRag.toUpperCase()} → ${a.rag.toUpperCase()}`,
      detail: '',
      oldValue: oldRag, newValue: a.rag
    });
    // If we're in session step 2 and the new RAG is green, fade out (will drop from hot list)
    const isSessionStep2 = (typeof sessionState !== 'undefined' && sessionState.active && sessionState.step === 2);
    if (isSessionStep2 && a.rag === 'green') {
      const row = document.querySelector(`.session-hot-pillar [data-action-id="${a.id}"]`);
      if (row) {
        row.classList.add('action-row-removing');
        toast('RAG → Green', 'success');
        setTimeout(() => { renderAll(); }, 380);
        save();
        return;
      }
    }
    renderAll();
    toast(`RAG → ${a.rag.toUpperCase()}`, 'success');
  }
  else if (action === 'toggle-complete') {
    const a = data.actions.find(x => x.id === target.dataset.id);
    if (!a) return;
    a.complete = !a.complete;
    a.completedAt = a.complete ? new Date().toISOString() : null;
    logAudit({
      action: a.complete ? 'complete' : 'edit',
      area: 'action',
      pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
      actionOwner: a.owner, itemName: a.desc,
      summary: a.complete ? `🎯 Completed: "${a.desc}"` : `Reopened: "${a.desc}"`,
      detail: ''
    });
    // If we're in session step 2 and completed an action, fade the row out before re-rendering
    const isSessionStep2 = (typeof sessionState !== 'undefined' && sessionState.active && sessionState.step === 2 && a.complete);
    if (isSessionStep2) {
      const row = document.querySelector(`.session-hot-pillar [data-action-id="${a.id}"]`);
      if (row) {
        row.classList.add('action-row-removing');
        toast(a.complete ? 'Marked complete' : 'Reopened', 'success');
        setTimeout(() => { renderAll(); }, 380);
        save();
        return;
      }
    }
    renderAll();
    toast(a.complete ? '✓ Marked complete — nice one' : 'Reopened', 'success');
  }
  else if (action === 'toggle-priority') {
    const a = data.actions.find(x => x.id === target.dataset.id);
    if (!a) return;
    a.priority = !a.priority;
    logAudit({
      action: 'edit', area: 'action',
      pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
      actionOwner: a.owner, itemName: a.desc,
      summary: a.priority ? `Marked as priority: "${a.desc}"` : `Removed priority flag: "${a.desc}"`,
      detail: '',
      oldValue: a.priority ? 'No' : 'Yes',
      newValue: a.priority ? 'Yes' : 'No'
    });
    renderAll();
    toast(a.priority ? '★ Marked as priority' : 'Priority flag removed', 'success');
  }
  else if (action === 'delete-pillar') {
    const p = data.pillars.find(x => x.id === target.dataset.pillar);
    if (!p) return;
    const count = data.actions.filter(a => a.pillar === p.id).length;
    if (!confirm(`Delete Strategic Pillar "${p.name}" and its ${count} action(s)?`)) return;
    logAudit({ action: 'delete', area: 'pillar', pillarId: p.id, pillarName: p.name, itemName: p.name, summary: `Deleted Strategic Pillar "${p.name}"`, detail: `Removed ${count} action(s)` });
    data.pillars = data.pillars.filter(x => x.id !== p.id);
    data.actions = data.actions.filter(a => a.pillar !== p.id);
    renderAll();
    toast('Strategic Pillar removed');
  }
  else if (action === 'delete-agenda') {
    const a = data.agenda.find(x => x.id === target.dataset.id);
    if (!a) return;
    if (!confirm('Delete this agenda item?')) return;
    logAudit({ action: 'delete', area: 'agenda', pillarId: null, pillarName: null, itemName: a.title, summary: `Deleted agenda item "${a.title}"`, detail: '' });
    data.agenda = data.agenda.filter(x => x.id !== a.id);
    renderAll();
  }
  else if (action === 'delete-principle') {
    const idx = parseInt(target.dataset.idx);
    const text = data.principles[idx];
    logAudit({ action: 'delete', area: 'principle', pillarId: null, pillarName: null, itemName: text.substring(0,60), summary: 'Deleted operating principle', detail: text });
    data.principles.splice(idx, 1);
    renderAll();
  }
});

