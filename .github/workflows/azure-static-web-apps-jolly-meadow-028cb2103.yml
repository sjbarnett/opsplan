  .ct.green { background: #27AE60; color: white; }
  .ct.overdue { background: white; color: #C0392B; box-shadow: inset 0 0 0 1px #C0392B; }

  .muted { color: #BDC3C7; }

  .aob-report-list {
    list-style: none;
    padding: 0;
    counter-reset: aob;
  }
  .aob-report-list li {
    counter-increment: aob;
