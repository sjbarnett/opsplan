// Inline editing
document.body.addEventListener('change', (e) => {
  const el = e.target;
  if (!el.matches('.editable, .inline-select')) return;
  handleEdit(el);
});
document.body.addEventListener('blur', (e) => {
  const el = e.target;
  if (!el.matches('.editable')) return;
  if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') return;
  handleEdit(el);
}, true);
document.body.addEventListener('click', (e) => {
  if (!document.body.classList.contains('edit-mode')) return;
  const el = e.target;
  if (el.matches('span.editable')) {
    el.contentEditable = 'true';
    el.focus();
  }
});

function handleEdit(el) {
  const field = el.dataset.field;
  const val = el.tagName === 'INPUT' || el.tagName === 'SELECT' || el.tagName === 'TEXTAREA' ? el.value : el.textContent.trim();

  if (field === 'pillar-name' || field === 'pillar-tag') {
    const p = data.pillars.find(x => x.id === el.dataset.pillar);
    if (!p) return;
    const f = field === 'pillar-name' ? 'name' : 'tag';
    if (p[f] === val) return;
    const old = p[f];
    p[f] = val;
    logAudit({ action: 'edit', area: 'pillar', pillarId: p.id, pillarName: p.name, itemName: p.name, summary: `Updated pillar ${f}: "${old}" → "${val}"`, oldValue: old, newValue: val });
  }
  else if (field === 'action-desc') {
    const a = data.actions.find(x => x.id === el.dataset.id);
    if (!a || a.desc === val) return;
    const old = a.desc;
    a.desc = val;
    logAudit({ action: 'edit', area: 'action', pillarId: a.pillar, pillarName: pillarNameForId(a.pillar), actionOwner: a.owner, itemName: val, summary: `Renamed action`, oldValue: old, newValue: val });
  }
  else if (field === 'ag-time' || field === 'ag-title' || field === 'ag-desc' || field === 'ag-owner') {
    const a = data.agenda.find(x => x.id === el.dataset.id);
    if (!a) return;
    const map = { 'ag-time':'time','ag-title':'title','ag-desc':'desc','ag-owner':'owner' };
    const f = map[field];
    if (a[f] === val) return;
    const old = a[f];
    a[f] = val;
    logAudit({ action: 'edit', area: 'agenda', pillarId: null, pillarName: null, itemName: a.title, summary: `Updated agenda ${f}`, oldValue: old, newValue: val });
  }
  else if (field === 'principle') {
    const idx = parseInt(el.dataset.idx);
    if (data.principles[idx] === val) return;
    const old = data.principles[idx];
    data.principles[idx] = val;
    logAudit({ action: 'edit', area: 'principle', pillarId: null, pillarName: null, itemName: val.substring(0,60), summary: 'Updated operating principle', oldValue: old, newValue: val });
  }
  save();
}

