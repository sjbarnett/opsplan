let data, baseline, auditLog, currentUser;

try {
  const stored = localStorage.getItem(STORAGE_KEY);
  data = stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(defaultData));
} catch (e) {
  data = JSON.parse(JSON.stringify(defaultData));
}
try {
  const storedBaseline = localStorage.getItem(BASELINE_KEY);
  baseline = storedBaseline ? JSON.parse(storedBaseline) : JSON.parse(JSON.stringify(defaultData));
  if (!storedBaseline) localStorage.setItem(BASELINE_KEY, JSON.stringify(baseline));
} catch (e) {
  baseline = JSON.parse(JSON.stringify(defaultData));
}
try {
  const storedAudit = localStorage.getItem(AUDIT_KEY);
  auditLog = storedAudit ? JSON.parse(storedAudit) : [];
} catch (e) {
  auditLog = [];
}
// Clean up the old pre-rename audit key. If it's still in localStorage from a previous
// version of the tool, remove it so it doesn't linger. Silent — nothing the user needs to see.
try { localStorage.removeItem('tag_actions_audit_v11'); } catch (e) {}
currentUser = localStorage.getItem(USER_KEY) || '';

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    updateBaselineIndicator();
  } catch (e) { toast('Could not save: ' + e.message, 'error'); }
}
function saveBaseline() {
  baseline = JSON.parse(JSON.stringify(data));
  localStorage.setItem(BASELINE_KEY, JSON.stringify(baseline));
  updateBaselineIndicator();
}
function saveAudit() {
  try { localStorage.setItem(AUDIT_KEY, JSON.stringify(auditLog)); }
  catch (e) {
    if (auditLog.length > 500) {
      auditLog = auditLog.slice(-500);
      try { localStorage.setItem(AUDIT_KEY, JSON.stringify(auditLog)); } catch(_) {}
    }
  }
}
function isDirty() {
  return JSON.stringify(data) !== JSON.stringify(baseline);
}
function updateBaselineIndicator() {
  const el = document.getElementById('baseline-indicator');
  const text = document.getElementById('baseline-text');
  if (!el || !text) return;
  if (isDirty()) {
    el.classList.add('dirty');
    text.textContent = 'Unsaved changes';
  } else {
    el.classList.remove('dirty');
    const lastSaved = auditLog.filter(a => a.action === 'baseline-saved').pop();
    text.textContent = lastSaved ? 'Baseline: ' + formatRelativeTime(lastSaved.ts) : 'At baseline';
  }
}

// =================================================================
// UTILITIES
// =================================================================
function uid(prefix) { return prefix + '-' + Date.now() + '-' + Math.floor(Math.random()*10000); }
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
function truncate(str, maxLen) {
  if (str == null) return '';
  const s = String(str);
  if (s.length <= maxLen) return s;
  return s.slice(0, Math.max(0, maxLen - 1)).trimEnd() + '…';
}
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  setTimeout(() => el.classList.remove('show'), 2200);
}
function pillarStyleId(idx) { return ((idx) % 4) + 1; }
function pillarNumForId(pid) {
  const idx = data.pillars.findIndex(p => p.id === pid);
  return idx === -1 ? null : pillarStyleId(idx);
}
function pillarNameForId(pid) {
  const p = data.pillars.find(x => x.id === pid);
  return p ? p.name : 'Unknown';
}
function renumberPillars() {
  data.pillars.forEach((p, i) => { p.num = String(i+1).padStart(2, '0'); });
}
function formatRelativeTime(iso) {
  const then = new Date(iso);
  const now = new Date();
  const diffSec = Math.floor((now - then) / 1000);
  if (diffSec < 60) return 'just now';
  if (diffSec < 3600) return Math.floor(diffSec/60) + 'm ago';
  if (diffSec < 86400) return Math.floor(diffSec/3600) + 'h ago';
  if (diffSec < 604800) return Math.floor(diffSec/86400) + 'd ago';
  return then.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function formatFullTime(iso) {
  return new Date(iso).toLocaleString('en-GB', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
function formatDueDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}
function daysUntil(iso) {
  if (!iso) return null;
  const due = new Date(iso);
  const today = new Date();
  today.setHours(0,0,0,0);
  due.setHours(0,0,0,0);
  return Math.round((due - today) / 86400000);
}
function dueStatus(iso, complete) {
  if (complete || !iso) return '';
  const d = daysUntil(iso);
  if (d < 0) return 'overdue';
  if (d <= 7) return 'soon';
  return '';
}

// =================================================================
// AUDIT LOG
// =================================================================
// Audit log principle: only record additions/changes to Strategic Pillars, Initiatives, and
// action movements (RAG, owner, dates, pillar, initiative, complete/reopen, add, delete).
// Cosmetic edits — description typos, notes, agenda/principle text, sector renames, baseline
// saves — are intentionally dropped so the log stays a record of what changed on the plan,
// not a keystroke trail.
const AUDIT_ALLOWED_AREAS = new Set(['pillar', 'pillar-objective', 'action']);
const AUDIT_ACTION_NOISE_FIELDS = new Set(['description', 'notes', 'start date']);
function shouldLogAuditEntry(entry) {
  if (!entry || !entry.area) return false;
  if (!AUDIT_ALLOWED_AREAS.has(entry.area)) return false;
  // For action edits, drop changes that aren't a real movement
  if (entry.area === 'action' && entry.action === 'edit') {
    // The catch-all save handler logs per-field with the field name embedded in summary
    // e.g. "Updated description on X" or "Updated notes on X" — those are the cosmetic ones.
    const sum = (entry.summary || '').toLowerCase();
    for (const noiseField of AUDIT_ACTION_NOISE_FIELDS) {
      if (sum.includes('updated ' + noiseField + ' on ')) return false;
    }
  }
  return true;
}

function logAudit(entry) {
  if (!shouldLogAuditEntry(entry)) return;
  auditLog.push({
    id: 'log-' + Date.now() + '-' + Math.floor(Math.random()*10000),
    ts: new Date().toISOString(),
    user: currentUser || 'Unknown',
    ...entry
  });
  saveAudit();
  if (document.getElementById('view-audit').classList.contains('active')) {
    renderAudit();
  }
}

// =================================================================
// RENDER — SUMMARY CARDS
// =================================================================
let activeFilter = null; // 'green' | 'amber' | 'red' | 'complete' | 'all' | null

// Single-step undo for destructive operations. Set by deletions, cleared after timeout.
// Structure: { label: string, snapshot: deep-cloned data slice, restore: fn() }
let lastUndo = null;
let undoTimer = null;
function offerUndo(label, restoreFn) {
  lastUndo = { label, restoreFn, at: Date.now() };
  showUndoToast(label);
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(() => {
    lastUndo = null;
    hideUndoToast();
  }, 12000); // 12 seconds to act
}
function performUndo() {
  if (!lastUndo) return false;
  const { restoreFn, label } = lastUndo;
  try { restoreFn(); } catch (e) { toast('Undo failed: ' + e.message, 'error'); return false; }
  lastUndo = null;
  if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; }
  hideUndoToast();
  toast(`Undone: ${label}`, 'success');
  return true;
}
function showUndoToast(label) {
  let el = document.getElementById('undo-toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'undo-toast';
    el.className = 'undo-toast';
    el.innerHTML = `
      <span class="undo-toast-text"></span>
      <button class="undo-toast-btn" id="undo-toast-btn">↺ Undo</button>
    `;
    document.body.appendChild(el);
    document.getElementById('undo-toast-btn').addEventListener('click', performUndo);
  }
  el.querySelector('.undo-toast-text').textContent = label;
  el.classList.add('show');
}
function hideUndoToast() {
  const el = document.getElementById('undo-toast');
  if (el) el.classList.remove('show');
}
// Cmd/Ctrl+Z anywhere (when not typing) triggers undo
document.addEventListener('keydown', (e) => {
  if (!lastUndo) return;
  const tag = (e.target.tagName || '').toUpperCase();
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || e.target.isContentEditable) return;
  if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'z') {
    e.preventDefault();
    performUndo();
  }
});

// Filter bar state (separate from the drill-down panel filter)
let filterState = { pillar: 'all', initiative: 'all', owner: 'all', status: 'all' };

function isAnyFilterActive() {
  return filterState.pillar !== 'all' || filterState.initiative !== 'all' || filterState.owner !== 'all' || filterState.status !== 'all';
}

function applyFilters(actions) {
  return actions.filter(a => {
    if (filterState.pillar !== 'all' && a.pillar !== filterState.pillar) return false;
    if (filterState.initiative !== 'all' && a.objectiveId !== filterState.initiative) return false;
    if (filterState.owner !== 'all' && a.owner !== filterState.owner) return false;
    if (filterState.status !== 'all') {
      const s = filterState.status;
      if (s === 'complete' && !a.complete) return false;
      if (s === 'open' && a.complete) return false;
      if (s === 'overdue') {
        if (a.complete) return false;
        if (!a.due || daysUntil(a.due) >= 0) return false;
      }
      if (['green','amber','red'].includes(s) && (a.complete || a.rag !== s)) return false;
    }
    return true;
  });
}

// Home page: a glance-list of overdue + at-risk items so leadership sees "what needs eyes"
// without drilling. Capped at 6 to keep the home page from becoming a wall of actions.
// =================================================================
// HOME MODE — STRATEGY ARROWS
// =================================================================
// Mode: 'home' = arrow grid, 'focus' = single-pillar deep-dive
// Mode: 'home' (arrows), 'focus' (single pillar), 'objective' (single objective drill-down)
let viewMode = 'home';
let focusedPillarId = null;
let focusedObjectiveId = null;

// Seed strategic objectives — used only on first load. Once on disk, edits stick.
const DEFAULT_PILLAR_PRIORITIES = {
  p1: ['Hybrid working', 'Clear expectations & fairly measured performance', 'Recruitment and training'],
  p2: ['Solve the telephony challenge', 'Safely test AI tools and explore new data opportunities', 'Ofgem Review', 'Quality Decisions'],
  p3: ['Operational stock (Day 4 & Day 14)', 'CMS improvements', 'Taxonomy & Knowledge Library'],
  p4: ['Influencing DESNZ, Water & Thought Leadership', 'Comms Ombudsman strategy', 'Parking strategy', 'Warm Home plan']
};

// Ensure each pillar has an `objectives` array of { id, text } entries.
// Migrates from older `priorities` (plain strings) format if present.
function ensurePillarPriorities() {
  data.pillars.forEach(p => {
    // Migrate legacy `priorities` (strings) to `objectives` ({id, text})
    if (Array.isArray(p.priorities) && !Array.isArray(p.objectives)) {
      p.objectives = p.priorities.map(text => ({ id: uid('o'), text }));
      delete p.priorities;
    }
    // Seed if missing entirely
    if (!Array.isArray(p.objectives)) {
      const seed = DEFAULT_PILLAR_PRIORITIES[p.id] || [];
      p.objectives = seed.map(text => ({ id: uid('o'), text }));
    }
    // Repair any objects without ids
    p.objectives.forEach(o => { if (!o.id) o.id = uid('o'); });
  });

  // Best-effort: auto-link existing actions to objectives via keyword match
  // Runs only on actions that don't yet have an objectiveId.
  const matchMap = {
    p1: [
      { obj: 'Hybrid working', keys: ['hybrid'] },
      { obj: 'Clear expectations', keys: ['scorecard', 'support services', 'end of year review', 'clear expectations'] },
      { obj: 'Recruitment and training', keys: ['recruitment', 'training plan', 'mdp', 'elevate'] }
    ],
    p2: [
      { obj: 'telephony', keys: ['telephony', 'ftc'] },
      { obj: 'AI tools', keys: ['ai tool', 'wordsmith', 'classification'] },
      { obj: 'Ofgem', keys: ['ofgem'] },
      { obj: 'Quality', keys: ['quality insight', 'community quality'] }
    ],
    p3: [
      { obj: 'CMS', keys: ['cms —', 'cms-'] },
      { obj: 'Taxonomy', keys: ['taxonomy'] },
      { obj: 'Knowledge Library', keys: ['knowledge library'] },
      { obj: 'Operational stock', keys: ['day 4', 'day 14', 'new starter'] }
    ],
    p4: [
      { obj: 'DESNZ', keys: ['desnz', 'water ombudsman', 'thought leadership', 'water'] },
      { obj: 'Comms Ombudsman', keys: ['comms ombudsman', 'co strategy'] },
      { obj: 'Parking', keys: ['parking'] },
      { obj: 'Warm Home', keys: ['warm home', 'stakeholder'] }
    ]
  };
  data.actions.forEach(a => {
    if (a.objectiveId) return;
    const pillar = data.pillars.find(p => p.id === a.pillar);
    if (!pillar) return;
    const rules = matchMap[a.pillar] || [];
    const descLower = (a.desc || '').toLowerCase();
    for (const rule of rules) {
      if (rule.keys.some(k => descLower.includes(k))) {
        // find objective by partial text match
        const target = pillar.objectives.find(o => o.text.toLowerCase().includes(rule.obj.toLowerCase()));
        if (target) { a.objectiveId = target.id; break; }
      }
    }
  });
}
ensurePillarPriorities();

// Helper: find objective by id across all pillars
function findObjective(objId) {
  if (!objId) return null;
  for (const p of data.pillars) {
    const o = (p.objectives || []).find(x => x.id === objId);
    if (o) return { pillar: p, objective: o };
  }
  return null;
}

// Helper: count actions tagged to an objective
function actionsForObjective(objId) {
  return data.actions.filter(a => a.objectiveId === objId);
}

function pillarStyleNum(pillarId) {
  const idx = data.pillars.findIndex(p => p.id === pillarId);
  return idx >= 0 ? (idx % 4) + 1 : 1;
}

function pillarStatsFor(pillarId) {
  const actions = data.actions.filter(a => a.pillar === pillarId);
  const stats = { total: actions.length, green: 0, amber: 0, red: 0, complete: 0, overdue: 0 };
  actions.forEach(a => {
    if (a.complete) stats.complete++;
    else {
      stats[a.rag]++;
      if (a.due && daysUntil(a.due) < 0) stats.overdue++;
    }
  });
  return stats;
}

function renderHomeArrows() {
  const grid = document.getElementById('arrow-grid');
  if (!grid) return;
  grid.innerHTML = data.pillars.map(p => {
    const styleNum = pillarStyleNum(p.id);
    const stats = pillarStatsFor(p.id);
    const objectives = (p.objectives || []);

    return `
      <div class="arrow-pillar pillar-color-${styleNum}" data-focus-pillar="${p.id}" role="button" tabindex="0">
        <div class="arrow-num">${escapeHtml(p.num)}</div>
        <div class="arrow-title">${escapeHtml(p.name)}</div>
        <div class="arrow-priorities">
          ${objectives.map((o, i) => {
            const count = actionsForObjective(o.id).length;
            return `
            <div class="arrow-priority" data-letter="${String.fromCharCode(65 + i)}">
              ${escapeHtml(o.text)}
              ${count > 0 ? `<span class="arrow-priority-count">${count}</span>` : ''}
            </div>
          `;
          }).join('')}
        </div>
        <div class="arrow-stats">
          <div class="arrow-stats-row">
            <span class="arrow-stats-label">Open Actions</span>
            <span class="arrow-stats-value">${stats.green + stats.amber + stats.red}</span>
          </div>
          <div class="arrow-stats-row">
            <span class="arrow-stats-label">Status</span>
            <div class="arrow-rag-dots">
              ${stats.red > 0 ? `<span class="arrow-rag-dot"><span class="dot red"></span>${stats.red}</span>` : ''}
              ${stats.amber > 0 ? `<span class="arrow-rag-dot"><span class="dot amber"></span>${stats.amber}</span>` : ''}
              ${stats.green > 0 ? `<span class="arrow-rag-dot"><span class="dot green"></span>${stats.green}</span>` : ''}
              ${stats.overdue > 0 ? `<span class="arrow-overdue">⚠ ${stats.overdue} overdue</span>` : ''}
            </div>
          </div>
          ${(stats.green + stats.amber + stats.red) > 0 ? `
          <div class="arrow-rag-bar" title="RAG mix across open actions">
            ${ragMixBarSegments(stats.red, stats.amber, stats.green)}
          </div>
          ` : ''}
        </div>
        <div class="arrow-cta">View actions →</div>
      </div>
    `;
  }).join('');
}

// Helper: build a stacked RAG mix bar (used on home arrows + pillar focused header)
function ragMixBarSegments(red, amber, green) {
  const total = red + amber + green;
  if (total === 0) return '';
  const r = (red / total * 100);
  const a = (amber / total * 100);
  const g = (green / total * 100);
  return `
    ${red > 0 ? `<span class="rag-mix-seg red" style="width:${r}%;" title="${red} red"></span>` : ''}
    ${amber > 0 ? `<span class="rag-mix-seg amber" style="width:${a}%;" title="${amber} amber"></span>` : ''}
    ${green > 0 ? `<span class="rag-mix-seg green" style="width:${g}%;" title="${green} green"></span>` : ''}
  `;
}

function setViewMode(mode, pillarId, objectiveId) {
  viewMode = mode;
  focusedPillarId = pillarId || null;
  focusedObjectiveId = objectiveId || null;
  const homeEl = document.getElementById('home-mode');
  const focusEl = document.getElementById('focus-mode');
  if (mode === 'home') {
    homeEl.style.display = '';
    focusEl.style.display = 'none';
    filterState.pillar = 'all';
    renderHomeArrows();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // 'focus' or 'objective' both use the focused panel
    homeEl.style.display = 'none';
    focusEl.style.display = '';
    // Apply pillar-color class so the entire focused experience inherits the pillar's accent.
    // This ties the header (gradient) and the body (subtle background tint) together visually.
    focusEl.classList.remove('pillar-color-1', 'pillar-color-2', 'pillar-color-3', 'pillar-color-4');
    if (pillarId) {
      focusEl.classList.add('pillar-color-' + pillarStyleNum(pillarId));
    }
    filterState.pillar = pillarId;
    renderBreadcrumb();
    renderFocusHeader(pillarId);
    if (mode === 'objective') {
      // Hide priorities editor when zoomed to one objective
      const ph = document.getElementById('pillar-focus-priorities-host');
      if (ph) ph.style.display = 'none';
    } else {
      const ph = document.getElementById('pillar-focus-priorities-host');
      if (ph) ph.style.display = '';
      renderFocusPriorities(pillarId);
    }
    if (typeof renderAll === 'function') renderAll();
    if (typeof populateFilterDropdowns === 'function') populateFilterDropdowns();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb-host');
  if (!el) return;
  const p = focusedPillarId ? data.pillars.find(x => x.id === focusedPillarId) : null;
  const objInfo = focusedObjectiveId ? findObjective(focusedObjectiveId) : null;
  const crumbs = [
    `<button class="breadcrumb-link" data-bc-home>Strategy 2026</button>`
  ];
  if (p) {
    if (viewMode === 'objective') {
      crumbs.push(`<button class="breadcrumb-link" data-bc-pillar="${p.id}">${escapeHtml(p.num + ' · ' + p.name)}</button>`);
    } else {
      crumbs.push(`<span class="breadcrumb-current">${escapeHtml(p.num + ' · ' + p.name)}</span>`);
    }
  }
  if (objInfo) {
    crumbs.push(`<span class="breadcrumb-current">${escapeHtml(objInfo.objective.text)}</span>`);
  }
  el.innerHTML = crumbs.join('<span class="breadcrumb-sep">›</span>');
}

function renderFocusHeader(pillarId) {
  const p = data.pillars.find(x => x.id === pillarId);
  if (!p) return;
  const styleNum = pillarStyleNum(pillarId);
  // If in objective mode, use stats just for that objective
  let stats, headerTitle, subtitleTag;
  if (viewMode === 'objective' && focusedObjectiveId) {
    const objInfo = findObjective(focusedObjectiveId);
    const objActions = actionsForObjective(focusedObjectiveId);
    stats = { total: objActions.length, green: 0, amber: 0, red: 0, complete: 0, overdue: 0 };
    objActions.forEach(a => {
      if (a.complete) stats.complete++;
      else {
        stats[a.rag]++;
        if (a.due && daysUntil(a.due) < 0) stats.overdue++;
      }
    });
    headerTitle = objInfo ? objInfo.objective.text : p.name;
    subtitleTag = `${escapeHtml(p.num)} · ${escapeHtml(p.name)} — INITIATIVE`;
  } else {
    stats = pillarStatsFor(pillarId);
    headerTitle = p.name;
    subtitleTag = escapeHtml(p.tag || 'Priorities 2026');
  }
  const host = document.getElementById('pillar-focus-header-host');
  host.innerHTML = `
    <div class="pillar-focus-header pillar-color-${styleNum}">
      <div class="pillar-focus-num">${escapeHtml(p.num)}</div>
      <div class="pillar-focus-titles">
        <div class="pillar-focus-tag">${subtitleTag}</div>
        <h2>${escapeHtml(headerTitle)}</h2>
      </div>
      <div class="pillar-focus-stats">
        <span class="focus-stat">${stats.total} action${stats.total === 1 ? '' : 's'}</span>
        ${stats.red > 0 ? `<span class="focus-stat" style="background:rgba(192,57,43,0.4);">🔴 ${stats.red} red</span>` : ''}
        ${stats.amber > 0 ? `<span class="focus-stat" style="background:rgba(243,156,18,0.4);">🟡 ${stats.amber} amber</span>` : ''}
        ${stats.green > 0 ? `<span class="focus-stat" style="background:rgba(39,174,96,0.4);">🟢 ${stats.green} green</span>` : ''}
        ${stats.overdue > 0 ? `<span class="focus-stat" style="background:white;color:var(--red);">⚠ ${stats.overdue} overdue</span>` : ''}
      </div>
    </div>
  `;
}

function renderFocusPriorities(pillarId) {
  const p = data.pillars.find(x => x.id === pillarId);
  if (!p) return;
  const host = document.getElementById('pillar-focus-priorities-host');
  if (!host) return;
  const objectives = p.objectives || [];

  // For each objective compute RAG counts, overdue count, dominant owner
  function statsForObjective(objId) {
    const acts = actionsForObjective(objId);
    const open = acts.filter(a => !a.complete);
    const r = open.filter(a => a.rag === 'red').length;
    const am = open.filter(a => a.rag === 'amber').length;
    const g = open.filter(a => a.rag === 'green').length;
    const done = acts.filter(a => a.complete).length;
    const overdue = open.filter(a => a.due && daysUntil(a.due) < 0).length;
    // Dominant owner = most-frequently appearing owner across open actions
    const ownerTally = {};
    open.forEach(a => { if (a.owner) ownerTally[a.owner] = (ownerTally[a.owner] || 0) + 1; });
    let dominantOwner = null;
    let maxCount = 0;
    Object.entries(ownerTally).forEach(([owner, n]) => { if (n > maxCount) { dominantOwner = owner; maxCount = n; } });
    const ownerCount = Object.keys(ownerTally).length;
    return { total: acts.length, open: open.length, r, am, g, done, overdue, dominantOwner, ownerCount };
  }

  const rows = objectives.length === 0
    ? `<div class="focus-priorities-empty">No initiatives yet — add the SLT-set themes that this pillar will deliver against.</div>`
    : objectives.map((o, i) => {
        const s = statsForObjective(o.id);
        const totalForBar = s.r + s.am + s.g;
        // Worst signal for accent border
        const worst = s.r > 0 ? 'red' : s.am > 0 ? 'amber' : s.g > 0 ? 'green' : (s.done > 0 ? 'done' : 'empty');
        const ownerChip = !s.dominantOwner
          ? '<span class="objective-owner-chip empty">no owner yet</span>'
          : `<span class="objective-owner-chip" title="Most-active owner on this initiative">${escapeHtml(s.dominantOwner)}${s.ownerCount > 1 ? ` <span class="objective-owner-more">+${s.ownerCount - 1}</span>` : ''}</span>`;
        return `
        <div class="objective-tile worst-${worst}" data-drill-objective="${o.id}" role="button" tabindex="0">
          <button class="objective-letter clickable" data-drill-objective="${o.id}" aria-label="Drill into initiative ${String.fromCharCode(65 + i)}">${String.fromCharCode(65 + i)}</button>
          <div class="objective-body">
            <div class="objective-headline">
              <div class="objective-text editable" contenteditable="true" data-priority-edit="${i}" spellcheck="true">${escapeHtml(o.text)}</div>
              ${ownerChip}
            </div>
            ${totalForBar > 0 || s.done > 0 ? `
              <div class="objective-health">
                ${totalForBar > 0 ? `<div class="objective-mix-bar">${ragMixBarSegments(s.r, s.am, s.g)}</div>` : '<div class="objective-mix-bar empty"></div>'}
                <div class="objective-stat-chips">
                  ${s.open > 0 ? `<span class="ostat">${s.open} open</span>` : ''}
                  ${s.r > 0 ? `<span class="ostat red">${s.r} red</span>` : ''}
                  ${s.am > 0 ? `<span class="ostat amber">${s.am} amber</span>` : ''}
                  ${s.overdue > 0 ? `<span class="ostat overdue">⚠ ${s.overdue} overdue</span>` : ''}
                  ${s.done > 0 ? `<span class="ostat done">${s.done} done</span>` : ''}
                </div>
              </div>
            ` : '<div class="objective-empty-note">No actions linked yet — drill in to add the first one.</div>'}
          </div>
          <div class="objective-tile-cta" aria-hidden="true">
            <span class="drill-arrow">→</span>
          </div>
          <div class="objective-tile-tools">
            <button class="objective-tool-btn" data-priority-up="${i}" title="Move up" ${i === 0 ? 'disabled' : ''} aria-label="Move initiative up">↑</button>
            <button class="objective-tool-btn" data-priority-down="${i}" title="Move down" ${i === objectives.length - 1 ? 'disabled' : ''} aria-label="Move initiative down">↓</button>
            <button class="objective-tool-btn danger" data-priority-delete="${i}" title="Remove" aria-label="Remove initiative">✕</button>
          </div>
        </div>
      `;
      }).join('');

  host.innerHTML = `
    <div class="focus-priorities">
      <div class="focus-priorities-head">
        <h3>Initiatives</h3>
        <div class="focus-priorities-hint">SLT-set initiatives for this Strategic Pillar · every action maps to one · edits log to audit</div>
      </div>
      <div class="objectives-grid">
        ${rows}
      </div>
      <div class="focus-priorities-slt-note">
        <span class="slt-lock-icon">🔒</span>
        Initiatives are set by SLT in <button class="slt-jump-btn" data-go-slt>Strategic Setup</button>. Adding or dropping them mid-week is reserved for the weekly review session.
      </div>
    </div>
  `;
}

// Objective editing handlers (event delegation)
document.body.addEventListener('click', (e) => {
  if (!focusedPillarId) return;
  const p = data.pillars.find(x => x.id === focusedPillarId);
  if (!p || !Array.isArray(p.objectives)) return;

  const upBtn = e.target.closest('[data-priority-up]');
  const downBtn = e.target.closest('[data-priority-down]');
  const delBtn = e.target.closest('[data-priority-delete]');
  const addBtn = e.target.closest('[data-priority-add]');

  if (upBtn) {
    const idx = parseInt(upBtn.dataset.priorityUp, 10);
    if (idx > 0) {
      const moved = p.objectives[idx];
      [p.objectives[idx - 1], p.objectives[idx]] = [p.objectives[idx], p.objectives[idx - 1]];
      logAudit({
        action: 'edit', area: 'pillar-objective',
        pillarId: p.id, pillarName: p.name,
        itemName: moved.text,
        summary: `Reordered initiative "${moved.text}" up`,
        detail: `Now position ${String.fromCharCode(65 + idx - 1)}`
      });
      renderFocusPriorities(focusedPillarId);
      renderHomeArrows();
      renderPillars();
      save();
    }
  } else if (downBtn) {
    const idx = parseInt(downBtn.dataset.priorityDown, 10);
    if (idx < p.objectives.length - 1) {
      const moved = p.objectives[idx];
      [p.objectives[idx + 1], p.objectives[idx]] = [p.objectives[idx], p.objectives[idx + 1]];
      logAudit({
        action: 'edit', area: 'pillar-objective',
        pillarId: p.id, pillarName: p.name,
        itemName: moved.text,
        summary: `Reordered initiative "${moved.text}" down`,
        detail: `Now position ${String.fromCharCode(65 + idx + 1)}`
      });
      renderFocusPriorities(focusedPillarId);
      renderHomeArrows();
      renderPillars();
      save();
    }
  } else if (delBtn) {
    const idx = parseInt(delBtn.dataset.priorityDelete, 10);
    const o = p.objectives[idx];
    const linkedCount = actionsForObjective(o.id).length;
    const linkedWarn = linkedCount > 0 ? `\n\n⚠ ${linkedCount} action${linkedCount === 1 ? ' is' : 's are'} linked to this initiative. They'll become unassigned.` : '';
    if (!confirm(`Remove initiative "${o.text}"? This is an SLT-set theme — make sure this is the right decision.${linkedWarn}`)) return;
    // Unlink any actions
    data.actions.forEach(a => { if (a.objectiveId === o.id) a.objectiveId = null; });
    p.objectives.splice(idx, 1);
    logAudit({
      action: 'delete', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: o.text,
      summary: `Removed initiative "${o.text}"`,
      detail: `From pillar ${p.num} ${p.name}${linkedCount > 0 ? ` · ${linkedCount} action(s) unassigned` : ''}`
    });
    renderFocusPriorities(focusedPillarId);
    renderHomeArrows();
    renderPillars();
    save();
    toast('Initiative removed', 'success');
  } else if (addBtn) {
    const newObj = { id: uid('o'), text: 'New initiative — click to edit' };
    p.objectives.push(newObj);
    logAudit({
      action: 'add', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: newObj.text,
      summary: `Added initiative to ${p.name}`,
      detail: ''
    });
    renderFocusPriorities(focusedPillarId);
    renderHomeArrows();
    renderPillars();
    save();
    // Auto-focus the new row's text cell
    setTimeout(() => {
      const cells = document.querySelectorAll('[data-priority-edit]');
      const last = cells[cells.length - 1];
      if (last) {
        last.focus();
        const range = document.createRange();
        range.selectNodeContents(last);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 50);
  }
});

// Objective text edits (commit on blur, log to audit)
document.body.addEventListener('blur', (e) => {
  const cell = e.target.closest && e.target.closest('[data-priority-edit]');
  if (!cell) return;
  if (!focusedPillarId) return;
  const p = data.pillars.find(x => x.id === focusedPillarId);
  if (!p || !Array.isArray(p.objectives)) return;
  const idx = parseInt(cell.dataset.priorityEdit, 10);
  const newText = cell.innerText.trim();
  const oldText = p.objectives[idx].text;
  if (newText && newText !== oldText) {
    p.objectives[idx].text = newText;
    logAudit({
      action: 'edit', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: newText,
      summary: `Edited initiative`,
      detail: `Was: "${oldText}" → Now: "${newText}"`
    });
    renderHomeArrows();
    renderPillars();
    save();
  } else if (!newText) {
    cell.innerText = oldText;
  }
}, true);

// Prevent Enter from inserting newlines in contenteditable objective cells; blur instead
document.body.addEventListener('keydown', (e) => {
  const cell = e.target.closest && e.target.closest('[data-priority-edit]');
  if (!cell) return;
  if (e.key === 'Enter') {
    e.preventDefault();
    cell.blur();
  } else if (e.key === 'Escape') {
    // Revert and blur
    if (!focusedPillarId) return;
    const p = data.pillars.find(x => x.id === focusedPillarId);
    if (!p) return;
    const idx = parseInt(cell.dataset.priorityEdit, 10);
    cell.innerText = (p.objectives[idx] && p.objectives[idx].text) || '';
    cell.blur();
  }
});

// =================================================================
// RENDER — PILLARS WITH ACTIONS
// =================================================================
function renderPillars() {
  const grid = document.getElementById('pillar-grid');
  const filterActive = isAnyFilterActive();
  const visiblePillars = filterState.pillar === 'all'
    ? data.pillars
    : data.pillars.filter(p => p.id === filterState.pillar);

  // Priority sort: overdue first → red → amber → green → complete; within each, earliest due date first
  function actionSortKey(a) {
    if (a.complete) return 5;
    const overdue = a.due && daysUntil(a.due) < 0;
    if (overdue) return 0;
    if (a.rag === 'red') return 1;
    if (a.rag === 'amber') return 2;
    if (a.rag === 'green') return 3;
    return 4;
  }
  function sortActions(arr) {
    return arr.slice().sort((a, b) => {
      const ka = actionSortKey(a), kb = actionSortKey(b);
      if (ka !== kb) return ka - kb;
      // Within group, earlier due date first; no date last
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    });
  }

  grid.innerHTML = visiblePillars.map((p, idx) => {
    const styleNum = pillarStyleId(data.pillars.findIndex(x => x.id === p.id));
    let allOnPillar = data.actions.filter(a => a.pillar === p.id);
    // When zoomed into one objective, restrict to just that objective's actions
    if (viewMode === 'objective' && focusedObjectiveId) {
      allOnPillar = allOnPillar.filter(a => a.objectiveId === focusedObjectiveId);
    }
    const pillarActions = sortActions(applyFilters(allOnPillar));
    const counts = { green: 0, amber: 0, red: 0, complete: 0 };
    let overdueCount = 0;
    pillarActions.forEach(a => {
      if (a.complete) counts.complete++;
      else {
        counts[a.rag]++;
        if (a.due && daysUntil(a.due) < 0) overdueCount++;
      }
    });
    let emptyMessage = '';
    if (pillarActions.length === 0) {
      if (allOnPillar.length === 0) emptyMessage = `<div class="pillar-no-match">No actions yet — click + Add Action below to get started</div>`;
      else if (filterActive) emptyMessage = `<div class="pillar-no-match">No actions match the current filter</div>`;
    }
    return `
      <div class="pillar pillar-${styleNum}">
        <div class="pillar-header">
          <div class="pillar-header-top">
            <div class="pillar-num">${p.num}</div>
            <div class="tag"><span class="editable" data-field="pillar-tag" data-pillar="${p.id}">${escapeHtml(p.tag)}</span></div>
            ${overdueCount > 0 ? `<span class="pillar-overdue-badge" title="${overdueCount} overdue">⚠ ${overdueCount}</span>` : ''}
            <button class="icon-btn danger edit-only" data-action="delete-pillar" data-pillar="${p.id}" style="background:rgba(255,255,255,0.2);color:white;margin-left:auto;" title="Delete Strategic Pillar">✕</button>
          </div>
          <h2><span class="editable" data-field="pillar-name" data-pillar="${p.id}">${escapeHtml(p.name)}</span></h2>
          ${(counts.red + counts.amber + counts.green) > 0 ? `
          <div class="pillar-rag-mix">
            <div class="rag-mix-bar">${ragMixBarSegments(counts.red, counts.amber, counts.green)}</div>
            <div class="rag-mix-label">
              ${counts.red > 0 ? `<span class="rag-mix-count red">${counts.red} red</span>` : ''}
              ${counts.amber > 0 ? `<span class="rag-mix-count amber">${counts.amber} amber</span>` : ''}
              ${counts.green > 0 ? `<span class="rag-mix-count green">${counts.green} green</span>` : ''}
              ${counts.complete > 0 ? `<span class="rag-mix-count done">${counts.complete} done</span>` : ''}
            </div>
          </div>` : ''}
          <div class="pillar-stats">
            ${pillarActions.length === 0 && !filterActive ? `<span class="stat-chip">No actions yet</span>` : ''}
            ${pillarActions.length === 0 && filterActive && allOnPillar.length > 0 ? `<span class="stat-chip">${allOnPillar.length} hidden by filter</span>` : ''}
          </div>
        </div>
        <div class="pillar-body">
          ${(() => {
            // Group pillarActions by objectiveId
            if (pillarActions.length === 0) return emptyMessage;
            const objectives = p.objectives || [];
            const grouped = objectives.map(o => ({
              objective: o,
              actions: pillarActions.filter(a => a.objectiveId === o.id)
            }));
            const orphans = pillarActions.filter(a => !a.objectiveId || !objectives.find(o => o.id === a.objectiveId));

            let html = '';
            grouped.forEach((g, i) => {
              if (g.actions.length === 0) return;
              const letter = String.fromCharCode(65 + i);
              html += `
                <div class="objective-group">
                  <div class="objective-group-head" data-drill-objective="${g.objective.id}" role="button" tabindex="0" title="Click to focus on this initiative only">
                    <span class="objective-group-letter">${letter}</span>
                    <span class="objective-group-text">${escapeHtml(g.objective.text)}</span>
                    <span class="objective-group-count">${g.actions.length} action${g.actions.length === 1 ? '' : 's'}</span>
                    <span class="drill-arrow">→</span>
                  </div>
                  <div class="objective-group-body">
                    ${g.actions.map(a => renderActionRow(a)).join('')}
                  </div>
                </div>
              `;
            });
            if (orphans.length > 0) {
              html += `
                <div class="objective-group orphans">
                  <div class="objective-group-head" style="cursor: default;">
                    <span class="objective-group-letter orphan">?</span>
                    <span class="objective-group-text">Unassigned — link these to an initiative</span>
                    <span class="objective-group-count">${orphans.length} action${orphans.length === 1 ? '' : 's'}</span>
                  </div>
                  <div class="objective-group-body">
                    ${orphans.map(a => renderActionRow(a)).join('')}
                  </div>
                </div>
              `;
            }
            return html;
          })()}
          <div class="add-row edit-only" data-action="add-action" data-pillar="${p.id}">+ Add Action to this pillar</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderActionRow(a) {
  const overdue = !a.complete && a.due && daysUntil(a.due) < 0;
  const dueClass = dueStatus(a.due, a.complete);
  const dueLabel = a.due ? formatDueDate(a.due) : 'No date';
  let dueDescriptor = '';
  if (a.due && !a.complete) {
    const days = daysUntil(a.due);
    if (days < 0) dueDescriptor = ` · ${Math.abs(days)}d overdue`;
    else if (days === 0) dueDescriptor = ' · today';
    else if (days <= 7) dueDescriptor = ` · in ${days}d`;
  }
  const ragClass = a.complete ? 'complete' : a.rag;
  const ragLabel = a.complete ? 'Done' : (a.rag === 'green' ? 'On track' : a.rag === 'amber' ? 'At risk' : 'Off track');
  // Golden thread visual: Pillar → Initiative → (this action)
  // Each chip is clickable to drill. Pillar uses its accent colour.
  // Orphan actions show a red warning chip in the initiative slot.
  const objInfo = findObjective(a.objectiveId);
  const pillar = data.pillars.find(p => p.id === a.pillar);
  const pillarStyleN = pillar ? pillarStyleNum(pillar.id) : 1;
  // Find initiative letter (A/B/C/D) if linked
  let initLetter = '';
  if (pillar && objInfo) {
    const idx = (pillar.objectives || []).findIndex(o => o.id === a.objectiveId);
    if (idx >= 0) initLetter = String.fromCharCode(65 + idx);
  }
  // Suppress the duplicate-context thread chip when we're already drilled into the action's
  // own initiative or its own pillar. In pillar focus, the initiative group head above the
  // action row already says which initiative this action serves. In objective focus, the
  // header already names the initiative. Show the chip only when context is ambiguous
  // (home view, cross-pillar lists, or actions sitting under a different pillar/initiative
  // than the one currently focused — which can happen with orphans/cross-links).
  const inSamePillar = (typeof viewMode !== 'undefined') && (viewMode === 'focus' || viewMode === 'objective') && (focusedPillarId === a.pillar);
  const inSameObjective = (typeof viewMode !== 'undefined') && viewMode === 'objective' && a.objectiveId === focusedObjectiveId;
  const suppressThread = inSamePillar || inSameObjective;
  let threadHtml = '';
  if (!suppressThread) {
    if (pillar) {
      const initSegment = objInfo
        ? `<button class="thread-chip thread-initiative pillar-color-${pillarStyleN}" data-drill-objective="${objInfo.objective.id}" title="View initiative: ${escapeHtml(objInfo.objective.text)}">
             <span class="thread-chip-letter">${initLetter || '·'}</span>
             <span class="thread-chip-label">${escapeHtml(truncate(objInfo.objective.text, 28))}</span>
           </button>`
        : `<button class="thread-chip thread-initiative orphan" data-action="link-objective" data-id="${a.id}" title="Link this action to an initiative">
             <span class="thread-chip-letter">?</span>
             <span class="thread-chip-label">Unlinked · link now</span>
           </button>`;
      threadHtml = `
        <div class="golden-thread" aria-label="Golden thread: pillar to initiative to action">
          <button class="thread-chip thread-pillar pillar-color-${pillarStyleN}" data-focus-pillar="${pillar.id}" title="View pillar: ${escapeHtml(pillar.name)}">
            <span class="thread-chip-letter">${escapeHtml(pillar.num)}</span>
            <span class="thread-chip-label">${escapeHtml(pillar.name)}</span>
          </button>
          <span class="thread-sep" aria-hidden="true">›</span>
          ${initSegment}
          <span class="thread-sep" aria-hidden="true">›</span>
          <span class="thread-chip thread-action ${a.complete ? 'complete' : 'rag-' + a.rag}" aria-current="true">
            <span class="thread-chip-letter">●</span>
            <span class="thread-chip-label">this action</span>
          </span>
        </div>
      `;
    }
  }
  return `
    <div class="action-row rag-${a.rag} ${a.complete ? 'complete' : ''} ${overdue ? 'overdue' : ''} ${a.priority ? 'is-priority' : ''} ${a.notes ? 'has-notes' : ''}" data-action-id="${a.id}">
      <div class="action-top">
        <button class="complete-toggle ${a.complete ? 'done' : ''}" data-action="toggle-complete" data-id="${a.id}" title="${a.complete ? 'Reopen' : 'Mark complete'}" aria-label="${a.complete ? 'Reopen' : 'Mark complete'}">${a.complete ? '✓' : ''}</button>
        <button class="priority-star ${a.priority ? 'on' : ''}" data-action="toggle-priority" data-id="${a.id}" title="${a.priority ? 'Remove priority flag' : 'Mark as priority'}" aria-label="${a.priority ? 'Priority — click to unflag' : 'Click to mark as priority'}">★</button>
        <div class="action-desc"><span class="editable" data-field="action-desc" data-id="${a.id}">${escapeHtml(a.desc)}</span></div>
        <button class="rag-badge ${ragClass} ${a.complete ? '' : 'cyclable'}" ${a.complete ? '' : `data-action="cycle-rag" data-id="${a.id}"`} title="${a.complete ? '' : 'Click to cycle RAG'}">${ragLabel}</button>
      </div>
      ${threadHtml}
      <div class="action-meta">
        <span class="owner-chip">${escapeHtml(a.owner || '?')}</span>
        <span class="due-chip ${dueClass}">📅 ${dueLabel}${dueDescriptor}</span>
        <span style="flex:1"></span>
        <div class="action-icons">
          <button class="icon-btn" data-action="edit-action" data-id="${a.id}" title="Edit" aria-label="Edit">✎</button>
          <button class="icon-btn danger" data-action="delete-action" data-id="${a.id}" title="Delete" aria-label="Delete">✕</button>
        </div>
      </div>
      ${a.notes ? `<div class="action-notes">${escapeHtml(a.notes)}</div>` : ''}
    </div>
  `;
}

// =================================================================
// RENDER — FILTERED LIST PANEL
// =================================================================
function renderActionListPanel(rag) {
  const cfg = {
    green: { title: 'On Track', empty: 'No actions on track.' },
    amber: { title: 'At Risk', empty: 'No actions at risk.' },
    red: { title: 'Off Track', empty: 'Nothing off track. 🎉' },
    complete: { title: 'Completed', empty: 'No completed actions yet.' },
    all: { title: 'All Actions', empty: 'No actions defined yet.' },
    overdue: { title: 'Overdue', empty: 'Nothing overdue. 🎉' },
    orphan: { title: 'Unlinked actions', empty: 'Every action is linked to an initiative.' }
  }[rag];
  if (!cfg) return;

  let filtered = data.actions.slice();
  if (rag === 'complete') filtered = filtered.filter(a => a.complete);
  else if (rag === 'all') {} // all
  else if (rag === 'overdue') filtered = filtered.filter(a => !a.complete && a.due && daysUntil(a.due) < 0);
  else if (rag === 'orphan') filtered = filtered.filter(a => !a.complete && !a.objectiveId);
  else filtered = filtered.filter(a => !a.complete && a.rag === rag);

  // Sort: overdue first, then by due date, then by RAG (red→amber→green→complete)
  const ragOrder = { red: 0, amber: 1, green: 2 };
  filtered.sort((a, b) => {
    if (a.complete !== b.complete) return a.complete ? 1 : -1;
    if (!a.complete && !b.complete) {
      const aOver = a.due && daysUntil(a.due) < 0 ? 0 : 1;
      const bOver = b.due && daysUntil(b.due) < 0 ? 0 : 1;
      if (aOver !== bOver) return aOver - bOver;
      if (a.rag !== b.rag) return ragOrder[a.rag] - ragOrder[b.rag];
    }
    if (a.due && b.due) return a.due.localeCompare(b.due);
    if (a.due) return -1;
    if (b.due) return 1;
    return 0;
  });

  document.getElementById('al-title').innerHTML = `${cfg.title} <span class="status-pill ${rag === 'all' ? 'neutral' : rag}">${filtered.length}</span>`;

  const body = document.getElementById('al-body');
  if (filtered.length === 0) {
    body.innerHTML = `<div class="audit-empty">${cfg.empty}</div>`;
    return;
  }

  body.innerHTML = filtered.map(a => {
    const pillar = data.pillars.find(p => p.id === a.pillar);
    const styleNum = pillarNumForId(a.pillar) || 1;
    const overdue = !a.complete && a.due && daysUntil(a.due) < 0;
    const ragClass = a.complete ? 'complete' : a.rag;
    const ragLabel = a.complete ? 'Done' : (a.rag === 'green' ? 'On track' : a.rag === 'amber' ? 'At risk' : 'Off track');
    let dueDescriptor = '';
    if (a.due && !a.complete) {
      const days = daysUntil(a.due);
      if (days < 0) dueDescriptor = `<span style="color:var(--red);font-weight:700;"> · ${Math.abs(days)}d overdue</span>`;
      else if (days === 0) dueDescriptor = `<span style="color:var(--amber);font-weight:700;"> · today</span>`;
      else if (days <= 7) dueDescriptor = `<span style="color:var(--amber);"> · in ${days}d</span>`;
      else dueDescriptor = `<span style="color:var(--grey-mid);"> · in ${days}d</span>`;
    }
    return `
      <div style="display:grid;grid-template-columns:4px 1fr 100px 130px 100px;gap:18px;padding:14px 12px;align-items:center;border-bottom:1px solid var(--grey-light);${a.complete ? 'opacity:0.7;':''}">
        <div style="width:4px;height:36px;border-radius:2px;background:var(--pillar-${styleNum});"></div>
        <div>
          <div style="font-size:14px;font-weight:600;color:var(--grey-dark);margin-bottom:3px;${a.complete?'text-decoration:line-through;':''}">${escapeHtml(a.desc)}</div>
          <div style="font-size:11px;color:var(--grey-mid);text-transform:uppercase;letter-spacing:0.06em;font-weight:600;">${pillar ? pillar.num + ' · ' + escapeHtml(pillar.name) : 'Unknown'}</div>
        </div>
        <div style="text-align:center;"><span class="owner-chip">${escapeHtml(a.owner || '?')}</span></div>
        <div style="font-family:var(--font-mono);font-size:12px;color:var(--grey-mid);">📅 ${formatDueDate(a.due)}${dueDescriptor}</div>
        <div style="text-align:right;"><span class="rag-badge ${ragClass}">${ragLabel}</span></div>
      </div>
    `;
  }).join('');
}

// =================================================================
// RENDER — ROADMAP
// =================================================================
function renderRoadmapHigh() {
  const container = document.getElementById('roadmap-high');
  if (!container) return;
  const countEl = document.getElementById('roadmap-action-count');
  if (countEl) {
    const open = data.actions.filter(a => !a.complete).length;
    const total = data.actions.length;
    countEl.textContent = `${open} live, ${total - open} done`;
  }

  // ===== Build a time-encoded swimlane chart =====
  // One row per Strategic Pillar. Every action for that pillar plotted as a positioned
  // milestone (diamond) ALONG that row, sized/coloured by RAG, with the today line and the
  // upcoming-14-day band running through them all. This is what a swimlane actually means.

  const today = new Date();
  const yearStart = new Date(today.getFullYear(), 0, 1);
  const yearEnd = new Date(today.getFullYear(), 11, 31);
  // Allow showing all dated actions even if they spill into next year by widening the range
  let rangeStart = yearStart;
  let rangeEnd = yearEnd;
  data.actions.forEach(a => {
    if (a.due) {
      const d = new Date(a.due);
      if (d < rangeStart) rangeStart = new Date(d.getFullYear(), 0, 1);
      if (d > rangeEnd) rangeEnd = new Date(d.getFullYear(), 11, 31);
    }
  });

  function pctOf(date) {
    const total = rangeEnd.getTime() - rangeStart.getTime();
    if (total <= 0) return 0;
    const offset = date.getTime() - rangeStart.getTime();
    return Math.max(0, Math.min(100, (offset / total) * 100));
  }

  // Month tick marks across the scale row
  const ticks = [];
  const cursor = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
  while (cursor <= rangeEnd) {
    const pct = pctOf(cursor);
    const isQuarterStart = [0, 3, 6, 9].includes(cursor.getMonth());
    const isYearStart = cursor.getMonth() === 0;
    const label = cursor.toLocaleDateString('en-GB', { month: 'short' }).toUpperCase() +
                  (isYearStart ? ` '${String(cursor.getFullYear()).slice(2)}` : '');
    ticks.push(`<div class="sl-tick ${isQuarterStart ? 'quarter' : ''} ${isYearStart ? 'year-start' : ''}" style="left:${pct}%;"><span class="sl-tick-label">${label}</span></div>`);
    cursor.setMonth(cursor.getMonth() + 1);
  }

  // Today + upcoming band
  const todayInRange = today >= rangeStart && today <= rangeEnd;
  const todayPct = todayInRange ? pctOf(today) : 0;
  const next14 = new Date(today); next14.setDate(next14.getDate() + 14);
  const next14Pct = todayInRange ? pctOf(next14) : 0;

  // Factor milestone rendering so it can be called per sub-lane.
  // Renders either a milestone diamond (single date) or a project bar (start + end set).
  function renderActionGlyph(a, p, today) {
    const due = new Date(a.due);
    const duePct = pctOf(due);
    if (duePct < 0 || duePct > 100) return '';
    const overdue = !a.complete && due < today;
    const ragClass = a.complete ? 'complete' : (overdue ? 'overdue' : a.rag);
    const dueStr = ganttFormatDateShort(a.due);
    // Project bar (start + end set + different)
    if (a.start && a.start !== a.due) {
      const startD = new Date(a.start);
      const startPct = pctOf(startD);
      const endPct = duePct;
      if (endPct < 0 || startPct > 100) return '';
      const widthPct = Math.max(0.6, endPct - startPct);
      const ms = Math.max(0, due.getTime() - startD.getTime());
      const days = Math.round(ms / 86400000);
      const durLabel = days >= 14 ? Math.round(days / 7) + ' weeks' : days + ' days';
      const tip = `${a.desc}\nOwner: ${a.owner}\nRuns: ${ganttFormatDateShort(a.start)} → ${dueStr} (${durLabel})${overdue && !a.complete ? '\n⚠ End date passed' : ''}${a.complete ? '\n✓ Complete' : ''}${a.priority ? '\n★ Priority' : ''}`;
      return `
        <button class="sl-bar ${ragClass} ${a.priority ? 'is-priority' : ''}" style="left:${Math.max(0, startPct)}%; width:${Math.min(100, widthPct)}%;" title="${escapeHtml(tip)}" data-action="edit-action" data-id="${a.id}">
          <span class="sl-bar-desc">${escapeHtml(a.desc.length > 32 ? a.desc.slice(0, 30) + '…' : a.desc)}</span>
        </button>
      `;
    }
    // Default: milestone diamond — no letter inside, the sub-lane already labels it
    const tip = `${a.desc}\nOwner: ${a.owner}\nDue: ${dueStr}${overdue && !a.complete ? '\n⚠ Overdue' : ''}${a.complete ? '\n✓ Complete' : ''}${a.priority ? '\n★ Priority' : ''}`;
    return `
      <button class="sl-milestone ${ragClass} ${a.priority ? 'is-priority' : ''}" style="left:${duePct}%;" title="${escapeHtml(tip)}" data-action="edit-action" data-id="${a.id}"></button>
    `;
  }

  // Render the swimlanes — one section per Strategic Pillar, with sub-lanes per initiative
  // so milestones don't overlap when multiple initiatives have the same due date.
  const lanesHtml = data.pillars.map(p => {
    const styleNum = pillarStyleNum(p.id);
    const allActs = data.actions.filter(a => a.pillar === p.id);
    const datedActs = allActs.filter(a => a.due);
    const undated = allActs.filter(a => !a.due);

    // Pillar-level stats — sit on the pillar header band
    const open = datedActs.filter(a => !a.complete).length;
    const done = datedActs.filter(a => a.complete).length;
    const overdueCnt = datedActs.filter(a => !a.complete && new Date(a.due) < today).length;
    const priorityCnt = allActs.filter(a => a.priority && !a.complete).length;

    // Build sub-lanes: one per initiative + one for orphans (actions with no initiative)
    const initiatives = p.objectives || [];
    const orphanActs = datedActs.filter(a => !a.objectiveId || !initiatives.find(o => o.id === a.objectiveId));

    const sublanesHtml = initiatives.map((o, i) => {
      const letter = String.fromCharCode(65 + i);
      const actsForInit = datedActs.filter(a => a.objectiveId === o.id);
      const openForInit = actsForInit.filter(a => !a.complete).length;
      const glyphsHtml = actsForInit.map(a => renderActionGlyph(a, p, today)).join('');
      return `
        <div class="sl-sublane">
          <div class="sl-sublane-label">
            <span class="sl-sublane-letter pillar-color-${styleNum}">${letter}</span>
            <span class="sl-sublane-name" title="${escapeHtml(o.text)}">${escapeHtml(o.text)}</span>
            ${openForInit > 0 ? `<span class="sl-sublane-count">${openForInit}</span>` : ''}
          </div>
          <div class="sl-sublane-track">
            ${glyphsHtml}
          </div>
        </div>
      `;
    }).join('');

    // Orphan sub-lane only if there are actually orphan actions
    const orphanLaneHtml = orphanActs.length > 0 ? `
      <div class="sl-sublane sl-sublane-orphan">
        <div class="sl-sublane-label">
          <span class="sl-sublane-letter empty" title="No initiative linked">–</span>
          <span class="sl-sublane-name muted">No initiative</span>
          <span class="sl-sublane-count">${orphanActs.filter(a => !a.complete).length}</span>
        </div>
        <div class="sl-sublane-track">
          ${orphanActs.map(a => renderActionGlyph(a, p, today)).join('')}
        </div>
      </div>
    ` : '';

    // Empty pillar state — neither initiatives nor orphan actions
    const noContent = initiatives.length === 0 && orphanActs.length === 0;
    const emptyHtml = noContent ? `
      <div class="sl-sublane sl-sublane-empty">
        <div class="sl-sublane-label muted">No initiatives yet</div>
        <div class="sl-sublane-track"></div>
      </div>
    ` : '';

    return `
      <div class="sl-pillar-section pillar-color-${styleNum}">
        <div class="sl-pillar-band">
          <div class="sl-pillar-band-left">
            <span class="sl-pillar-dot pillar-color-${styleNum}"></span>
            <span class="sl-pillar-band-num">${escapeHtml(p.num)}</span>
            <span class="sl-pillar-band-name">${escapeHtml(p.name)}</span>
          </div>
        </div>
        ${sublanesHtml}${orphanLaneHtml}${emptyHtml}
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="sl-chart">
      <div class="sl-scale">
        <div class="sl-scale-left">Strategic Pillar</div>
        <div class="sl-scale-track">
          ${ticks.join('')}
          ${todayInRange ? `<div class="sl-today-line" style="left:${todayPct}%;"><span class="sl-today-label">TODAY</span></div>` : ''}
        </div>
      </div>
      <div class="sl-body">
        ${todayInRange ? `<div class="sl-band sl-band-past" style="left:280px; width:calc((100% - 280px) * ${todayPct / 100});"></div>` : ''}
        ${todayInRange ? `<div class="sl-band sl-band-upcoming" style="left:calc(280px + (100% - 280px) * ${todayPct / 100}); width:calc((100% - 280px) * ${(next14Pct - todayPct) / 100});"></div>` : ''}
        ${todayInRange ? `<div class="sl-today-line-body" style="left:calc(280px + (100% - 280px) * ${todayPct / 100});"></div>` : ''}
        ${lanesHtml}
      </div>
      <div class="sl-legend">
        <span class="sl-legend-item"><span class="sl-legend-diamond green"></span>On Track</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond amber"></span>At Risk</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond red"></span>Off Track</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond overdue"></span>Overdue</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond complete"></span>Complete</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond is-priority"></span>★ Priority</span>
        <span class="sl-legend-sep"></span>
        <span class="sl-legend-item"><span class="sl-legend-bar"></span>Runs over a period (project)</span>
        <span class="sl-legend-item"><span class="sl-legend-diamond grey"></span>Single date (deliverable)</span>
      </div>
    </div>
  `;
}

// Gantt filter + scale state. Persisted within the page session — defaults set on first load.
const ganttFilter = {
  pillar: 'all',
  owner: 'all',
  status: 'open',   // 'all' | 'open' | 'complete' | 'red' | 'amber' | 'green' | 'overdue'
  scale: 'year',    // 'year' | 'sixmonth' | 'fit'
  sort: 'priority', // 'start' | 'next' | 'overdue' | 'priority'
  groupBy: 'pillar',// 'pillar' | 'owner' | 'status' | 'priority' | 'none'
  view: 'timeline', // 'timeline' (visual chart) | 'list' (compact rows, no chart)
  hideUndated: false
};

function ganttGetRange() {
  // Returns { start: Date, end: Date } that the chart will span
  const today = new Date();
  if (ganttFilter.scale === 'year') {
    const y = today.getFullYear();
    return { start: new Date(y, 0, 1), end: new Date(y, 11, 31) };
  }
  if (ganttFilter.scale === 'sixmonth') {
    const start = new Date(today);
    start.setDate(start.getDate() - 14); // Show a fortnight of context behind today
    const end = new Date(start);
    end.setMonth(end.getMonth() + 6);
    return { start, end };
  }
  // 'fit' — find earliest start and latest due across visible actions
  const dated = ganttFilteredActions().filter(a => a.start || a.due);
  if (dated.length === 0) {
    const y = today.getFullYear();
    return { start: new Date(y, 0, 1), end: new Date(y, 11, 31) };
  }
  let min = Infinity, max = -Infinity;
  dated.forEach(a => {
    if (a.start) { const t = new Date(a.start).getTime(); if (t < min) min = t; }
    if (a.due)   { const t = new Date(a.due).getTime();   if (t > max) max = t; }
    if (!a.start && a.due) { const t = new Date(a.due).getTime(); if (t < min) min = t; }
  });
  // Pad a little on each side so bars don't kiss the edges
  const startDate = new Date(min);
  startDate.setDate(startDate.getDate() - 7);
  const endDate = new Date(max);
  endDate.setDate(endDate.getDate() + 14);
  return { start: startDate, end: endDate };
}

function ganttFilteredActions() {
  return data.actions.filter(a => {
    if (ganttFilter.pillar !== 'all' && a.pillar !== ganttFilter.pillar) return false;
    if (ganttFilter.owner !== 'all' && a.owner !== ganttFilter.owner) return false;
    if (ganttFilter.status === 'open' && a.complete) return false;
    if (ganttFilter.status === 'complete' && !a.complete) return false;
    if (ganttFilter.status === 'overdue') {
      if (a.complete) return false;
      if (!(a.due && daysUntil(a.due) < 0)) return false;
    }
    if (['red', 'amber', 'green'].includes(ganttFilter.status)) {
      if (a.complete) return false;
      if (a.rag !== ganttFilter.status) return false;
    }
    if (ganttFilter.hideUndated && !a.due && !a.start) return false;
    return true;
  });
}

function ganttDateToPct(date, rangeStart, rangeEnd) {
  const total = rangeEnd.getTime() - rangeStart.getTime();
  if (total <= 0) return 0;
  const offset = date.getTime() - rangeStart.getTime();
  return Math.max(0, Math.min(100, (offset / total) * 100));
}

function ganttFormatDateShort(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function renderRoadmapDetail() {
  const container = document.getElementById('roadmap-detail');
  if (!container) return;

  const { start: rangeStart, end: rangeEnd } = ganttGetRange();
  const today = new Date();
  const todayPct = ganttDateToPct(today, rangeStart, rangeEnd);
  const todayInRange = today >= rangeStart && today <= rangeEnd;

  // Build month + quarter tick marks across the scale
  const tickHtml = buildGanttScale(rangeStart, rangeEnd);

  const filtered = ganttFilteredActions();
  const counts = filtered.length;

  // Sort function that honours the active sort choice (start/next/overdue/priority)
  function ganttSortItems(items) {
    return items.slice().sort((x, y) => {
      const sort = ganttFilter.sort;
      function urgencyRank(a) {
        if (!a.due) return 1e9; // no date = sink to bottom
        const days = daysUntil(a.due);
        if (days < 0 && !a.complete) return -days; // overdue: most overdue first
        return 1e6 + days;
      }
      function priorityRank(a) { return a.priority ? 0 : 1; }

      if (sort === 'priority') {
        const p = priorityRank(x) - priorityRank(y);
        if (p !== 0) return p;
        return urgencyRank(x) - urgencyRank(y);
      }
      if (sort === 'overdue') {
        const xOver = (x.due && daysUntil(x.due) < 0 && !x.complete) ? 0 : 1;
        const yOver = (y.due && daysUntil(y.due) < 0 && !y.complete) ? 0 : 1;
        if (xOver !== yOver) return xOver - yOver;
        return urgencyRank(x) - urgencyRank(y);
      }
      if (sort === 'next') {
        return urgencyRank(x) - urgencyRank(y);
      }
      // Default 'start' — chronological by start (or due as fallback)
      const xs = x.start || x.due || '9999';
      const ys = y.start || y.due || '9999';
      return xs.localeCompare(ys);
    });
  }

  // Group the filtered set according to ganttFilter.groupBy.
  // Returns [{ key, label, num?, styleNum, accent?, items: [actions], orphan: bool }]
  // in the order they should render.
  function groupActions(actions) {
    const gb = ganttFilter.groupBy;
    if (gb === 'pillar') {
      const groups = data.pillars.map(p => ({
        key: p.id,
        label: p.name,
        num: p.num,
        styleNum: pillarStyleNum(p.id),
        items: actions.filter(a => a.pillar === p.id)
      })).filter(g => g.items.length > 0);
      const orphans = actions.filter(a => !a.pillar || !data.pillars.find(p => p.id === a.pillar));
      if (orphans.length > 0) {
        groups.push({ key: '_orphan', label: 'No pillar set', num: '⚠', styleNum: 0, items: orphans, orphan: true });
      }
      return groups;
    }
    if (gb === 'owner') {
      const ownerSet = new Set(actions.map(a => a.owner || '?'));
      const ordered = [...ownerSet].sort();
      return ordered.map(o => ({
        key: o,
        label: o,
        num: '',
        styleNum: 0,
        items: actions.filter(a => (a.owner || '?') === o)
      })).filter(g => g.items.length > 0);
    }
    if (gb === 'status') {
      // Buckets: Overdue, Red, Amber, Green, Complete — in that priority order
      const buckets = [
        { key: 'overdue', label: 'Overdue', accent: 'red', items: [] },
        { key: 'red', label: 'Off Track', accent: 'red', items: [] },
        { key: 'amber', label: 'At Risk', accent: 'amber', items: [] },
        { key: 'green', label: 'On Track', accent: 'green', items: [] },
        { key: 'complete', label: 'Complete', accent: 'green', items: [] }
      ];
      actions.forEach(a => {
        if (a.complete) buckets[4].items.push(a);
        else if (a.due && daysUntil(a.due) < 0) buckets[0].items.push(a);
        else if (a.rag === 'red') buckets[1].items.push(a);
        else if (a.rag === 'amber') buckets[2].items.push(a);
        else if (a.rag === 'green') buckets[3].items.push(a);
      });
      return buckets.filter(b => b.items.length > 0);
    }
    if (gb === 'priority') {
      const flagged = actions.filter(a => a.priority);
      const rest = actions.filter(a => !a.priority);
      const groups = [];
      if (flagged.length > 0) groups.push({ key: 'priority', label: '★ Priority', accent: 'priority', items: flagged });
      if (rest.length > 0) groups.push({ key: 'other', label: 'Other actions', items: rest });
      return groups;
    }
    // 'none' — single bucket
    return [{ key: '_all', label: '', items: actions }];
  }

  let bodyHtml = '';
  if (ganttFilter.view === 'list') {
    // ===== LIST VIEW =====
    // No chart — compact rows with due-date column. Best for "I just want the list".
    bodyHtml = renderGanttListView(filtered, groupActions, ganttSortItems);
  } else {
    // ===== TIMELINE VIEW =====
    const dated = filtered.filter(a => a.due || a.start);
    const undated = filtered.filter(a => !a.due && !a.start);
    const groups = groupActions(dated);

    groups.forEach(g => {
      const sorted = ganttSortItems(g.items);
      const groupClass = g.styleNum
        ? `gantt-pillar-group pillar-color-${g.styleNum}`
        : g.orphan ? 'gantt-pillar-group gantt-pillar-orphan'
        : g.accent ? `gantt-pillar-group gantt-group-${g.accent}`
        : 'gantt-pillar-group';
      // For pillar-grouped rendering we want to pass the matching objectives so the
      // initiative letter shows. For other groupings we pass an empty list (the letter
      // is then derived from the action's actual pillar).
      bodyHtml += `
        <div class="${groupClass}">
          <div class="gantt-pillar-head">
            ${g.num ? `<span class="gantt-pillar-num">${escapeHtml(g.num)}</span>` : ''}
            <span class="gantt-pillar-name">${escapeHtml(g.label)}</span>
            <span class="gantt-pillar-count">${sorted.length} action${sorted.length === 1 ? '' : 's'}</span>
          </div>
          ${sorted.map(a => {
            // Resolve the action's own pillar style for the row letter, regardless of grouping
            const ap = data.pillars.find(p => p.id === a.pillar);
            const aStyle = ap ? pillarStyleNum(ap.id) : 0;
            return renderGanttRow(a, rangeStart, rangeEnd, todayPct, todayInRange, aStyle, ap ? (ap.objectives || []) : []);
          }).join('')}
        </div>
      `;
    });

    if (undated.length > 0 && !ganttFilter.hideUndated) {
      bodyHtml += `
      <div class="gantt-undated-section">
        <div class="gantt-undated-head">
          <strong>No dates set</strong> — ${undated.length} action${undated.length === 1 ? '' : 's'} without a start or due date. Open one to give it a timeline.
        </div>
        <div class="gantt-undated-list">
          ${ganttSortItems(undated).map(a => {
            const p = data.pillars.find(pp => pp.id === a.pillar);
            const pillarN = p ? pillarStyleNum(p.id) : 0;
            return `
              <button class="gantt-undated-row" data-action="edit-action" data-id="${a.id}">
                <span class="gantt-undated-pillar pillar-color-${pillarN}">${escapeHtml(p ? p.num : '—')}</span>
                <span class="gantt-undated-desc">${a.priority ? '<span class="gantt-undated-star">★</span> ' : ''}${escapeHtml(a.desc)}</span>
                <span class="gantt-undated-owner">${escapeHtml(a.owner)}</span>
                <span class="gantt-undated-add">+ Add dates</span>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
    }
  }

  if (counts === 0) {
    bodyHtml = `<div class="gantt-empty">No actions match the current filters. Adjust the filters above to see more.</div>`;
  }

  container.innerHTML = `
    <div class="gantt-filter-bar">
      <div class="gantt-filter-row">
        <div class="gantt-filter-section">
          <div class="gantt-filter-section-label">Filter</div>
          <div class="gantt-filter-controls">
            <div class="gantt-filter-group">
              <label>Pillar</label>
              <select id="gantt-filter-pillar"></select>
            </div>
            <div class="gantt-filter-group">
              <label>Owner</label>
              <select id="gantt-filter-owner"></select>
            </div>
            <div class="gantt-filter-group">
              <label>Status</label>
              <select id="gantt-filter-status">
                <option value="open">Open only</option>
                <option value="all">All (incl. completed)</option>
                <option value="complete">Completed only</option>
                <option value="overdue">Overdue only</option>
                <option value="red">Red only</option>
                <option value="amber">Amber only</option>
                <option value="green">Green only</option>
              </select>
            </div>
          </div>
        </div>
        <div class="gantt-filter-meta">
          <span class="gantt-count"><strong>${counts}</strong> of <strong>${data.actions.length}</strong> actions</span>
        </div>
      </div>
      <div class="gantt-filter-row">
        <div class="gantt-filter-section">
          <div class="gantt-filter-section-label">Arrange</div>
          <div class="gantt-filter-controls">
            <div class="gantt-filter-group">
              <label>Group by</label>
              <select id="gantt-filter-group-by">
                <option value="pillar">Strategic Pillar</option>
                <option value="owner">Owner</option>
                <option value="status">Status (Overdue first)</option>
                <option value="priority">Priority</option>
                <option value="none">No grouping</option>
              </select>
            </div>
            <div class="gantt-filter-group">
              <label>Sort within</label>
              <select id="gantt-filter-sort">
                <option value="priority">★ Priority first</option>
                <option value="overdue">Overdue first</option>
                <option value="next">Next due</option>
                <option value="start">Start date</option>
              </select>
            </div>
            <div class="gantt-filter-group">
              <label>Layout</label>
              <div class="gantt-scale-toggle">
                <button data-gantt-view="timeline" class="${ganttFilter.view === 'timeline' ? 'active' : ''}">Timeline</button>
                <button data-gantt-view="list" class="${ganttFilter.view === 'list' ? 'active' : ''}">List</button>
              </div>
            </div>
            <div class="gantt-filter-group">
              <label>Scale</label>
              <div class="gantt-scale-toggle">
                <button data-gantt-scale="year" class="${ganttFilter.scale === 'year' ? 'active' : ''}">Year</button>
                <button data-gantt-scale="sixmonth" class="${ganttFilter.scale === 'sixmonth' ? 'active' : ''}">6 months</button>
                <button data-gantt-scale="fit" class="${ganttFilter.scale === 'fit' ? 'active' : ''}">Fit all</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="gantt-chart-shell">
      <div class="gantt-scale">
        <div class="gantt-scale-left">Action</div>
        <div class="gantt-scale-track">
          ${tickHtml}
          ${todayInRange ? `<div class="gantt-today-line" style="left:${todayPct}%;" title="Today: ${ganttFormatDateShort(today.toISOString())}"><span class="gantt-today-label">TODAY</span></div>` : ''}
        </div>
      </div>
      <div class="gantt-body">
        ${(() => {
          // Subtle vertical bands behind everything: pale red wash on time already past,
          // warm amber wash on the next 14 days. Both span the full body height so single-
          // milestone rows have visual context instead of looking lost in whitespace.
          if (!bodyHtml || counts === 0) return '';
          const labelW = '280px';
          const trackExpr = '(100% - ' + labelW + ')';
          const next14 = new Date(today);
          next14.setDate(next14.getDate() + 14);
          const next14Pct = ganttDateToPct(next14, rangeStart, rangeEnd);
          const pastEnd = Math.min(100, Math.max(0, todayPct));
          const upcomingStart = Math.min(100, Math.max(0, todayPct));
          const upcomingEnd = Math.min(100, Math.max(0, next14Pct));
          let bands = '';
          if (todayInRange && pastEnd > 0) {
            bands += `<div class="gantt-band gantt-band-past" style="left:${labelW}; width:calc(${trackExpr} * ${pastEnd / 100});"></div>`;
          }
          if (todayInRange && upcomingEnd > upcomingStart) {
            const widthPct = upcomingEnd - upcomingStart;
            bands += `<div class="gantt-band gantt-band-upcoming" style="left:calc(${labelW} + ${trackExpr} * ${upcomingStart / 100}); width:calc(${trackExpr} * ${widthPct / 100});"></div>`;
          }
          return bands;
        })()}
        ${bodyHtml}
        ${todayInRange && bodyHtml && counts > 0 ? `<div class="gantt-today-line gantt-today-line-body" style="left:calc(280px + (100% - 280px) * ${todayPct / 100});"></div>` : ''}
      </div>
    </div>
  `;

  // Populate Pillar + Owner dropdowns AFTER innerHTML — they need to exist in the DOM first
  populateGanttFilters();

  // Restore current selections in dropdowns
  document.getElementById('gantt-filter-status').value = ganttFilter.status;
  document.getElementById('gantt-filter-sort').value = ganttFilter.sort;
  const gbSel = document.getElementById('gantt-filter-group-by');
  if (gbSel) gbSel.value = ganttFilter.groupBy;
}

function buildGanttScale(rangeStart, rangeEnd) {
  // Generate month tick labels positioned by percentage
  const ticks = [];
  const cursor = new Date(rangeStart.getFullYear(), rangeStart.getMonth(), 1);
  while (cursor <= rangeEnd) {
    const pct = ganttDateToPct(cursor, rangeStart, rangeEnd);
    const isQuarterStart = [0, 3, 6, 9].includes(cursor.getMonth());
    const label = cursor.toLocaleDateString('en-GB', { month: 'short' }) +
                  (cursor.getMonth() === 0 ? ` '${String(cursor.getFullYear()).slice(2)}` : '');
    ticks.push(`<div class="gantt-tick ${isQuarterStart ? 'quarter' : ''}" style="left:${pct}%;"><span class="gantt-tick-label">${label}</span></div>`);
    cursor.setMonth(cursor.getMonth() + 1);
  }
  return ticks.join('');
}

function renderGanttRow(a, rangeStart, rangeEnd, todayPct, todayInRange, styleNum, objectives) {
  // Resolve initiative letter (golden thread)
  let initLetter = '';
  if (a.objectiveId && objectives && objectives.length) {
    const idx = objectives.findIndex(o => o.id === a.objectiveId);
    if (idx >= 0) initLetter = String.fromCharCode(65 + idx);
  }

  // Resolve dates — fall back to "due-only" if no start
  const today = new Date();
  let startD = a.start ? new Date(a.start) : null;
  let endD = a.due ? new Date(a.due) : null;
  if (!startD && endD) startD = new Date(endD); // single-day milestone
  // If overdue + open, extend the bar to today so the slip is visible
  let extendedToToday = false;
  if (endD && !a.complete && endD < today) {
    endD = new Date(today);
    extendedToToday = true;
  }

  // Compute bar position
  let barHtml = '';
  if (startD && endD) {
    const startPct = ganttDateToPct(startD, rangeStart, rangeEnd);
    const endPct = ganttDateToPct(endD, rangeStart, rangeEnd);
    const widthPct = Math.max(0.4, endPct - startPct); // minimum visible width
    const isMilestone = a.start === a.due || (a.due && !a.start) || widthPct < 0.8;
    const ragClass = a.complete ? 'complete' : a.rag;
    // Only render the bar if at least partially inside the visible range
    if (endPct >= 0 && startPct <= 100) {
      const dueLabel = a.due ? ganttFormatDateShort(a.due) : '';
      const startLabel = a.start ? ganttFormatDateShort(a.start) : '';
      const ttl = `${a.desc}\nOwner: ${a.owner}${startLabel ? '\nStart: ' + startLabel : ''}${dueLabel ? '\nDue: ' + dueLabel : ''}${a.complete ? '\n✓ Complete' : ''}${extendedToToday ? '\n⚠ Overdue (extended to today)' : ''}`;
      if (isMilestone) {
        barHtml = `<div class="gantt-milestone ${ragClass}" style="left:${startPct}%;" title="${escapeHtml(ttl)}" data-action="edit-action" data-id="${a.id}"></div>`;
      } else {
        barHtml = `
          <div class="gantt-bar2 ${ragClass} ${extendedToToday ? 'overdue-extended' : ''}" style="left:${startPct}%; width:${widthPct}%;" title="${escapeHtml(ttl)}" data-action="edit-action" data-id="${a.id}">
            <span class="gantt-bar-label">${escapeHtml(a.desc.length > 36 ? a.desc.slice(0, 34) + '…' : a.desc)}</span>
          </div>
        `;
      }
    }
  }

  const ragClass = a.complete ? 'complete' : a.rag;
  return `
    <div class="gantt-row2 ${a.complete ? 'is-complete' : ''} ${a.priority ? 'is-priority' : ''}" data-action-id="${a.id}">
      <div class="gantt-row-label">
        ${initLetter ? `<span class="gantt-init-letter pillar-color-${styleNum}">${initLetter}</span>` : '<span class="gantt-init-letter empty" title="No initiative">–</span>'}
        <div class="gantt-row-text">
          <div class="gantt-row-desc">${a.priority ? '<span class="gantt-row-priority" title="Priority action">★</span>' : ''}${escapeHtml(a.desc)}</div>
          <div class="gantt-row-meta">
            <span class="gantt-row-owner">${escapeHtml(a.owner)}</span>
            ${a.due ? `<span class="gantt-row-due ${a.complete ? '' : (daysUntil(a.due) < 0 ? 'overdue' : '')}">${ganttFormatDateShort(a.due)}</span>` : '<span class="gantt-row-due none">no due date</span>'}
            <span class="gantt-row-rag-dot ${ragClass}" title="${a.complete ? 'Complete' : (a.rag || '').toUpperCase()}"></span>
          </div>
        </div>
      </div>
      <div class="gantt-row-track">
        ${barHtml || `<div class="gantt-row-empty">${a.due || a.start ? '(outside current view)' : ''}</div>`}
      </div>
    </div>
  `;
}

function populateGanttFilters() {
  const pillarSel = document.getElementById('gantt-filter-pillar');
  if (pillarSel) {
    pillarSel.innerHTML = '<option value="all">All Strategic Pillars</option>' +
      data.pillars.map(p => `<option value="${p.id}">${escapeHtml(p.num)} ${escapeHtml(p.name)}</option>`).join('');
    pillarSel.value = ganttFilter.pillar;
  }
  const ownerSel = document.getElementById('gantt-filter-owner');
  if (ownerSel) {
    const owners = new Set(data.actions.map(a => a.owner).filter(Boolean));
    OWNERS.forEach(o => owners.add(o));
    ownerSel.innerHTML = '<option value="all">All Owners</option>' +
      [...owners].sort().map(o => `<option value="${o}">${escapeHtml(o)}</option>`).join('');
    ownerSel.value = ganttFilter.owner;
  }
}

// List view — compact rows, no chart. Same grouping + sort logic as Timeline, but the
// row format prioritises legibility over visual encoding. Useful when there are lots of
// actions and the timeline gets too dense to scan.
function renderGanttListView(filtered, groupActions, ganttSortItems) {
  const today = new Date();
  // Group everything (dated + undated together) — list view has no scale, so undated
  // actions still belong somewhere meaningful instead of being banished to a footer.
  const groups = groupActions(filtered);
  if (groups.length === 0 || filtered.length === 0) {
    return `<div class="gantt-empty">No actions match the current filters. Adjust the filters above to see more.</div>`;
  }
  return groups.map(g => {
    const sorted = ganttSortItems(g.items);
    const groupClass = g.styleNum
      ? `gantt-list-group pillar-color-${g.styleNum}`
      : g.orphan ? 'gantt-list-group gantt-list-orphan'
      : g.accent ? `gantt-list-group gantt-list-${g.accent}`
      : 'gantt-list-group';
    return `
      <div class="${groupClass}">
        <div class="gantt-list-head">
          ${g.num ? `<span class="gantt-list-num">${escapeHtml(g.num)}</span>` : ''}
          <span class="gantt-list-name">${escapeHtml(g.label)}</span>
          <span class="gantt-list-count">${sorted.length} action${sorted.length === 1 ? '' : 's'}</span>
        </div>
        <div class="gantt-list-rows">
          ${sorted.map(a => {
            const ap = data.pillars.find(p => p.id === a.pillar);
            const aStyle = ap ? pillarStyleNum(ap.id) : 0;
            let initLetter = '';
            if (a.objectiveId && ap) {
              const idx = (ap.objectives || []).findIndex(o => o.id === a.objectiveId);
              if (idx >= 0) initLetter = String.fromCharCode(65 + idx);
            }
            const overdue = !a.complete && a.due && daysUntil(a.due) < 0;
            const dueStr = a.due ? ganttFormatDateShort(a.due) : '—';
            const dueDays = a.due && !a.complete ? daysUntil(a.due) : null;
            let dueAnnotation = '';
            if (dueDays !== null) {
              if (dueDays < 0) dueAnnotation = `${Math.abs(dueDays)}d overdue`;
              else if (dueDays === 0) dueAnnotation = 'today';
              else if (dueDays <= 7) dueAnnotation = `in ${dueDays}d`;
            }
            const ragClass = a.complete ? 'complete' : a.rag;
            return `
              <button class="gantt-list-row ${a.complete ? 'is-complete' : ''} ${a.priority ? 'is-priority' : ''} ${overdue ? 'is-overdue' : ''}" data-action="edit-action" data-id="${a.id}">
                ${initLetter ? `<span class="gantt-list-init pillar-color-${aStyle}">${initLetter}</span>` : '<span class="gantt-list-init empty">–</span>'}
                <span class="gantt-list-desc">
                  ${a.priority ? '<span class="gantt-list-star">★</span>' : ''}
                  ${escapeHtml(a.desc)}
                </span>
                <span class="gantt-list-owner">${escapeHtml(a.owner)}</span>
                <span class="gantt-list-due ${overdue ? 'overdue' : ''} ${!a.due ? 'no-date' : ''}">
                  ${dueStr}
                  ${dueAnnotation ? `<span class="gantt-list-due-ann">${dueAnnotation}</span>` : ''}
                </span>
                <span class="gantt-list-rag-dot ${ragClass}" title="${a.complete ? 'Complete' : (a.rag || '').toUpperCase()}"></span>
              </button>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
}

// Filter change handlers (event-delegated since the bar re-renders)
document.body.addEventListener('change', (e) => {
  if (e.target.id === 'gantt-filter-pillar') { ganttFilter.pillar = e.target.value; renderRoadmapDetail(); }
  else if (e.target.id === 'gantt-filter-owner') { ganttFilter.owner = e.target.value; renderRoadmapDetail(); }
  else if (e.target.id === 'gantt-filter-status') { ganttFilter.status = e.target.value; renderRoadmapDetail(); }
  else if (e.target.id === 'gantt-filter-sort') { ganttFilter.sort = e.target.value; renderRoadmapDetail(); }
  else if (e.target.id === 'gantt-filter-group-by') { ganttFilter.groupBy = e.target.value; renderRoadmapDetail(); }
});
document.body.addEventListener('click', (e) => {
  const scaleBtn = e.target.closest('[data-gantt-scale]');
  if (scaleBtn) {
    ganttFilter.scale = scaleBtn.dataset.ganttScale;
    renderRoadmapDetail();
    return;
  }
  const viewBtn = e.target.closest('[data-gantt-view]');
  if (viewBtn) {
    ganttFilter.view = viewBtn.dataset.ganttView;
    renderRoadmapDetail();
  }
});

