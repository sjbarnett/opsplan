    color: #0F4A2A;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
  }

  footer.meta {
    padding: 20px 48px;
    border-top: 1px solid #ECF0F1;
    background: #F4F6F7;
    font-size: 11px;
    color: #7F8C8D;
    text-align: center;
  }
  footer.meta strong { color: #2C3E50; }

  /* Print friendly */
  @media print {
    body { background: white; padding: 0; }
    .doc { box-shadow: none; border-radius: 0; max-width: none; }
    section { break-inside: avoid; }
    .pillar-card, .report-pillar, .hb-sector { break-inside: avoid; }
  }
  @media (max-width: 800px) {
    body { padding: 12px; }
    main { padding: 20px 24px; }
    header.cover { padding: 28px 24px; }
    .pillar-strip { grid-template-columns: 1fr 1fr; }
    footer.meta { padding: 18px 24px; }
  }
</style>
</head>
<body>
<div class="doc">
  <header class="cover">
    <div class="label">Trust Alliance Group · Weekly Leadership Review</div>
    <h1>Operations &amp; Strategy Summary</h1>
    <div class="week">Week commencing ${escapeHtml(weekLabel)}</div>
    <div class="verdict-pill"><span class="dot"></span><span>Heartbeat: ${escapeHtml(overallVerdict)}</span></div>
  </header>

  <main>

    <section>
      <h2>Strategic Picture</h2>
      <p class="section-intro">Our four pillars and where each is sitting this week.</p>
      <div class="pillar-strip">${pillarStripHtml}</div>
    </section>

    ${check ? `
    <section>
      <h2>Ops Heartbeat</h2>
      <p class="section-intro">Sector × metric check-in. Stock (D4/14) · KPIs · Quality · People across B2C, B2B, Comms. KPIs · People for Parking. KPIs · Capacity · Project for Telephony.</p>
      ${heartbeatHtml}
    </section>
    ` : ''}

    ${flaggedHtml}

    <section>
      <h2>Hot Actions — needing attention</h2>
      <p class="section-intro">Open actions that are Red, Amber, or Overdue. Grouped by pillar, sorted by urgency.</p>
      ${hotHtml}
    </section>

    ${aobHtml}
    ${prioHtml}

  </main>

  <footer class="meta">
    Generated <strong>${escapeHtml(generatedAt)}</strong> ${generatedBy !== '—' ? ' by <strong>' + escapeHtml(generatedBy) + '</strong>' : ''} · Operational Leadership Team's Plan
  </footer>
</div>
</body>
</html>`;
}

function downloadSummaryReport(opts) {
  const html = buildSummaryReportHtml(opts);
  const checkForName = (opts && opts.weekId)
    ? (data.weeklyChecks || []).find(c => c.id === opts.weekId)
    : ((data.weeklyChecks || []).slice().sort((a, b) => b.weekCommencing.localeCompare(a.weekCommencing))[0]);
  const datePart = checkForName ? checkForName.weekCommencing : new Date().toISOString().slice(0, 10);
  const filename = `OLT_Plan_Weekly_Review_${datePart}.html`;

  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => {
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
  toast('Summary report downloaded', 'success');
  logAudit({
    action: 'edit', area: 'system',
    pillarId: null, pillarName: null,
    itemName: 'Summary Report',
    summary: `Exported weekly summary report — ${datePart}`,
    detail: filename
  });
}

// =================================================================
// SLT STRATEGIC SETUP VIEW
// =================================================================
// SLT-only authoring of Pillars and Initiatives. Day-to-day ops view is read-only
// on the strategic structure; all the create/rename/reorder/drop powers live here.
function renderStrategic() {
  const host = document.getElementById('slt-strategic-body');
  if (!host) return;
  const pillarsHtml = data.pillars.map((p, pIdx) => {
    const styleNum = pillarStyleNum(p.id);
    const objectives = p.objectives || [];
    const actionCount = data.actions.filter(a => a.pillar === p.id).length;
    const initiativesHtml = objectives.length === 0
      ? `<div class="slt-empty">No initiatives yet. Add the SLT-set themes this pillar will deliver against.</div>`
      : objectives.map((o, i) => {
          const linked = actionsForObjective(o.id).length;
          return `
            <div class="slt-init-row">
              <div class="slt-init-letter">${String.fromCharCode(65 + i)}</div>
              <div class="slt-init-text-cell" contenteditable="true" data-slt-init-edit="${p.id}|${i}" spellcheck="true">${escapeHtml(o.text)}</div>
              <span class="slt-init-count">${linked} action${linked === 1 ? '' : 's'}</span>
              <div class="slt-init-tools">
                <button class="slt-tool-btn" data-slt-init-up="${p.id}|${i}" ${i === 0 ? 'disabled' : ''} title="Move up">↑</button>
                <button class="slt-tool-btn" data-slt-init-down="${p.id}|${i}" ${i === objectives.length - 1 ? 'disabled' : ''} title="Move down">↓</button>
                <button class="slt-tool-btn danger" data-slt-init-delete="${p.id}|${i}" title="Remove initiative">✕</button>
              </div>
            </div>
          `;
        }).join('');
    return `
      <div class="slt-pillar-block pillar-color-${styleNum}">
        <div class="slt-pillar-head">
          <div class="slt-pillar-num">${escapeHtml(p.num)}</div>
          <div class="slt-pillar-main">
            <div class="slt-pillar-tag editable" contenteditable="true" data-slt-pillar-tag-edit="${p.id}" spellcheck="true" title="Click to edit tag">${escapeHtml(p.tag || 'Priorities 2026')}</div>
            <div class="slt-pillar-name editable" contenteditable="true" data-slt-pillar-edit="${p.id}" spellcheck="true">${escapeHtml(p.name)}</div>
          </div>
          <div class="slt-pillar-stats">
            <span class="slt-stat-chip">${objectives.length} initiative${objectives.length === 1 ? '' : 's'}</span>
            <span class="slt-stat-chip">${actionCount} action${actionCount === 1 ? '' : 's'}</span>
            <button class="slt-pillar-delete-btn" data-slt-pillar-delete="${p.id}" title="Delete this Strategic Pillar (board-level decision)">✕</button>
          </div>
        </div>
        <div class="slt-pillar-body">
          <div class="slt-init-list">
            ${initiativesHtml}
          </div>
          <button class="slt-add-init-btn" data-slt-init-add="${p.id}">+ Add initiative to ${escapeHtml(p.name)}</button>
        </div>
      </div>
    `;
  }).join('');
  const pillarCount = data.pillars.length;
  host.innerHTML = `
    <div class="slt-strategic-grid">
      ${pillarsHtml}
    </div>
    <div class="slt-pillar-add-zone">
      <button class="slt-add-pillar-btn" id="slt-add-pillar-btn" title="Adding a pillar is a board-level strategic decision">
        <span class="slt-add-pillar-icon">+</span>
        <span class="slt-add-pillar-label">Add new Strategic Pillar</span>
      </button>
      <div class="slt-add-pillar-hint">
        ${pillarCount >= 4
          ? `<strong>You currently have ${pillarCount} Strategic Pillars.</strong> Most organisations keep this to 3–5 for focus. Adding a sixth or seventh dilutes the strategic story — be sure it's a deliberate board decision, not a placeholder.`
          : `Most organisations keep 3–5 Strategic Pillars. The default 4 (Support our People · Focus on Quality · High Performance · Grow Our Impact) work well for ops-led businesses.`}
      </div>
    </div>
    <div class="slt-footer-note">
      <strong>Note on Strategic Pillars:</strong> These are the enduring strategic themes for the year. Renaming, adding, or removing a Strategic Pillar is a board-level decision — every change is logged to the audit trail and changes the structure of all reporting. Make these decisions deliberately, not in passing.
    </div>
  `;
}

// SLT view event handlers (event delegation)
document.body.addEventListener('click', (e) => {
  // Add initiative
  const addBtn = e.target.closest('[data-slt-init-add]');
  if (addBtn) {
    const pillarId = addBtn.dataset.sltInitAdd;
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p) return;
    if (!Array.isArray(p.objectives)) p.objectives = [];
    const newObj = { id: uid('o'), text: 'New initiative — click to edit' };
    p.objectives.push(newObj);
    logAudit({
      action: 'add', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: newObj.text,
      summary: `Added initiative to ${p.name} (SLT Strategic Setup)`,
      detail: ''
    });
    save();
    renderStrategic();
    renderAll();
    toast('Initiative added — edit the text inline', 'success');
    setTimeout(() => {
      const cells = document.querySelectorAll(`[data-slt-init-edit^="${pillarId}|"]`);
      const last = cells[cells.length - 1];
      if (last) {
        last.focus();
        const range = document.createRange();
        range.selectNodeContents(last);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 60);
    return;
  }
  // Remove initiative
  const delBtn = e.target.closest('[data-slt-init-delete]');
  if (delBtn) {
    const [pillarId, idxStr] = delBtn.dataset.sltInitDelete.split('|');
    const idx = parseInt(idxStr, 10);
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p || !p.objectives || !p.objectives[idx]) return;
    const o = p.objectives[idx];
    const linkedCount = actionsForObjective(o.id).length;
    const linkedWarn = linkedCount > 0 ? `\n\n⚠ ${linkedCount} action${linkedCount === 1 ? ' is' : 's are'} linked to this initiative. They'll become unassigned (kept, but orphaned — re-link them later).` : '';
    if (!confirm(`Remove initiative "${o.text}"?\n\nThis is an SLT-set theme — make sure this is the right decision.${linkedWarn}`)) return;
    // Orphan linked actions
    data.actions.forEach(a => { if (a.objectiveId === o.id) a.objectiveId = null; });
    p.objectives.splice(idx, 1);
    logAudit({
      action: 'delete', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: o.text,
      summary: `Removed initiative "${o.text}" (SLT Strategic Setup)`,
      detail: linkedCount > 0 ? `${linkedCount} action${linkedCount === 1 ? '' : 's'} orphaned` : ''
    });
    save();
    renderStrategic();
    renderAll();
    toast('Initiative removed', 'success');
    return;
  }
  // Reorder up
  const upBtn = e.target.closest('[data-slt-init-up]');
  if (upBtn) {
    const [pillarId, idxStr] = upBtn.dataset.sltInitUp.split('|');
    const idx = parseInt(idxStr, 10);
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p || idx <= 0) return;
    [p.objectives[idx - 1], p.objectives[idx]] = [p.objectives[idx], p.objectives[idx - 1]];
    logAudit({
      action: 'edit', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: p.objectives[idx - 1].text,
      summary: `Reordered initiative "${p.objectives[idx - 1].text}" up (SLT Strategic Setup)`,
      detail: `Now position ${String.fromCharCode(65 + idx - 1)}`
    });
    save();
    renderStrategic();
    renderAll();
    return;
  }
  // Reorder down
  const downBtn = e.target.closest('[data-slt-init-down]');
  if (downBtn) {
    const [pillarId, idxStr] = downBtn.dataset.sltInitDown.split('|');
    const idx = parseInt(idxStr, 10);
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p || idx >= (p.objectives.length - 1)) return;
    [p.objectives[idx + 1], p.objectives[idx]] = [p.objectives[idx], p.objectives[idx + 1]];
    logAudit({
      action: 'edit', area: 'pillar-objective',
      pillarId: p.id, pillarName: p.name,
      itemName: p.objectives[idx + 1].text,
      summary: `Reordered initiative "${p.objectives[idx + 1].text}" down (SLT Strategic Setup)`,
      detail: `Now position ${String.fromCharCode(65 + idx + 1)}`
    });
    save();
    renderStrategic();
    renderAll();
    return;
  }
  // Add new pillar
  if (e.target.closest('#slt-add-pillar-btn')) {
    const pillarCount = data.pillars.length;
    if (!confirm(`Add a new Strategic Pillar?\n\nYou currently have ${pillarCount}. Adding another is a board-level decision and changes the structure of all reporting going forward. Continue?`)) return;
    const newNum = String(pillarCount + 1).padStart(2, '0');
    const newPillar = {
      id: uid('p'),
      num: newNum,
      tag: data.pillars[0] && data.pillars[0].tag ? data.pillars[0].tag : 'Priorities 2026',
      name: 'New Strategic Pillar — click name to edit',
      objectives: []
    };
    data.pillars.push(newPillar);
    logAudit({
      action: 'add', area: 'pillar',
      pillarId: newPillar.id, pillarName: newPillar.name,
      itemName: newPillar.name,
      summary: `Added new Strategic Pillar (SLT Strategic Setup)`,
      detail: `Now ${data.pillars.length} Strategic Pillars in total`
    });
    save();
    renderStrategic();
    renderAll();
    toast('New Strategic Pillar added — click the name to rename it', 'success');
    // Auto-focus the new pillar's name cell so SLT can rename it immediately
    setTimeout(() => {
      const cell = document.querySelector(`[data-slt-pillar-edit="${newPillar.id}"]`);
      if (cell) {
        cell.focus();
        const range = document.createRange();
        range.selectNodeContents(cell);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    }, 80);
    return;
  }
  // Delete pillar
  const pillarDelBtn = e.target.closest('[data-slt-pillar-delete]');
  if (pillarDelBtn) {
    const pillarId = pillarDelBtn.dataset.sltPillarDelete;
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p) return;
    if (data.pillars.length <= 1) {
      toast('Can\'t delete the last Strategic Pillar — the tool needs at least one', 'error');
      return;
    }
    const initiativeCount = (p.objectives || []).length;
    const actionCount = data.actions.filter(a => a.pillar === p.id).length;
    const cascadeWarn = (initiativeCount > 0 || actionCount > 0)
      ? `\n\n⚠ This Strategic Pillar contains ${initiativeCount} initiative${initiativeCount === 1 ? '' : 's'} and ${actionCount} action${actionCount === 1 ? '' : 's'}. Deleting it will:\n  · Remove all its initiatives permanently\n  · Leave its actions ORPHANED (no Strategic Pillar) — you'll need to re-assign them or delete them afterwards`
      : '';
    if (!confirm(`Delete Strategic Pillar "${p.name}"?\n\nThis is a board-level strategic decision. The change is logged to the audit trail and cannot be undone from within the tool.${cascadeWarn}\n\nContinue?`)) return;
    // Orphan any linked actions
    data.actions.forEach(a => {
      if (a.pillar === p.id) { a.pillar = null; }
    });
    // Remove the pillar
    const idx = data.pillars.findIndex(x => x.id === pillarId);
    if (idx >= 0) data.pillars.splice(idx, 1);
    // Renumber remaining pillars (01, 02, 03...)
    data.pillars.forEach((pp, i) => { pp.num = String(i + 1).padStart(2, '0'); });
    logAudit({
      action: 'delete', area: 'pillar',
      pillarId: pillarId, pillarName: p.name,
      itemName: p.name,
      summary: `Deleted Strategic Pillar "${p.name}" (SLT Strategic Setup)`,
      detail: `${initiativeCount} initiative${initiativeCount === 1 ? '' : 's'} removed · ${actionCount} action${actionCount === 1 ? '' : 's'} orphaned`
    });
    save();
    renderStrategic();
    renderAll();
    toast(`Strategic Pillar "${p.name}" deleted`, 'success');
    return;
  }
});

// Initiative text edits in SLT view (commit on blur, log to audit)
document.body.addEventListener('blur', (e) => {
  const cell = e.target.closest && e.target.closest('[data-slt-init-edit]');
  if (cell) {
    const [pillarId, idxStr] = cell.dataset.sltInitEdit.split('|');
    const idx = parseInt(idxStr, 10);
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p || !p.objectives || !p.objectives[idx]) return;
    const newText = cell.innerText.trim();
    const oldText = p.objectives[idx].text;
    if (newText && newText !== oldText) {
      p.objectives[idx].text = newText;
      logAudit({
        action: 'edit', area: 'pillar-objective',
        pillarId: p.id, pillarName: p.name,
        itemName: newText,
        summary: `Edited initiative (SLT Strategic Setup)`,
        detail: `Was: "${oldText}" → Now: "${newText}"`
      });
      save();
      renderAll();
    } else if (!newText) {
      cell.innerText = oldText; // revert blank edits
    }
    return;
  }
  // Pillar name edit
  const pillarCell = e.target.closest && e.target.closest('[data-slt-pillar-edit]');
  if (pillarCell) {
    const pillarId = pillarCell.dataset.sltPillarEdit;
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p) return;
    const newName = pillarCell.innerText.trim();
    const oldName = p.name;
    if (newName && newName !== oldName) {
      p.name = newName;
      logAudit({
        action: 'edit', area: 'pillar',
        pillarId: p.id, pillarName: newName,
        itemName: newName,
        summary: `Renamed Strategic Pillar "${oldName}" → "${newName}"`,
        detail: 'From SLT Strategic Setup'
      });
      save();
      renderAll();
      toast('Strategic Pillar renamed', 'success');
    } else if (!newName) {
      pillarCell.innerText = oldName;
    }
    return;
  }
  // Pillar tag edit (the small text above the pillar name)
  const tagCell = e.target.closest && e.target.closest('[data-slt-pillar-tag-edit]');
  if (tagCell) {
    const pillarId = tagCell.dataset.sltPillarTagEdit;
    const p = data.pillars.find(x => x.id === pillarId);
    if (!p) return;
    const newTag = tagCell.innerText.trim();
    const oldTag = p.tag || '';
    if (newTag && newTag !== oldTag) {
      p.tag = newTag;
      logAudit({
        action: 'edit', area: 'pillar',
        pillarId: p.id, pillarName: p.name,
        itemName: p.name,
        summary: `Updated Strategic Pillar tag: "${oldTag}" → "${newTag}"`,
        detail: 'From SLT Strategic Setup'
      });
      save();
      renderAll();
    } else if (!newTag) {
      tagCell.innerText = oldTag || 'Priorities 2026';
    }
  }
}, true);


// =================================================================
// COMPLETED ACTIONS VIEW
// =================================================================
function renderCompleted() {
  const statsEl = document.getElementById('completed-stats');
  const bodyEl = document.getElementById('completed-body');
  const completed = data.actions.filter(a => a.complete);

  // Stats
  const now = new Date();
  const thirtyDaysAgo = new Date(now.getTime() - 30 * 86400000);
  const completedLast30 = completed.filter(a => {
    if (!a.completedAt) return false;
    return new Date(a.completedAt) >= thirtyDaysAgo;
  }).length;
  statsEl.innerHTML = `
    <div class="completed-stat"><span class="num">${completed.length}</span>Total</div>
    <div class="completed-stat"><span class="num">${completedLast30}</span>Last 30 days</div>
  `;

  if (completed.length === 0) {
    bodyEl.innerHTML = `
      <div class="completed-empty">
        <span class="icon">📭</span>
        Nothing completed yet. Mark actions complete by clicking the ✓ box on each row.
      </div>
    `;
    return;
  }

  // Group by pillar
  const byPillar = {};
  completed.forEach(a => {
    if (!byPillar[a.pillar]) byPillar[a.pillar] = [];
    byPillar[a.pillar].push(a);
  });

  // Sort within each: most recently completed first (use completedAt if present, else fall back to id order)
  Object.values(byPillar).forEach(arr => {
    arr.sort((a, b) => {
      const aT = a.completedAt || '';
      const bT = b.completedAt || '';
      return bT.localeCompare(aT);
    });
  });

  let html = '';
  data.pillars.forEach(p => {
    const items = byPillar[p.id];
    if (!items || items.length === 0) return;
    const styleNum = pillarStyleNum(p.id);
    html += `
      <div class="completed-pillar-section pillar-color-${styleNum}">
        <div class="completed-pillar-head">
          <span class="completed-pillar-title">${escapeHtml(p.num)} · ${escapeHtml(p.name)}</span>
          <span class="completed-pillar-count">${items.length} done</span>
        </div>
        <div class="completed-pillar-body">
          ${items.map(a => {
            const when = a.completedAt ? formatDueDate(a.completedAt.slice(0,10)) : (a.due ? 'by ' + formatDueDate(a.due) : '');
            return `
              <div class="completed-action-row" data-completed-id="${a.id}">
                <div class="completed-tick">✓</div>
                <div class="completed-desc">${escapeHtml(a.desc)}</div>
                <span class="completed-meta">${escapeHtml(a.owner || '?')}${when ? ' · ' + when : ''}</span>
                <button class="completed-reopen-btn" data-reopen-action="${a.id}">↺ Reopen</button>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  });
  bodyEl.innerHTML = html;
}

// Reopen handler
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-reopen-action]');
  if (!btn) return;
  const a = data.actions.find(x => x.id === btn.dataset.reopenAction);
  if (!a) return;
  a.complete = false;
  a.completedAt = null;
  logAudit({
    action: 'edit', area: 'action',
    pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
    actionOwner: a.owner, itemName: a.desc,
    summary: `Reopened: "${a.desc}"`, detail: 'Was completed, now active again'
  });
  renderAll();
  renderCompleted();
  toast('Action reopened', 'success');
});

// =================================================================
// SESSION FLOW (Start Weekly Review)
// =================================================================
let sessionState = {
  active: false,
  step: 1,
  heartbeatCheckId: null,    // id of currentWeeklyCheck taken at session start
  hotActionsReviewed: new Set(), // action ids the user has touched in step 2
  deferredHotActions: new Set(), // action ids parked for this session only — restored next week
  priorityDecisions: {},     // { objectiveId: 'keep'|'tweak'|'remove'|'added' }
  aob: [],                   // Free-text items captured in Step 3 AOB
  step4Mode: null,           // null = auto (light or full based on cadence) | 'light' | 'full'
  startedAt: null
};

// Persist session to localStorage so a mid-meeting refresh / accidental close
// doesn't wipe the user's in-flight review. Sets need to be serialised to arrays.
function saveSession() {
  try {
    if (!sessionState.active) {
      localStorage.removeItem(SESSION_KEY);
      return;
    }
    const serialisable = {
      active: sessionState.active,
      step: sessionState.step,
      heartbeatCheckId: sessionState.heartbeatCheckId,
      hotActionsReviewed: Array.from(sessionState.hotActionsReviewed || []),
      deferredHotActions: Array.from(sessionState.deferredHotActions || []),
      priorityDecisions: sessionState.priorityDecisions || {},
      aob: sessionState.aob || [],
      step4Mode: sessionState.step4Mode || null,
      startedAt: sessionState.startedAt
    };
    localStorage.setItem(SESSION_KEY, JSON.stringify(serialisable));
  } catch (e) { /* storage full or disabled — fall through silently */ }
}

function loadSession() {
  try {
    const raw = localStorage.getItem(SESSION_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !parsed.active) return null;
    parsed.hotActionsReviewed = new Set(parsed.hotActionsReviewed || []);
    parsed.deferredHotActions = new Set(parsed.deferredHotActions || []);
    return parsed;
  } catch (e) { return null; }
}

function clearSession() {
  try { localStorage.removeItem(SESSION_KEY); } catch (e) {}
}

function renderSessionProgress() {
  document.querySelectorAll('.session-step-pip').forEach(pip => {
    const n = parseInt(pip.dataset.pip, 10);
    pip.classList.toggle('active', n === sessionState.step);
    pip.classList.toggle('done', n < sessionState.step);
  });
  document.querySelectorAll('.session-step-line').forEach((line, i) => {
    line.classList.toggle('passed', sessionState.step > i + 1);
  });
}

function showSessionStep(n) {
  sessionState.step = n;
  ['1', '2', '3', '4', 'done'].forEach(s => {
    const el = document.getElementById('session-step-' + s);
    if (el) el.style.display = (String(n) === s) ? '' : 'none';
  });
  renderSessionProgress();
  // Render step content
  if (n === 1) renderSessionStep1();
  else if (n === 2) renderSessionStep2();
  else if (n === 3) renderSessionStep3();
  else if (n === 4) renderSessionStep4();
  saveSession();
  // Scroll to top of frame
  const frame = document.querySelector('.session-frame');
  if (frame) frame.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Toggle the start banner between "Start Weekly Review" (fresh) and "▶ Resume…" + Discard
// when an in-flight session is detected. Also keep the home intro's pillar count in sync
// with the current pillar count (since pillars can be added/removed from SLT view).
function updateStartBanner() {
  const titleEl = document.getElementById('start-banner-title');
  const subEl = document.getElementById('start-banner-sub');
  const labelEl = document.getElementById('start-banner-label');
  const btn = document.getElementById('start-session-btn');
  const abandonBtn = document.getElementById('abandon-session-btn');
  const banner = document.getElementById('start-banner');
  if (!titleEl || !subEl || !btn) return;

  if (sessionState && sessionState.active) {
    // Resume mode
    banner.classList.add('resume-mode');
    labelEl.textContent = 'Session in progress';
    const stepNames = { 1: 'Sector Ops Check-In', 2: 'Hot Actions', 3: 'AOB', 4: 'Strategic Pillar Coverage' };
    const stepName = stepNames[sessionState.step] || 'in progress';
    titleEl.textContent = 'Pick up where you left off';
    const startedAt = sessionState.startedAt ? new Date(sessionState.startedAt) : null;
    const startedTxt = startedAt ? ` (started ${formatRelativeTime(sessionState.startedAt)})` : '';
    const aobCount = (sessionState.aob || []).length;
    const aobTxt = aobCount > 0 ? ` · ${aobCount} AOB item${aobCount === 1 ? '' : 's'} captured` : '';
    subEl.textContent = `Step ${sessionState.step} of 4 — ${stepName}${startedTxt}${aobTxt}.`;
    btn.textContent = '▶ Resume Weekly Review';
    if (abandonBtn) abandonBtn.style.display = '';
  } else {
    // Fresh start
    banner.classList.remove('resume-mode');
    labelEl.textContent = 'Weekly Leadership Session';
    titleEl.textContent = 'Ready when you are';
    subEl.textContent = 'Four steps · Sector ops check-in · Hot actions · AOB · Strategic Pillar coverage. Your 1-hour weekly leadership session.';
    btn.textContent = '▶ Start Weekly Review';
    if (abandonBtn) abandonBtn.style.display = 'none';
  }

  // Keep home-intro copy dynamic with the actual pillar count
  const introSub = document.getElementById('home-intro-sub');
  if (introSub) {
    const n = data.pillars.length;
    const word = n === 1 ? 'pillar' : n + ' strategic pillars';
    introSub.textContent = `Our ${word}. Each one carries the actions, RAG status, and overdue items that move the dial. Pick a pillar to see what's live underneath.`;
  }
}

function startSession() {
  sessionState.active = true;
  sessionState.step = 1;
  sessionState.hotActionsReviewed = new Set();
  sessionState.deferredHotActions = new Set();
  sessionState.priorityDecisions = {};
  sessionState.aob = [];
  sessionState.step4Mode = null;
  sessionState.startedAt = new Date().toISOString();
  // Make sure currentWeeklyCheck exists for this week
  const check = getOrInitCurrentCheck();
  sessionState.heartbeatCheckId = check.id;
  saveSession();
  // Switch to session view
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-session').classList.add('active');
  // Reset done step display
  document.getElementById('session-step-done').style.display = 'none';
  showSessionStep(1);
}

// Exit the session WITHOUT clearing it — progress stays in localStorage so the user
// can resume from the home banner. Use clearSession() only on full completion or abandon.
function exitSession(silent) {
  // Persist final state before tearing down the in-memory view
  saveSession();
  // Don't flip .active = false here; we want the resume banner to know there's a live session.
  // Switch back to Home (Actions tab)
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelector('.tab[data-view="actions"]').classList.add('active');
  document.getElementById('view-actions').classList.add('active');
  // We need a tiny piece of state: "session paused" — so the home shows Resume not Start
  setViewMode('home');
  if (!silent) toast('Session paused — resume any time from Home', 'success');
}

// Resume an in-flight session loaded from localStorage on page boot
function resumeSession(restored) {
  sessionState = restored;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-session').classList.add('active');
  document.getElementById('session-step-done').style.display = 'none';
  showSessionStep(sessionState.step || 1);
  toast('Resumed your in-progress weekly review', 'success');
}

// Discard an in-flight session (e.g. the user explicitly abandons it from the resume banner)
function abandonSession() {
  sessionState.active = false;
  sessionState.hotActionsReviewed = new Set();
  sessionState.deferredHotActions = new Set();
  sessionState.priorityDecisions = {};
  sessionState.aob = [];
  sessionState.step4Mode = null;
  sessionState.startedAt = null;
  sessionState.heartbeatCheckId = null;
  clearSession();
}

// ===== STEP 1: Heartbeat =====
function renderSessionStep1() {
  const check = getOrInitCurrentCheck();
  const host = document.getElementById('session-heartbeat-items');
  host.innerHTML = renderSectorCardsHtml(check);
  updateSessionStep1Status();
}

function updateSessionStep1Status() {
  const check = data.currentWeeklyCheck;
  if (!check) return;
  const setCount = countSetCells(check);
  const total = totalOpsCells();
  const statusEl = document.getElementById('session-step-1-status');
  const nextBtn = document.getElementById('session-next-1');
  if (setCount < total) {
    statusEl.innerHTML = `<strong>${setCount}</strong> of ${total} cells set`;
    nextBtn.disabled = true;
  } else {
    const overall = overallRagForCheck(check);
    const flagged = collectFlaggedCells(check);
    const verdict = overall === 'red' ? '🔴 Off track overall' : overall === 'amber' ? '🟡 Watch overall' : '🟢 On track overall';
    const flagText = flagged.length > 0 ? ` · ${flagged.length} item${flagged.length === 1 ? '' : 's'} flagged for Step 2` : '';
    statusEl.innerHTML = `<strong>${verdict}</strong>${flagText} · ready to continue`;
    nextBtn.disabled = false;
  }
}

// ===== STEP 2: Flagged-from-Step-1 + Hot Actions =====
function renderSessionStep2() {
  // Part A: flagged cells from Step 1
  const check = data.currentWeeklyCheck;
  const flagged = check ? collectFlaggedCells(check) : [];
  const flaggedHost = document.getElementById('session-flagged-items');
  if (flagged.length > 0) {
    flaggedHost.innerHTML = `
      <div class="flagged-section">
        <div class="flagged-section-head">
          <span class="flagged-section-title">🚩 Flagged this week</span>
          <span class="flagged-section-count">${flagged.length} item${flagged.length === 1 ? '' : 's'} from Step 1</span>
        </div>
        <div class="flagged-list">
          ${flagged.map(f => `
            <div class="flagged-item rag-${f.rag}">
              <div class="flagged-item-rag-pill rag-${f.rag}">${f.rag.toUpperCase()}</div>
              <div class="flagged-item-content">
                <div class="flagged-item-title">${escapeHtml(f.sectorName)} · ${escapeHtml(f.metricLabel)}</div>
                ${f.note ? `<div class="flagged-item-note">"${escapeHtml(f.note)}"</div>` : '<div class="flagged-item-note empty">No note captured in Step 1</div>'}
              </div>
              <button class="flagged-create-action-btn" data-create-action-flagged="${f.sectorId}|${f.metricId}|${f.rag}" title="Create a tracked action for this">+ Create action</button>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  } else {
    flaggedHost.innerHTML = '';
  }

  // Part B: hot actions, minus anything the user parked this session
  const deferred = sessionState.deferredHotActions || new Set();
  const host = document.getElementById('session-hot-actions');
  const allHot = data.actions.filter(a => {
    if (a.complete) return false;
    if (a.rag === 'red' || a.rag === 'amber') return true;
    if (a.due && daysUntil(a.due) < 0) return true;
    return false;
  });
  const hot = allHot.filter(a => !deferred.has(a.id));
  const deferredList = allHot.filter(a => deferred.has(a.id));

  // Split orphans (no pillar set) out of the pillar-grouped walkthrough.
  // These deserve their own section — if a hot topic can't be tied to a Strategic Pillar,
  // the room should be asking "why are we doing this at all?" before discussing the work.
  const orphanPillar = hot.filter(a => !a.pillar || !data.pillars.find(p => p.id === a.pillar));
  const linkedHot = hot.filter(a => a.pillar && data.pillars.find(p => p.id === a.pillar));

  if (hot.length === 0 && flagged.length === 0 && deferredList.length === 0) {
    host.innerHTML = `
      <div class="session-no-hot">
        Nothing's flagged this week — all open actions are on track. Move on to AOB.
      </div>
    `;
    document.getElementById('session-step-2-status').textContent = '';
    return;
  }

  // Group LINKED hot actions by pillar so the conversation walks pillar-by-pillar.
  // Render every pillar, even ones with no hot actions, so the leadership team can:
  //  (a) see the full structure (no "where's pillar 2?")
  //  (b) add a new action straight into any pillar from inside the meeting
  function sortKey(a) {
    if (a.due && daysUntil(a.due) < 0) return 0;
    if (a.rag === 'red') return 1;
    if (a.rag === 'amber') return 2;
    return 3;
  }
  const byPillar = {};
  linkedHot.forEach(a => {
    if (!byPillar[a.pillar]) byPillar[a.pillar] = [];
    byPillar[a.pillar].push(a);
  });

  let html = '';

  // Orphan section first, so the discipline question lands before the structured walkthrough begins
  if (orphanPillar.length > 0) {
    html += `
      <div class="session-orphan-section">
        <div class="session-orphan-head">
          <span class="session-orphan-title">Unlinked — needs a home or a reason</span>
          <span class="session-orphan-sub">If we can't tie this to a Strategic Pillar, ask the room: should we still be doing it?</span>
        </div>
        <div class="session-orphan-list">
          ${orphanPillar.map(a => `
            <div class="session-hot-row-wrap" data-action-row-id="${a.id}">
              ${renderActionRow(a)}
              <div class="session-orphan-actions">
                <button class="session-orphan-link-btn" data-action="edit-action" data-id="${a.id}">→ Link to a pillar &amp; initiative</button>
                <button class="session-defer-btn" data-defer-action="${a.id}" title="Park this for this session only">↷ Park for this session</button>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  html += `<div class="hot-actions-section-head">Walk each pillar, one action at a time</div>`;
  data.pillars.forEach(p => {
    const items = (byPillar[p.id] || []).slice().sort((a, b) => {
      const k = sortKey(a) - sortKey(b);
      if (k !== 0) return k;
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1;
      if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    });
    const styleNum = pillarStyleNum(p.id);
    html += `
      <div class="session-hot-pillar pillar-color-${styleNum}">
        <div class="session-hot-pillar-head">
          <span class="hot-pillar-num">${escapeHtml(p.num)}</span>
          <span>${escapeHtml(p.name)}</span>
        </div>
        <div class="session-hot-pillar-body">
          ${items.length === 0
            ? `<div class="session-hot-empty-row">Nothing live to discuss for this pillar.</div>`
            : items.map(a => {
              const missingInitiative = !a.objectiveId;
              return `
                <div class="session-hot-row-wrap ${missingInitiative ? 'missing-initiative' : ''}" data-action-row-id="${a.id}">
                  ${renderActionRow(a)}
                  ${missingInitiative ? `
                    <div class="session-init-missing-banner">
                      <span class="session-init-missing-icon">⚠</span>
                      <span class="session-init-missing-text">No initiative set. <button class="session-init-link-btn" data-action="edit-action" data-id="${a.id}">Link to an initiative</button> or ask the room why this exists.</span>
                    </div>
                  ` : ''}
                  <button class="session-defer-btn" data-defer-action="${a.id}" title="Park this for this session only (it'll be back next week if still red/amber)">↷ Park for this session</button>
                </div>
              `;
            }).join('')}
          <button class="session-pillar-add-btn" data-add-to-pillar="${p.id}" title="Add a new action under ${escapeHtml(p.name)}">+ Add an action to this pillar</button>
        </div>
      </div>
    `;
  });
  host.innerHTML = html;

  // Footer: things parked this session, with one-click restore.
  // Lives at the very bottom so it doesn't crowd the active discussion.
  if (deferredList.length > 0) {
    host.innerHTML += `
      <div class="session-deferred-footer">
        <div class="session-deferred-head">
          <span class="session-deferred-title">Parked this session · ${deferredList.length}</span>
          <span class="session-deferred-sub">Set aside for today only — restored next week if still red/amber.</span>
        </div>
        <div class="session-deferred-list">
          ${deferredList.map(a => {
            const p = data.pillars.find(pp => pp.id === a.pillar);
            const pillarN = p ? pillarStyleNum(p.id) : 1;
            return `
              <div class="session-deferred-row">
                <span class="session-deferred-pillar pillar-color-${pillarN}">${escapeHtml(p ? p.num : '—')}</span>
                <span class="session-deferred-desc">${escapeHtml(a.desc)}</span>
                <button class="session-undefer-btn" data-undefer-action="${a.id}">↺ Bring back</button>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }

  // Bottom-of-step status: orient the walkthrough rather than tally numbers.
  const statusEl = document.getElementById('session-step-2-status');
  if (hot.length === 0 && flagged.length === 0) {
    statusEl.textContent = '';
  } else if (orphanPillar.length > 0 && linkedHot.length === 0) {
    statusEl.textContent = 'Decide on the unlinked items above — link, drop, or park.';
  } else if (orphanPillar.length > 0) {
    statusEl.textContent = 'Resolve the unlinked items first, then walk each pillar.';
  } else if (hot.length === 0) {
    statusEl.textContent = 'Work through the flagged items above, then move on.';
  } else {
    statusEl.textContent = 'Work through each pillar above. Update RAG, mark complete, park, or note what\u2019s blocking.';
  }
}

// Defer / undefer handlers — session-scoped, not persistent across sessions
document.body.addEventListener('click', (e) => {
  const deferBtn = e.target.closest('[data-defer-action]');
  if (deferBtn) {
    const id = deferBtn.dataset.deferAction;
    if (!sessionState.deferredHotActions) sessionState.deferredHotActions = new Set();
    sessionState.deferredHotActions.add(id);
    saveSession();
    // Audit-log so the team has a record of what was parked vs actually addressed
    const a = data.actions.find(x => x.id === id);
    if (a) {
      logAudit({
        action: 'edit', area: 'action',
        pillarId: a.pillar, pillarName: pillarNameForId(a.pillar),
        actionOwner: a.owner, itemName: a.desc,
        summary: `Parked for this session: "${a.desc}"`,
        detail: 'Session-scoped only — back in next week\u2019s hot list if still red/amber'
      });
    }
    // Fade the row out, then re-render
    const wrap = deferBtn.closest('.session-hot-row-wrap');
    if (wrap) {
      wrap.classList.add('action-row-removing');
      setTimeout(() => { renderSessionStep2(); }, 320);
    } else {
      renderSessionStep2();
    }
    return;
  }
  const undeferBtn = e.target.closest('[data-undefer-action]');
  if (undeferBtn) {
    const id = undeferBtn.dataset.undeferAction;
    if (sessionState.deferredHotActions) sessionState.deferredHotActions.delete(id);
    saveSession();
    renderSessionStep2();
    return;
  }
  // Inline "add an action to this pillar" — opens modal pre-stamped with the pillar
  const addToPillarBtn = e.target.closest('[data-add-to-pillar]');
  if (addToPillarBtn) {
    const pillarId = addToPillarBtn.dataset.addToPillar;
    openActionModal(pillarId, null, null);
    return;
  }
});

// "Create action" from a flagged Step 2 item
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-create-action-flagged]');
  if (!btn) return;
  const [sectorId, metricId, rag] = btn.dataset.createActionFlagged.split('|');
  const sector = getSectors().find(s => s.id === sectorId);
  const metric = sector ? sector.metrics.find(m => m.id === metricId) : null;
  if (!sector || !metric) return;
  const check = data.currentWeeklyCheck;
  const cell = check && check.items ? check.items[cellKey(sectorId, metricId)] : null;
  const noteText = cell && cell.note ? ` — ${cell.note}` : '';
  // Open the add-action modal pre-filled
  // Best guess at pillar: Day 4 / Day 14 / KPIs → P3 High Performance; Quality → P2 Focus on Quality
  let defaultPillarId = data.pillars[0] && data.pillars[0].id;
  if (metricId === 'quality') {
    const p2 = data.pillars.find(p => /quality/i.test(p.name));
    if (p2) defaultPillarId = p2.id;
  } else {
    const p3 = data.pillars.find(p => /performance|high/i.test(p.name));
    if (p3) defaultPillarId = p3.id;
  }
  openActionModal(defaultPillarId, null);
  setTimeout(() => {
    const desc = document.getElementById('new-a-desc');
    const ragSel = document.getElementById('new-a-rag');
    const notes = document.getElementById('new-a-notes');
    if (desc) desc.value = `${sector.name} · ${metric.label}: address ${rag} flag${noteText}`;
    if (ragSel) ragSel.value = rag === 'red' ? 'red' : 'amber';
    if (notes) notes.value = `Surfaced from Weekly Ops Check, week commencing ${formatWeekLabel(check.weekCommencing)}`;
    if (desc) desc.focus();
  }, 150);
});

// ===== STEP 3: AOB =====
// Free-text capture for "anything else this week". Items live on sessionState.aob (array of strings)
// while the session is running; each is logged to the audit trail on session complete.
function renderSessionStep3() {
  const host = document.getElementById('session-aob');
  if (!sessionState.aob) sessionState.aob = [];
  const items = sessionState.aob;
  let html = `
    <div class="aob-list">
      ${items.length === 0 ? '<div class="aob-empty">Nothing captured yet. Add anything that came up that isn\'t tracked elsewhere.</div>' : ''}
      ${items.map((item, i) => `
        <div class="aob-item">
          <span class="aob-item-num">${i + 1}</span>
          <div class="aob-item-text">${escapeHtml(item)}</div>
          <button class="aob-item-action" data-aob-create="${i}" title="Convert into a tracked action">+ Action</button>
          <button class="aob-item-remove" data-aob-remove="${i}" title="Remove this item">✕</button>
        </div>
      `).join('')}
    </div>
    <div class="aob-add-wrap">
      <textarea id="aob-input" class="aob-input" placeholder="e.g. Regulator chatter on Ofgem readiness; Davies asking about Q3 ramp; team morale dip post-rebrand" rows="2"></textarea>
      <button class="aob-add-btn" id="aob-add-btn">+ Add</button>
    </div>
  `;
  host.innerHTML = html;
  updateSessionStep3Status();
}

function updateSessionStep3Status() {
  const items = (sessionState.aob || []);
  const statusEl = document.getElementById('session-step-3-status');
  if (!statusEl) return;
  if (items.length === 0) {
    statusEl.innerHTML = '<em>No items captured · skip if there\'s nothing</em>';
  } else {
    statusEl.innerHTML = `<strong>${items.length}</strong> item${items.length === 1 ? '' : 's'} captured`;
  }
}

// AOB add
document.body.addEventListener('click', (e) => {
  if (e.target.id !== 'aob-add-btn') return;
  const input = document.getElementById('aob-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) {
    toast('Type something first', 'error');
    input.focus();
    return;
  }
  if (!sessionState.aob) sessionState.aob = [];
  sessionState.aob.push(text);
  saveSession();
  input.value = '';
  renderSessionStep3();
  setTimeout(() => {
    const fresh = document.getElementById('aob-input');
    if (fresh) fresh.focus();
  }, 50);
});

// Cmd/Ctrl+Enter on the AOB textarea submits
document.body.addEventListener('keydown', (e) => {
  if (e.target && e.target.id === 'aob-input' && (e.key === 'Enter') && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    const btn = document.getElementById('aob-add-btn');
    if (btn) btn.click();
  }
});

// AOB remove
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-aob-remove]');
  if (!btn) return;
  const idx = parseInt(btn.dataset.aobRemove, 10);
  if (!sessionState.aob) return;
  sessionState.aob.splice(idx, 1);
  saveSession();
  renderSessionStep3();
});

// AOB → Create tracked action
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-aob-create]');
  if (!btn) return;
  const idx = parseInt(btn.dataset.aobCreate, 10);
  const item = sessionState.aob && sessionState.aob[idx];
  if (!item) return;
  const defaultPillarId = (data.pillars[0] && data.pillars[0].id) || '';
  openActionModal(defaultPillarId, null);
  setTimeout(() => {
    const desc = document.getElementById('new-a-desc');
    const notes = document.getElementById('new-a-notes');
    if (desc) { desc.value = item.length > 120 ? item.slice(0, 117) + '...' : item; }
    if (notes) { notes.value = `Captured in AOB during weekly review on ${new Date().toLocaleDateString('en-GB')}: "${item}"`; }
    if (desc) desc.focus();
  }, 150);
});


// Light scan rather than a strategic review (strategy belongs to wider SLT, not weekly ops).
// Surfaces empty pillars / empty objectives so leadership can spot gaps and add/drop as needed.
// Decide what kind of Step 4 review to show this week.
// 'light' = light-touch agree-all (most weeks)
// 'full'  = walk every initiative (every 4th week, or after a manual escalation)
function getStep4Mode() {
  if (sessionState.step4Mode === 'full' || sessionState.step4Mode === 'light') {
    return sessionState.step4Mode;
  }
  // Auto: full review every 4th week (after 3 consecutive light touches)
  const counter = (data.pillarReviewCadence && data.pillarReviewCadence.lightTouchesSinceLastFull) || 0;
  return counter >= 3 ? 'full' : 'light';
}

function renderSessionStep4() {
  const host = document.getElementById('session-priorities');
  const mode = getStep4Mode();
  const counter = (data.pillarReviewCadence && data.pillarReviewCadence.lightTouchesSinceLastFull) || 0;
  const lastFull = data.pillarReviewCadence && data.pillarReviewCadence.lastFullReviewAt;

  // Coverage summary banner — useful in both modes, so compute once
  const pillarsWithNoActions = [];
  const emptyObjectives = [];
  data.pillars.forEach(p => {
    const totalOnPillar = data.actions.filter(a => a.pillar === p.id && !a.complete).length;
    if (totalOnPillar === 0) pillarsWithNoActions.push(p);
    (p.objectives || []).forEach(o => {
      const count = actionsForObjective(o.id).length;
      if (count === 0) emptyObjectives.push({ pillar: p, objective: o });
    });
  });
  const orphanCount = data.actions.filter(a => !a.complete && !a.objectiveId).length;
  const hasGaps = pillarsWithNoActions.length > 0 || emptyObjectives.length > 0 || orphanCount > 0;
  let coverageBanner = '';
  if (hasGaps) {
    coverageBanner = `
      <div class="coverage-banner">
        <div class="coverage-banner-title">⚠ Coverage gaps to talk about</div>
        <ul>
          ${pillarsWithNoActions.map(p => `<li><strong>${escapeHtml(p.name)}</strong> — no live actions. Should it have any?</li>`).join('')}
          ${emptyObjectives.slice(0, 6).map(o => `<li><strong>${escapeHtml(o.pillar.name)} → ${escapeHtml(o.objective.text)}</strong> — no actions linked. Drop the initiative or add work?</li>`).join('')}
          ${emptyObjectives.length > 6 ? `<li>...and ${emptyObjectives.length - 6} more empty initiatives</li>` : ''}
          ${orphanCount > 0 ? `<li><strong>${orphanCount} action${orphanCount === 1 ? '' : 's'}</strong> not linked to any initiative — re-link in Strategic Pillar focus view after the session.</li>` : ''}
        </ul>
      </div>
    `;
  } else {
    coverageBanner = `<div class="coverage-banner ok">✓ Every Strategic Pillar and initiative has at least one live action. Coverage looks healthy.</div>`;
  }

  if (mode === 'light') {
    renderStep4Light(host, coverageBanner, counter, lastFull, hasGaps);
  } else {
    renderStep4Full(host, coverageBanner);
  }

  // Reflect the mode on the complete button so the label matches what the user is about to do
  const completeBtn = document.getElementById('session-complete-btn');
  if (completeBtn) {
    completeBtn.style.display = (mode === 'light') ? 'none' : '';
  }
}

// Light-touch view: read-only summary of the structure + a single agree-all button.
// Three weeks in a row of this; on the 4th week (counter ≥ 3) the full review kicks in.
function renderStep4Light(host, coverageBanner, counter, lastFull, hasGaps) {
  const weeksRemaining = Math.max(0, 3 - counter);
  const cadenceLine = counter === 0
    ? 'Full review last completed. Three light-touch weeks ahead before the next full review.'
    : `${counter} of 3 light-touch weeks done. ${weeksRemaining === 0 ? 'Next week is the full review.' : weeksRemaining + ' light-touch week' + (weeksRemaining === 1 ? '' : 's') + ' before the full review.'}`;

  let html = `
    <div class="cadence-banner cadence-light">
      <div class="cadence-banner-icon">✓</div>
      <div class="cadence-banner-body">
        <div class="cadence-banner-title">Light-touch coverage check</div>
        <div class="cadence-banner-sub">${escapeHtml(cadenceLine)} Full reviews keep the structure sharp; light-touch weeks keep the meeting moving.</div>
      </div>
    </div>
    ${coverageBanner}
    <div class="step4-light-summary">
      <div class="step4-light-summary-head">Current structure — at a glance</div>
      ${data.pillars.map(p => {
        const styleNum = pillarStyleNum(p.id);
        const objs = p.objectives || [];
        return `
          <div class="step4-light-pillar pillar-color-${styleNum}">
            <div class="step4-light-pillar-head">
              <span class="step4-light-pillar-num">${escapeHtml(p.num)}</span>
              <span class="step4-light-pillar-name">${escapeHtml(p.name)}</span>
              <span class="step4-light-pillar-count">${objs.length} initiative${objs.length === 1 ? '' : 's'}</span>
            </div>
            <ul class="step4-light-init-list">
              ${objs.length === 0
                ? '<li class="step4-light-init-empty">No initiatives on this pillar</li>'
                : objs.map((o, i) => {
                  const letter = String.fromCharCode(65 + i);
                  const ac = actionsForObjective(o.id).length;
                  return `<li><span class="step4-light-init-letter">${letter}</span>${escapeHtml(o.text)}<span class="step4-light-init-count">${ac} action${ac === 1 ? '' : 's'}</span></li>`;
                }).join('')}
            </ul>
          </div>
        `;
      }).join('')}
    </div>
    <div class="step4-light-actions">
      <button class="step4-agree-all-btn" id="step4-agree-all-btn">
        <span class="step4-agree-all-tick">✓</span>
        Agree all — structure still holds
      </button>
      <button class="step4-escalate-btn" id="step4-escalate-btn">
        ${hasGaps ? '⚠ Walk each initiative anyway (gaps to discuss)' : 'Walk each initiative anyway'}
      </button>
    </div>
  `;
  host.innerHTML = html;

  // Wire the two buttons (idempotent — we re-render so listeners would stack if not careful;
  // since the elements are recreated each render, the listeners are too).
  const agreeBtn = document.getElementById('step4-agree-all-btn');
  if (agreeBtn) agreeBtn.addEventListener('click', () => {
    // Light-touch agree-all: increment the cadence counter and complete the session.
    // Not logged to the audit trail — light-touch is a confirmation that nothing changed,
    // and the audit principle is to track what shifted on the plan.
    if (!data.pillarReviewCadence) data.pillarReviewCadence = { lightTouchesSinceLastFull: 0, lastFullReviewAt: null };
    data.pillarReviewCadence.lightTouchesSinceLastFull = (data.pillarReviewCadence.lightTouchesSinceLastFull || 0) + 1;
    save();
    // Use the session's complete flow so the post-session "Done" view shows properly
    completeSessionFromStep4();
  });
  const escBtn = document.getElementById('step4-escalate-btn');
  if (escBtn) escBtn.addEventListener('click', () => {
    sessionState.step4Mode = 'full';
    saveSession();
    renderSessionStep4();
  });
}

// Full review: existing per-initiative keep/tweak/drop UI. Used every 4th week or on manual escalation.
function renderStep4Full(host, coverageBanner) {
  const counter = (data.pillarReviewCadence && data.pillarReviewCadence.lightTouchesSinceLastFull) || 0;
  const escalated = sessionState.step4Mode === 'full' && counter < 3;
  const heading = escalated
    ? { kind: 'manual', title: 'Full review (you chose to walk each initiative)', sub: 'Working through every initiative this week. After completing, the cadence resets.' }
    : { kind: 'cadence', title: 'Monthly full review', sub: '3 light-touch weeks done — time to walk every initiative properly. Keep, tweak or drop each one; add anything new.' };

  let html = `
    <div class="cadence-banner cadence-full">
      <div class="cadence-banner-icon">↻</div>
      <div class="cadence-banner-body">
        <div class="cadence-banner-title">${escapeHtml(heading.title)}</div>
        <div class="cadence-banner-sub">${escapeHtml(heading.sub)}</div>
      </div>
      ${escalated ? `<button class="cadence-banner-cancel" id="step4-back-to-light">Switch back to light-touch</button>` : ''}
    </div>
    ${coverageBanner}
  `;

  data.pillars.forEach(p => {
    const styleNum = pillarStyleNum(p.id);
    const objectives = p.objectives || [];
    html += `
      <div class="session-prio-pillar pillar-color-${styleNum}">
        <div class="session-prio-pillar-head">
          <span>${escapeHtml(p.num)} · ${escapeHtml(p.name)}</span>
          <span class="session-prio-pillar-count">${objectives.length} initiative${objectives.length === 1 ? '' : 's'}</span>
        </div>
        <div class="session-prio-pillar-body">
          ${objectives.length === 0 ? `
            <div class="session-prio-empty">No initiatives yet on this pillar. Add one below.</div>
          ` : objectives.map((o, i) => {
            const decision = sessionState.priorityDecisions[o.id];
            const letter = String.fromCharCode(65 + i);
            const actionCount = actionsForObjective(o.id).length;
            return `
              <div class="session-prio-row ${decision ? 'has-decision decision-' + decision : ''}">
                <div class="session-prio-letter">${letter}</div>
                <div class="session-prio-text">
                  ${escapeHtml(o.text)}
                  ${actionCount > 0 ? `<span class="session-prio-action-count">${actionCount} action${actionCount === 1 ? '' : 's'}</span>` : '<span class="session-prio-action-count empty">no actions yet</span>'}
                </div>
                <div class="session-prio-actions">
                  <button class="session-prio-btn keep ${decision === 'keep' ? 'selected' : ''}" data-prio-decision="keep" data-obj-id="${o.id}" title="Keep as-is">Keep</button>
                  <button class="session-prio-btn tweak ${decision === 'tweak' ? 'selected' : ''}" data-prio-decision="tweak" data-obj-id="${o.id}" title="Flag for refinement">Tweak</button>
                  <button class="session-prio-btn remove ${decision === 'remove' ? 'selected' : ''}" data-prio-decision="remove" data-obj-id="${o.id}" title="Mark for removal — deletes on session complete">✕ Drop</button>
                </div>
              </div>
            `;
          }).join('')}
          <div class="session-prio-add-wrap">
            <button class="session-prio-add-btn" data-prio-add-pillar="${p.id}">+ Add new initiative</button>
            <div class="session-prio-add-form" id="prio-add-form-${p.id}" style="display:none;">
              <input type="text" class="session-prio-add-input" id="prio-add-input-${p.id}" placeholder="e.g. Embed Quality Insight Team into operations" maxlength="160">
              <button class="session-prio-add-save" data-prio-save-pillar="${p.id}">Add</button>
              <button class="session-prio-add-cancel" data-prio-cancel-pillar="${p.id}">Cancel</button>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  host.innerHTML = html || '<div style="text-align:center;padding:24px;color:var(--grey-mid);font-size:13px;">No pillars defined yet.</div>';

  // Allow switching back to light-touch if the user escalated by mistake
  const backBtn = document.getElementById('step4-back-to-light');
  if (backBtn) backBtn.addEventListener('click', () => {
    sessionState.step4Mode = null; // Back to auto (light if counter < 3, full if ≥ 3)
    saveSession();
    renderSessionStep4();
  });
}

// Programmatic session completion from the light-touch Agree-all button.
// Reuses the same teardown as the regular Complete button so the "Done" summary screen
// shows up the same way.
function completeSessionFromStep4() {
  const completeBtn = document.getElementById('session-complete-btn');
  if (completeBtn) {
    completeBtn.click();
  }
}

// ===== Step navigation handlers =====
document.getElementById('start-session-btn').addEventListener('click', () => {
  if (sessionState && sessionState.active) {
    // Resume the in-flight session
    resumeSession(sessionState);
  } else {
    startSession();
  }
});
document.getElementById('abandon-session-btn').addEventListener('click', () => {
  if (!confirm('Discard the in-progress weekly review and start fresh?\n\nAll captured AOB items, hot-action reviews, and coverage decisions will be lost.')) return;
  abandonSession();
  updateStartBanner();
  toast('In-progress session discarded', 'success');
});
document.getElementById('session-exit-btn').addEventListener('click', () => {
  if (confirm('Exit the session? Any RAG and note entries are saved automatically. Priority decisions in this session will be lost.')) {
    exitSession();
  }
});
document.getElementById('session-next-1').addEventListener('click', () => showSessionStep(2));
document.getElementById('session-back-2').addEventListener('click', () => showSessionStep(1));
document.getElementById('session-next-2').addEventListener('click', () => showSessionStep(3));
document.getElementById('session-back-3').addEventListener('click', () => showSessionStep(2));
document.getElementById('session-next-3').addEventListener('click', () => showSessionStep(4));
document.getElementById('session-back-4').addEventListener('click', () => showSessionStep(3));

// Step 3 priority decisions: Keep / Tweak / Drop
document.body.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-prio-decision]');
  if (!btn) return;
  const decision = btn.dataset.prioDecision;
  const objId = btn.dataset.objId;

  // Drop requires confirmation since it will actually delete the objective on session complete
  if (decision === 'remove' && sessionState.priorityDecisions[objId] !== 'remove') {
    const info = findObjective(objId);
    const actionCount = info ? actionsForObjective(objId).length : 0;
    const warning = actionCount > 0
      ? `\n\n⚠ ${actionCount} action${actionCount === 1 ? '' : 's'} currently mapped to this initiative will become unlinked (still kept, just orphaned — you can re-link them later).`
      : '';
    if (!confirm(`Mark "${info ? info.objective.text : objId}" to be DROPPED?\n\nThis will permanently remove this initiative from the pillar when the session is completed.${warning}`)) {
      return;
    }
  }
  // Toggle: clicking the same one again clears
  if (sessionState.priorityDecisions[objId] === decision) {
    delete sessionState.priorityDecisions[objId];
  } else {
    sessionState.priorityDecisions[objId] = decision;
  }
  saveSession();
  renderSessionStep4();
});

// Step 4 — Add new objective: open inline form
document.body.addEventListener('click', (e) => {
  const addBtn = e.target.closest('[data-prio-add-pillar]');
  if (!addBtn) return;
  const pillarId = addBtn.dataset.prioAddPillar;
  const form = document.getElementById('prio-add-form-' + pillarId);
  const input = document.getElementById('prio-add-input-' + pillarId);
  if (!form || !input) return;
  addBtn.style.display = 'none';
  form.style.display = 'flex';
  setTimeout(() => input.focus(), 50);
});

// Step 4 — Save new objective
document.body.addEventListener('click', (e) => {
  const saveBtn = e.target.closest('[data-prio-save-pillar]');
  if (!saveBtn) return;
  const pillarId = saveBtn.dataset.prioSavePillar;
  const input = document.getElementById('prio-add-input-' + pillarId);
  if (!input) return;
  const text = input.value.trim();
  if (!text) {
    toast('Type something first', 'error');
    input.focus();
    return;
  }
  const p = data.pillars.find(x => x.id === pillarId);
  if (!p) return;
  if (!Array.isArray(p.objectives)) p.objectives = [];
  const newObj = { id: 'obj_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6), text: text };
  p.objectives.push(newObj);
  // Track in session: tag as 'added' for the audit + report
  sessionState.priorityDecisions[newObj.id] = 'added';
  saveSession();
  logAudit({
    action: 'edit', area: 'pillar-objective',
    pillarId: p.id, pillarName: p.name,
    itemName: newObj.text,
    summary: `New initiative added in weekly review: "${newObj.text}"`,
    detail: 'Added live during session'
  });
  save();
  renderSessionStep4();
  renderAll();
  toast('Initiative added', 'success');
});

// Step 4 — Cancel add
document.body.addEventListener('click', (e) => {
  const cancelBtn = e.target.closest('[data-prio-cancel-pillar]');
  if (!cancelBtn) return;
  const pillarId = cancelBtn.dataset.prioCancelPillar;
  const form = document.getElementById('prio-add-form-' + pillarId);
  const input = document.getElementById('prio-add-input-' + pillarId);
  const addBtn = document.querySelector(`[data-prio-add-pillar="${pillarId}"]`);
  if (input) input.value = '';
  if (form) form.style.display = 'none';
  if (addBtn) addBtn.style.display = '';
});

// Step 3 — Enter key submits add
document.body.addEventListener('keydown', (e) => {
  if (e.key !== 'Enter') return;
  const input = e.target.closest('.session-prio-add-input');
  if (!input) return;
  e.preventDefault();
  const pillarId = input.id.replace('prio-add-input-', '');
  const saveBtn = document.querySelector(`[data-prio-save-pillar="${pillarId}"]`);
  if (saveBtn) saveBtn.click();
});

// Complete session
document.getElementById('session-complete-btn').addEventListener('click', () => {
  const check = data.currentWeeklyCheck;
  if (!check) { exitSession(); return; }
  // Lock in the heartbeat
  check.completed = true;
  check.completedAt = new Date().toISOString();
  check.completedBy = currentUser || 'Unknown';
  const overall = overallRagForCheck(check);
  const ragLabel = overall === 'red' ? 'OFF TRACK' : overall === 'amber' ? 'WATCH' : 'ON TRACK';

  // Count priority decisions
  const decisions = sessionState.priorityDecisions;
  const counts = { keep: 0, tweak: 0, remove: 0, added: 0 };
  Object.values(decisions).forEach(d => { if (counts[d] !== undefined) counts[d]++; });

  // AOB items captured in step 3
  const aobItems = (sessionState.aob || []).slice();

  // Count hot actions seen
  const hotCount = data.actions.filter(a => {
    if (a.complete) return false;
    if (a.rag === 'red' || a.rag === 'amber') return true;
    if (a.due && daysUntil(a.due) < 0) return true;
    return false;
  }).length;

  // Audit log
  logAudit({
    action: 'edit', area: 'weekly-session',
    pillarId: null, pillarName: null,
    itemName: 'Week of ' + formatWeekLabelLong(check.weekCommencing),
    summary: `Weekly Review session completed — ${ragLabel}`,
    detail: `Heartbeat: ${ragLabel} · Hot actions reviewed: ${hotCount} · AOB items: ${aobItems.length} · Priority decisions: ${counts.added} added, ${counts.keep} kept, ${counts.tweak} tweaks flagged, ${counts.remove} dropped`
  });

  // Log each AOB item individually so the audit trail captures verbatim what was said
  aobItems.forEach((item, i) => {
    logAudit({
      action: 'edit', area: 'weekly-session',
      pillarId: null, pillarName: null,
      itemName: `AOB #${i + 1}`,
      summary: `AOB: ${item.length > 120 ? item.slice(0, 117) + '...' : item}`,
      detail: `Captured during weekly review on ${formatWeekLabelLong(check.weekCommencing)}`
    });
  });

  // Push heartbeat to history
  data.weeklyChecks.push(check);
  data.currentWeeklyCheck = null;

  // Apply priority decisions
  //  - 'remove' → actually delete the objective from its pillar (and orphan linked actions)
  //  - 'tweak'  → flag in audit (no auto-edit, user does it later in pillar focus)
  //  - 'keep'   → log only
  //  - 'added'  → already added live, just log to audit (we already did this on add)
  // Snapshot before mutating so iteration is stable
  const decisionEntries = Object.entries(decisions);
  decisionEntries.forEach(([objId, decision]) => {
    const info = findObjective(objId);
    if (!info) return;
    if (decision === 'tweak') {
      logAudit({
        action: 'edit', area: 'pillar-objective',
        pillarId: info.pillar.id, pillarName: info.pillar.name,
        itemName: info.objective.text,
        summary: `Session flagged initiative "${info.objective.text}" for tweaking`,
        detail: `From weekly review on ${formatWeekLabelLong(check.weekCommencing)}`
      });
    } else if (decision === 'remove') {
      // Actually delete the initiative; orphan linked actions
      const orphans = data.actions.filter(a => a.objectiveId === objId);
      orphans.forEach(a => { a.objectiveId = null; });
      const idx = info.pillar.objectives.findIndex(o => o.id === objId);
      if (idx >= 0) info.pillar.objectives.splice(idx, 1);
      logAudit({
        action: 'delete', area: 'pillar-objective',
        pillarId: info.pillar.id, pillarName: info.pillar.name,
        itemName: info.objective.text,
        summary: `Initiative "${info.objective.text}" dropped in weekly review`,
        detail: `From weekly review on ${formatWeekLabelLong(check.weekCommencing)}${orphans.length > 0 ? ` · ${orphans.length} action${orphans.length === 1 ? '' : 's'} orphaned (re-link needed)` : ''}`
      });
    }
    // 'keep' and 'added' don't need additional logging — the summary covers it
  });

  // Update the Step 4 cadence state based on which mode was used this session.
  // Full review (or escalated full) resets the counter and stamps the date.
  // Light-touch already incremented before the Agree-all button called complete.
  const wasFullReview = sessionState.step4Mode === 'full' || (data.pillarReviewCadence && data.pillarReviewCadence.lightTouchesSinceLastFull >= 3);
  if (wasFullReview) {
    if (!data.pillarReviewCadence) data.pillarReviewCadence = { lightTouchesSinceLastFull: 0, lastFullReviewAt: null };
    data.pillarReviewCadence.lightTouchesSinceLastFull = 0;
    data.pillarReviewCadence.lastFullReviewAt = new Date().toISOString();
  }

  // Render done step
  const summaryEl = document.getElementById('session-done-summary');
  summaryEl.innerHTML = `
    <div class="session-done-card">
      <div class="num">${ragLabel === 'ON TRACK' ? '🟢' : ragLabel === 'WATCH' ? '🟡' : '🔴'}</div>
      <div class="label">Heartbeat: ${ragLabel}</div>
    </div>
    <div class="session-done-card">
      <div class="num">${hotCount}</div>
      <div class="label">Hot actions reviewed</div>
    </div>
    <div class="session-done-card">
      <div class="num">${aobItems.length}</div>
      <div class="label">AOB items captured</div>
    </div>
    <div class="session-done-card">
      <div class="num">${counts.keep + counts.tweak + counts.remove + counts.added}</div>
      <div class="label">Coverage decisions<br>(${counts.added} added · ${counts.keep} keep · ${counts.tweak} tweak · ${counts.remove} dropped)</div>
    </div>
  `;

  // Show done step
  sessionState.active = false;
  clearSession();
  ['1','2','3','4'].forEach(s => { document.getElementById('session-step-' + s).style.display = 'none'; });
  document.getElementById('session-step-done').style.display = '';
  // Mark all pips as done
  document.querySelectorAll('.session-step-pip').forEach(pip => {
    pip.classList.remove('active');
    pip.classList.add('done');
  });
  document.querySelectorAll('.session-step-line').forEach(line => line.classList.add('passed'));

  save();
  renderAll();
  renderWeeklyCheck();
  toast(`Weekly review complete — heartbeat ${ragLabel.toLowerCase()}`, 'success');
});

document.getElementById('session-back-home-btn').addEventListener('click', () => exitSession(true));

// Download summary report from the Done screen — pass through session's priority decisions
// and AOB items so the report includes both sections
document.getElementById('download-summary-btn').addEventListener('click', () => {
  downloadSummaryReport({
    priorityDecisions: (typeof sessionState !== 'undefined' && sessionState.priorityDecisions) || {},
    aob: (typeof sessionState !== 'undefined' && Array.isArray(sessionState.aob)) ? sessionState.aob.slice() : []
  });
});

// Initial render
renderAll();
renderAudit();
renderSummary();
renderMonthlyReview();
renderWeeklyCheck();
populateFilterDropdowns();
setViewMode('home');

// Check for an in-flight session left over from a previous tab close / refresh
const _restoredSession = loadSession();
if (_restoredSession) {
  // Don't auto-resume — give the user a clear choice on the home banner.
  // (The home banner is updated by updateStartBanner() to reflect this.)
  sessionState = _restoredSession;
  if (typeof updateStartBanner === 'function') updateStartBanner();
}
</script>
</body>
</html>
