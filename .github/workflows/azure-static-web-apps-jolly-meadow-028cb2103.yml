    border-radius: 8px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    color: var(--grey-dark);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--grey-mid); color: white; }
  .btn-secondary.danger:hover { background: var(--red); color: white; }

  .audit-list {
    background: var(--card-bg);
    border-radius: 12px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .audit-entry {
    display: grid;
    grid-template-columns: 130px 90px 110px 1fr 130px;
