    transition: background 0.15s;
  }
  .weekly-edit-close:hover { background: var(--tag-green); }
  .sector-editor-empty {
    padding: 24px;
    text-align: center;
    color: var(--grey-mid);
    font-style: italic;
    font-size: 13px;
  }
  .sector-edit-block {
    background: var(--grey-lighter);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 12px;
    border: 1px solid var(--grey-light);
  }
  .sector-edit-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .sector-edit-head-left {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }
  .sector-edit-icon {
    font-size: 20px;
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: 1px solid var(--grey-light);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s;
  }
  .sector-edit-icon:hover { background: var(--tag-green-light); }
  .sector-edit-name {
    flex: 1;
    background: white;
    border: 1px solid var(--grey-light);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 700;
    color: var(--grey-dark);
  }
  .sector-edit-name:focus {
    outline: none;
    border-color: var(--tag-green);
  }
  .sector-edit-head-tools {
    display: flex;
    gap: 4px;
  }
  .sector-edit-tool-btn {
    background: white;
    border: 1px solid var(--grey-light);
    color: var(--grey-mid);
    border-radius: 5px;
    width: 28px;
    height: 28px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.12s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .sector-edit-tool-btn:hover:not(:disabled) {
    background: var(--tag-green-light);
    border-color: var(--tag-green);
    color: var(--tag-green-dark);
  }
  .sector-edit-tool-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  .sector-edit-tool-btn.sector-edit-delete {
    color: var(--red);
  }
  .sector-edit-tool-btn.sector-edit-delete:hover:not(:disabled) {
    background: rgba(192, 57, 43, 0.1);
    border-color: var(--red);
    color: var(--red);
  }
  .sector-metrics-edit {
    background: white;
    border-radius: 6px;
    padding: 8px;
    border: 1px solid var(--grey-light);
  }
  .sector-metric-empty {
    padding: 10px;
    text-align: center;
    color: var(--grey-mid);
    font-style: italic;
    font-size: 12px;
  }
  .sector-metric-edit-row {
    display: grid;
    grid-template-columns: 180px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px solid var(--grey-lighter);
  }
  .sector-metric-edit-row:last-of-type { border-bottom: none; }
  .sector-metric-label,
  .sector-metric-prompt {
    background: var(--grey-lighter);
    border: 1px solid transparent;
    border-radius: 5px;
    padding: 5px 8px;
    font-family: var(--font-body);
    font-size: 12px;
    color: var(--grey-dark);
  }
  .sector-metric-label { font-weight: 600; }
  .sector-metric-label:focus,
  .sector-metric-prompt:focus {
    outline: none;
    background: white;
    border-color: var(--tag-green);
  }
  .sector-metric-tools {
    display: flex;
    gap: 4px;
  }
  .sector-add-metric-btn {
    background: transparent;
    border: 1.5px dashed var(--grey-light);
    color: var(--grey-mid);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: var(--font-body);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    width: 100%;
    transition: all 0.12s;
  }
  .sector-add-metric-btn:hover {
    border-color: var(--tag-green);
    border-style: solid;
    background: var(--tag-green-light);
    color: var(--tag-green-dark);
  }
  .sector-add-btn {
    background: var(--tag-green-dark);
    border: none;
    color: white;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: background 0.15s;
  }
  .sector-add-btn:hover { background: var(--tag-green); }
  /* Responsive: stack the metric-edit rows on narrow screens */
  @media (max-width: 700px) {
    .sector-metric-edit-row {
      grid-template-columns: 1fr;
      gap: 4px;
    }
    .sector-metric-tools {
      justify-content: flex-end;
    }
  }
  /* ===== END SECTOR EDITOR ===== */

  .weekly-check-card {
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--shadow-sm);
    padding: 26px 28px;
    margin-bottom: 24px;
  }
  .weekly-check-instructions {
    font-size: 13px;
    color: var(--grey-mid);
    background: var(--grey-lighter);
    padding: 12px 16px;
    border-radius: 10px;
    margin-bottom: 20px;
    line-height: 1.6;
  }
  .weekly-check-instructions strong { color: var(--tag-green-dark); }

  .weekly-item {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 16px;
    padding: 16px 14px;
    border-radius: 12px;
    background: var(--grey-lighter);
    margin-bottom: 10px;
    align-items: start;
    border-left: 5px solid var(--grey-light);
    transition: all 0.15s;
  }
  .weekly-item.rag-green { border-left-color: var(--green); background: rgba(39, 174, 96, 0.05); }
  .weekly-item.rag-amber { border-left-color: var(--amber); background: rgba(243, 156, 18, 0.05); }
  .weekly-item.rag-red { border-left-color: var(--red); background: rgba(192, 57, 43, 0.05); }

  /* Sector card (replaces flat weekly items) */
  .sector-card {
    background: var(--card-bg);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
    border: 1.5px solid var(--grey-light);
    border-left: 6px solid var(--grey-light);
    transition: border-color 0.15s;
  }
  .sector-card.rag-green { border-left-color: var(--green); }
  .sector-card.rag-amber { border-left-color: var(--amber); }
  .sector-card.rag-red { border-left-color: var(--red); }
  .sector-card-head {
    background: var(--grey-lighter);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--grey-light);
  }
  .sector-card-icon { font-size: 18px; }
  .sector-card-title {
    flex: 1;
    font-size: 16px;
    font-weight: 700;
    color: var(--grey-dark);
    letter-spacing: -0.01em;
  }
  .sector-card-rag {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 5px;
    color: white;
    letter-spacing: 0.05em;
  }
  .sector-card-rag.rag-green { background: var(--green); }
  .sector-card-rag.rag-amber { background: var(--amber); }
  .sector-card-rag.rag-red { background: var(--red); }

  .sector-card-body { padding: 6px 8px; }

  .metric-row {
    display: grid;
    grid-template-columns: minmax(160px, 1.2fr) minmax(180px, 2fr) auto;
    gap: 12px;
    padding: 10px 10px;
    align-items: center;
    border-radius: 8px;
    border-left: 3px solid transparent;
    transition: background 0.12s;
  }
  .metric-row:hover { background: var(--grey-lighter); }
  .metric-row.rag-green { border-left-color: var(--green); }
  .metric-row.rag-amber { border-left-color: var(--amber); background: rgba(243, 156, 18, 0.04); }
  .metric-row.rag-red { border-left-color: var(--red); background: rgba(192, 57, 43, 0.05); }
  .metric-row-empty {
    padding: 16px;
    text-align: center;
    color: var(--grey-mid);
    font-style: italic;
    font-size: 12px;
    background: var(--grey-lighter);
    border-radius: 6px;
  }
  .metric-row-label {
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .metric-label-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--grey-dark);
  }
  .metric-label-prompt {
    font-size: 11px;
    color: var(--grey-mid);
    line-height: 1.35;
  }
  .metric-row-note {
    width: 100%;
    padding: 7px 10px;
    border: 1.5px solid var(--grey-light);
